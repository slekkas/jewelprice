<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lekkas Jewelry — Karpathos, Greece</title>
<meta name="description" content="Fine jewelry in the heart of Karpathos. Handcrafted gold and silver pieces, precious stones, and timeless designs.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #C9A84C;
    --gold-light: #A8882A;
    --gold-dim: #8a6e2f;
    --ink: #241B10;
    --dark: #F7F3E8;
    --dark-2: #FFFFFF;
    --dark-3: #F0EAD9;
    --text: #2E2416;
    --text-dim: #6b5d45;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'Montserrat', sans-serif;
    font-weight: 400;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── LANGUAGE TOGGLE ── */
  #lang-toggle {
    position: fixed;
    top: 1.2rem;
    right: 1.5rem;
    z-index: 100;
    display: flex;
    gap: 0;
    border: 1px solid var(--gold-dim);
  }
  #lang-toggle button {
    background: transparent;
    border: none;
    color: var(--text-dim);
    font-family: 'Montserrat', sans-serif;
    font-size: 0.65rem;
    font-weight: 500;
    letter-spacing: 0.12em;
    padding: 0.35rem 0.7rem;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
  }
  #lang-toggle button.active {
    background: var(--gold);
    color: var(--ink);
  }

  /* ── HERO ── */
  .hero {
    min-height: 100svh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 4rem 2rem 3rem;
    position: relative;
    background: radial-gradient(ellipse at 50% 60%, #FBF7EC 0%, var(--dark) 70%);
  }

  .hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background: 
      radial-gradient(circle at 20% 80%, rgba(201,168,76,0.06) 0%, transparent 50%),
      radial-gradient(circle at 80% 20%, rgba(201,168,76,0.04) 0%, transparent 50%);
    pointer-events: none;
  }

  /* Signature element: thin gold horizontal rule that "writes itself" */
  .rule {
    width: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 0 auto 2.5rem;
    animation: drawRule 1.2s ease forwards 0.3s;
  }
  @keyframes drawRule { to { width: 120px; } }

  .logo-mark {
    display: block;
    width: clamp(300px, 68vw, 520px);
    height: auto;
    margin: 0 auto;
    opacity: 0;
    animation: fadeUp 1s ease forwards 0.5s;
  }

  .logo-sub {
    font-family: 'Montserrat', sans-serif;
    font-size: 0.65rem;
    font-weight: 500;
    letter-spacing: 0.35em;
    color: var(--gold-dim);
    text-transform: uppercase;
    margin-top: 0.8rem;
    opacity: 0;
    animation: fadeUp 1s ease forwards 0.8s;
  }

  .hero-tagline {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: clamp(1rem, 3vw, 1.4rem);
    color: var(--text-dim);
    margin-top: 2.5rem;
    max-width: 420px;
    line-height: 1.6;
    opacity: 0;
    animation: fadeUp 1s ease forwards 1.1s;
  }

  .cta-btn {
    display: inline-block;
    margin-top: 2.8rem;
    padding: 0.9rem 2.4rem;
    border: 1px solid var(--gold);
    color: var(--gold);
    font-family: 'Montserrat', sans-serif;
    font-size: 0.7rem;
    font-weight: 500;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    text-decoration: none;
    transition: background 0.3s, color 0.3s;
    opacity: 0;
    animation: fadeUp 1s ease forwards 1.4s;
  }
  .cta-btn:hover {
    background: var(--gold);
    color: var(--ink);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── INFO SECTION ── */
  .info {
    background: var(--dark-2);
    border-top: 1px solid rgba(139,111,47,0.2);
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 0;
  }

  .info-block {
    padding: 2.8rem 2rem;
    border-right: 1px solid rgba(139,111,47,0.2);
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
  }
  .info-block:last-child { border-right: none; }

  .info-label {
    font-size: 0.6rem;
    font-weight: 500;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 0.4rem;
  }

  .info-value {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.05rem;
    color: var(--text);
    line-height: 1.7;
  }

  .info-value a {
    color: var(--text);
    text-decoration: none;
    transition: color 0.2s;
  }
  .info-value a:hover { color: var(--gold); }

  .hours-grid {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1rem;
    color: var(--text);
    line-height: 1.9;
  }
  .hours-grid .day { color: var(--text-dim); font-size: 0.85rem; }

  /* ── SOCIAL ── */
  .social {
    background: var(--dark-3);
    border-top: 1px solid rgba(139,111,47,0.2);
    padding: 2rem;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 2rem;
  }

  .social a {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    color: var(--text-dim);
    text-decoration: none;
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    transition: color 0.2s;
  }
  .social a:hover { color: var(--gold); }
  .social svg { width: 18px; height: 18px; fill: currentColor; }

  /* ── FOOTER ── */
  footer {
    background: var(--dark-3);
    border-top: 1px solid rgba(139,111,47,0.2);
    padding: 1.2rem 2rem;
    text-align: center;
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    color: #a89878;
    text-transform: uppercase;
  }

  /* ── MOBILE ── */
  @media (max-width: 600px) {
    .info-block { border-right: none; border-bottom: 1px solid rgba(139,111,47,0.2); }
    .info-block:last-child { border-bottom: none; }
    .social { flex-direction: column; gap: 1.2rem; }
  }

  @media (prefers-reduced-motion: reduce) {
    .rule, .logo-mark, .logo-sub, .hero-tagline, .cta-btn {
      animation: none; opacity: 1; width: 120px;
    }
  }
</style>
</head>
<body>

<!-- Language Toggle -->
<div id="lang-toggle">
  <button class="active" onclick="setLang('en')" id="btn-en">EN</button>
  <button onclick="setLang('el')" id="btn-el">ΕΛ</button>
</div>

<!-- Hero -->
<section class="hero">

        <stop offset="0%" style="stop-color:#F5EDD6"/>
        <stop offset="100%" style="stop-color:#C9A84C"/>

      <line x1="-9" y1="-12" x2="-9" y2="8" stroke="#241B10" stroke-width="4" stroke-linecap="round" opacity="0.5"/>

      <circle cx="10" cy="-12" r="6" fill="url(#gg5)" opacity="0.9"/>
      <circle cx="10" cy="-12" r="3.5" fill="#fff" opacity="0.7"/>
      <circle cx="10" cy="-12" r="6" fill="none" stroke="#C9A84C" stroke-width="0.8"/>
    </g>
    <text x="82" y="50" font-family="Georgia,'Times New Roman',serif" font-size="36" letter-spacing="4" fill="#A8882A">LEKKAS</text>
    <text x="84" y="66" font-family="'Courier New',monospace" font-size="10" letter-spacing="7" fill="#6B5D45">JEWELRY</text>
    <line x1="82" y1="57" x2="304" y2="57" stroke="#C9A84C" stroke-width="0.5" opacity="0.4"/>
  </svg>
  <div class="logo-sub" data-en="Fine Jewelry · Karpathos" data-el="Κοσμήματα · Κάρπαθος">Fine Jewelry · Karpathos</div>
  <p class="hero-tagline" data-en="Crafted with care, worn with meaning." data-el="Φτιαγμένα με μεράκι, φορεμένα με νόημα.">Crafted with care, worn with meaning.</p>
  <a href="showroom.htm" class="cta-btn" data-en="View Our Collection" data-el="Δείτε τη Συλλογή μας">View Our Collection</a>
</section>

<!-- Info -->
<section class="info">

  <div class="info-block">
    <div class="info-label" data-en="Location" data-el="Τοποθεσία">Location</div>
    <div class="info-value">
      <a href="https://maps.google.com/?q=Lekkas+Jewelry+Karpathos+Greece" target="_blank" rel="noopener">
        <span data-en="Pigadia, Karpathos<br>Dodecanese, Greece" data-el="Πηγάδια, Κάρπαθος<br>Δωδεκάνησα, Ελλάδα">Pigadia, Karpathos<br>Dodecanese, Greece</span>
      </a>
    </div>
  </div>

  <div class="info-block">
    <div class="info-label" data-en="Hours" data-el="Ώρες">Hours</div>
    <div class="hours-grid">
      <div><span class="day" data-en="Mon – Sat&nbsp;&nbsp;" data-el="Δευ – Σαβ&nbsp;&nbsp;">Mon – Sat&nbsp;&nbsp;</span>10:00 – 13:30</div>
      <div><span class="day" data-en="Mon – Sat&nbsp;&nbsp;" data-el="Δευ – Σαβ&nbsp;&nbsp;"></span>18:30 – 23:00</div>
      <div><span class="day" data-en="Sunday&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;" data-el="Κυριακή&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;">Sunday&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span>19:30 – 22:30</div>
    </div>
  </div>

  <div class="info-block">
    <div class="info-label" data-en="Contact" data-el="Επικοινωνία">Contact</div>
    <div class="info-value">
      <a href="tel:+306947891151">+30 694 789 1151</a>
    </div>
  </div>

</section>

<!-- Social -->
<div class="social">
  <a href="https://www.instagram.com/lekkas.jewelry?igsh=ZXlsZ2R4NWZtY2Ft" target="_blank" rel="noopener">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg>
    <span data-en="Instagram" data-el="Instagram">Instagram</span>
  </a>
  <a href="https://www.facebook.com/share/1P6ddrWoGA/" target="_blank" rel="noopener">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
    <span data-en="Facebook" data-el="Facebook">Facebook</span>
  </a>
</div>

<!-- Footer -->
<footer>
  <span data-en="© 2026 Lekkas Jewelry · Karpathos, Greece" data-el="© 2026 Lekkas Jewelry · Κάρπαθος, Ελλάδα">© 2026 Lekkas Jewelry · Karpathos, Greece</span>
</footer>

<script>
  function setLang(lang) {
    document.querySelectorAll('[data-en]').forEach(el => {
      el.innerHTML = el.dataset[lang] || el.dataset.en;
    });
    document.getElementById('btn-en').classList.toggle('active', lang === 'en');
    document.getElementById('btn-el').classList.toggle('active', lang === 'el');
    document.documentElement.lang = lang === 'el' ? 'el' : 'en';
    localStorage.setItem('lekkas-lang', lang);
  }

  // Restore saved language
  const saved = localStorage.getItem('lekkas-lang');
  if (saved) setLang(saved);
</script>
</body>
</html>
