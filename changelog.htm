<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');
  :root {
    --gold:#C9A84C; --gold-light:#E8C97A; --gold-dim:#8C7E60;
    --ink:#0E0C08; --surface:#131108; --surface-2:#1C1A10; --surface-3:#252210;
    --border:rgba(201,168,76,0.18); --text:#F0EAD6; --text-dim:#8C7E60; --text-muted:#5A5240;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--ink);color:var(--text);font-family:'DM Sans',sans-serif;font-weight:300;min-height:100vh;-webkit-font-smoothing:antialiased}
  header{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;position:sticky;top:0;background:rgba(14,12,8,0.96);backdrop-filter:blur(10px);z-index:10}
  .lang-toggle{display:flex;gap:6px}
  .lang-btn{background:none;border:1px solid var(--border);color:var(--text-muted);font-family:'DM Mono',monospace;font-size:11px;letter-spacing:0.12em;padding:6px 12px;border-radius:4px;cursor:pointer;transition:all .18s}
  .lang-btn.active{border-color:var(--gold);color:var(--gold);background:rgba(201,168,76,0.08)}
  .container{max-width:640px;margin:0 auto;padding:28px 20px 70px}
  h1{font-family:'Cormorant Garamond',Georgia,serif;font-size:34px;font-weight:600;color:var(--gold-light);margin-bottom:6px}
  .subtitle{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:0.14em;color:var(--text-muted);text-transform:uppercase;margin-bottom:26px}
  .entry{border-top:1px solid var(--border);padding:20px 0}
  .entry:first-of-type{border-top:none}
  .entry-head{display:flex;align-items:baseline;gap:12px;margin-bottom:12px;flex-wrap:wrap}
  .entry-ver{font-family:'DM Mono',monospace;font-size:16px;font-weight:500;color:var(--gold)}
  .entry-date{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:0.1em;color:var(--text-muted);text-transform:uppercase}
  .entry-items{list-style:none;display:flex;flex-direction:column;gap:10px}
  .entry-items li{font-size:14px;line-height:1.6;color:var(--text);padding-left:2px}
  .backlink{display:inline-block;margin-top:8px;font-family:'DM Mono',monospace;font-size:11px;letter-spacing:0.12em;color:var(--gold-dim);text-decoration:none;text-transform:uppercase;border:1px solid var(--border);border-radius:4px;padding:9px 16px;transition:all .18s}
  .backlink:hover{border-color:var(--gold);color:var(--gold)}
  footer{text-align:center;padding:24px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.12em;color:var(--text-muted);text-transform:uppercase;border-top:1px solid rgba(201,168,76,0.06)}
</style>
</head>

<script>
const CHANGELOG = [{"version": "v12.29", "date_el": "Ιούλιος 2026", "items_el": ["💛 Το δεύτερο μέταλλο φαίνεται πλέον στο showroom: ένα ασημένιο δαχτυλίδι με χρυσή κεφαλή δείχνει τώρα «ΑΣΗΜΙ 925» ΚΑΙ «ΧΡΥΣΟΣ 14K» στην κάρτα, και μέσα στη λεπτομέρεια «Ασήμι 925 + Χρυσός 14K» με «9.5 g + 1.3 g». Το ίδιο και στη σελίδα του κομματιού (QR).", "ℹ️ Ισχύει για όλα τα υπάρχοντα κομμάτια — μόλις ανοίξετε την καρτέλα Απόθεμα, το showroom ενημερώνεται μόνο του."], "date_en": "Jul 2026", "items_en": ["💛 The second metal now shows in the showroom: a silver ring with a gold face reads «SILVER 925» AND «GOLD 14K» on the card, and inside the detail «Silver 925 + Gold 14K» with «9.5 g + 1.3 g». Same on the item's own QR page.", "ℹ️ This applies to every existing piece — the showroom updates itself the next time you open the Stock tab."]},
{"version": "v12.28", "date_el": "Ιούλιος 2026", "items_el": ["🏪 Διόρθωση στη διαγραφή κατηγορίας προμηθευτή όταν ο ίδιος προμηθευτής έχει ΔΥΟ κατηγορίες με το ίδιο όνομα (π.χ. δύο «Μενταγιόν» στον Kyklos): πριν, η διαγραφή της μιας μάζευε και τα κομμάτια της ΑΛΛΗΣ, και δεν σας άφηνε να τα μεταφέρετε στη δίδυμη. Τώρα μετράει μόνο τα κομμάτια της συγκεκριμένης γραμμής και σας προσφέρει και τη δίδυμη ως προορισμό.", "✅ Η μεταφορά κομματιών ελέγχει πλέον ότι όντως αποθηκεύτηκε· αν αποτύχει (κακό σήμα) το λέει και δεν σβήνει τη γραμμή."], "date_en": "Jul 2026", "items_en": ["🏪 Fix for deleting a vendor category when the same vendor has TWO categories with the same name (e.g. two «Μενταγιόν» at Kyklos): deleting one used to sweep up the OTHER one's pieces as well, and would not let you move them to the twin. It now counts only that row's own pieces and offers the twin as a destination.", "✅ Moving pieces now checks that the save actually landed; if it fails (bad signal) it says so and does not remove the row."]},
{"version": "v12.27", "date_el": "Ιούλιος 2026", "items_el": ["🛒 Το καλάθι δεν χάνεται πια: αν κλείσει η εφαρμογή ή ανανεωθεί η σελίδα (π.χ. το κινητό «σκοτώσει» την εφαρμογή στο παρασκήνιο), το καλάθι επιστρέφει όπως ήταν — με ένα μήνυμα που λέει τι ώρα φτιάχτηκε.", "🕗 Επιστρέφει ΜΟΝΟ καλάθι της ίδιας ημέρας και μέχρι 12 ώρες παλιό — χθεσινό καλάθι δεν ξαναεμφανίζεται (οι τιμές του ήταν με τον τότε χρυσό). Η «Εκκαθάριση Καλαθιού» το σβήνει οριστικά, όπως πάντα."], "date_en": "Jul 2026", "items_en": ["🛒 The cart is no longer lost: if the app closes or the page reloads (e.g. the phone kills it in the background), the cart comes back exactly as it was — with a message telling you what time it was built.", "🕗 Only a cart from the SAME day and under 12 hours old comes back — yesterday's cart never reappears (its prices were at that day's gold). “Clear cart” still wipes it for good."]},
{"version": "v12.26", "date_el": "Ιούλιος 2026", "items_el": ["📝 Προσφορές για παραγγελίες: ανοίγετε δελτίο παραγγελίας ΧΩΡΙΣ προκαταβολή και αποθηκεύεται ως «Προσφορά». Όταν μάθετε την τιμή, τη συμπληρώνετε και τη στέλνετε με WhatsApp / SMS / Email με έτοιμο μήνυμα (περιγραφή, τιμή, ζητούμενη προκαταβολή, πότε θα είναι έτοιμο).", "💶 Μόλις ο πελάτης δεχτεί και δώσει προκαταβολή, πατάτε «Προκαταβολή → παραγγελία» και η προσφορά γίνεται κανονική παραγγελία, όπως πριν.", "📄 Η προσφορά εκτυπώνεται/στέλνεται και σε PDF με τίτλο «ΠΡΟΣΦΟΡΑ» και τους σωστούς όρους.", "🛒 ΣΟΒΑΡΗ ΔΙΟΡΘΩΣΗ στο καλάθι: σε κράτηση με 2+ είδη, ΟΛΑ έπαιρναν τον κωδικό και τη φωτογραφία του τελευταίου είδους που είχατε σκανάρει — και κρατιόταν/κρυβόταν από το showroom μόνο εκείνο. Τώρα κάθε είδος του καλαθιού κρατάει το ΔΙΚΟ του κομμάτι, από τη στιγμή που μπαίνει στο καλάθι.", "🛒 Αν κάποιο είδος του καλαθιού δεν βρεθεί στο απόθεμα (πουλήθηκε στο μεταξύ, ή μπήκε δύο φορές), το λέει με το όνομά του και ρωτάει πριν συνεχίσει — δεν το παραλείπει σιωπηλά.", "🔒 Μετά από κράτηση, το καλάθι αδειάζει (ώστε να μην πουληθούν κατά λάθος τα ίδια κομμάτια), και η «Πώληση Όλων» προειδοποιεί αν κάποιο κομμάτι είναι κρατημένο για πελάτη."], "date_en": "Jul 2026", "items_en": ["📝 Quotes for custom orders: open a custom-order ticket with NO deposit and it is saved as a “Quote”. When you know the price you fill it in and send it by WhatsApp / SMS / Email with a ready-made message (description, price, deposit asked, ready-by date).", "💶 Once the customer accepts and pays a deposit, tap “Deposit → start order” and the quote becomes a normal custom order, exactly as before.", "📄 A quote can also be printed/shared as a PDF titled “QUOTE”, with the right terms.", "🛒 SERIOUS CART FIX: on a hold with 2+ items, EVERY line took the ref code and photo of the last piece you had scanned — and only that one piece was actually reserved and hidden from the showroom. Each cart line now keeps its OWN piece, pinned the moment it goes into the cart.", "🛒 If a cart line can't be found in stock (sold meanwhile, or added twice) it is named and you are asked before anything proceeds — never skipped in silence.", "🔒 After a hold, the cart is emptied (so the same pieces can't be sold by mistake), and “Sell all” warns if a piece is on hold for a customer."]},
{"version": "v12.25", "date_el": "Ιούλιος 2026", "items_el": ["🔎 Διόρθωση: η πλήρης οθόνη των καρτών σύνοψης εμφανιζόταν πίσω από τη λίστα. Τώρα ανοίγει σωστά πάνω από όλα. (1ο πάτημα = ανάλυση, 2ο = πλήρης οθόνη, πάτημα ξανά = κανονικό μέγεθος.)"], "date_en": "Jul 2026", "items_en": ["🔎 Fix: the full-screen summary-card view was appearing behind the list. It now opens correctly on top of everything. (1st tap = breakdown, 2nd = full screen, tap again = normal size.)"]},
{"version": "v12.24", "date_el": "Ιούλιος 2026", "items_el": ["🔎 Οι κάρτες σύνοψης του Αποθέματος ανοίγουν πλέον σε πλήρη οθόνη με μεγάλα, ευανάγνωστα νούμερα. 1ο πάτημα = ανάλυση (όπως πριν), 2ο πάτημα = πλήρης οθόνη, πάτημα ξανά = επιστροφή στο κανονικό μέγεθος."], "date_en": "Jul 2026", "items_en": ["🔎 The Stock summary cards now open full-screen with big, easy-to-read numbers. 1st tap = breakdown (as before), 2nd tap = full screen, tap again = back to normal size."]},
{"version": "v12.23", "date_el": "Ιούλιος 2026", "items_el": ["💰 Η κάρτα «Κόστος» κρύβεται πλέον από προεπιλογή, ώστε η σύνοψη να παραμένει καθαρή με 3 κάρτες. Για να τη δείτε, ανοίξτε τα Φίλτρα και πατήστε τον διακόπτη «💰 Εμφάνιση κόστους». Η επιλογή θυμάται την προτίμησή σας."], "date_en": "Jul 2026", "items_en": ["💰 The \"Total Cost\" card is now hidden by default, so the summary stays clean with 3 cards. To see it, open Filters and tap the \"💰 Show cost\" switch. It remembers your choice."]},
{"version": "v12.22", "date_el": "Ιούλιος 2026", "items_el": ["💰 Νέα κάρτα «Κόστος» στη σύνοψη του Αποθέματος — δείχνει το συνολικό κόστος των ειδών που βλέπετε (με τα φίλτρα). Φιλτράρετε π.χ. προμηθευτή + σημερινή ημερομηνία και συγκρίνετε το σύνολο με το τιμολόγιο του προμηθευτή. Πατήστε την κάρτα για ανάλυση σε χρυσό / ασήμι / άλλο."], "date_en": "Jul 2026", "items_en": ["💰 New \"Total Cost\" card in the Stock summary — shows the total cost of the items you're viewing (with filters applied). Filter e.g. by vendor + today's date and compare the total against the vendor's invoice. Tap the card for a gold / silver / other breakdown."]},
{"version": "v12.21", "date_el": "Ιούλιος 2026", "items_el": ["🧱 Στην οθόνη τελικής τιμής (μεγεθυσμένη), τα είδη «Άλλο» δείχνουν πλέον το ΥΛΙΚΟ (Ασήμι, Επιχρυσωμένος Ορείχαλκος…) αντί για το άσχημο «Άλλο».", "⚖️ Και δεν εμφανίζεται πια η γραμμή «Βάρος 0,00γρ.» για είδη «Άλλο»."], "date_en": "Jul 2026", "items_en": ["🧱 On the enlarged final-price screen, \"Other\" items now show the MATERIAL (Silver, Gold Plated Brass…) instead of the ugly \"Other\".", "⚖️ And the \"Weight 0.00g\" line no longer shows for \"Other\" items."]}, {"version": "v12.20", "date_el": "Ιούλιος 2026", "items_el": ["🔎 Φίλτρο «Υλικό» στο online showroom — οι πελάτες βρίσκουν π.χ. Ορείχαλκο ή Ανοξείδωτο Ατσάλι με ένα άγγιγμα.", "💎 Πέτρες κατά τη δημιουργία: επιλέξτε πέτρες (χωρίς καράτια/σχήμα) απευθείας στην οθόνη ετικέτας ενός είδους «Άλλο» — όχι μόνο στην Επεξεργασία.", "🧱 Ολοκληρώνει το πεδίο «Υλικό» (v12.19): εμφανίζεται σε κάρτα, showroom και σελίδα κομματιού, σε Ελληνικά & Αγγλικά."], "date_en": "Jul 2026", "items_en": ["🔎 \"Material\" filter in the online showroom — customers find e.g. Brass or Stainless Steel in one tap.", "💎 Stones at creation: pick stones (no carat/shape) right on the label screen for an \"Other\" item — not just in Edit.", "🧱 Completes the \"Material\" field (v12.19): shows on the card, the showroom and the item page, in Greek & English."]}, {"version": "v12.19", "date_el": "Ιούλιος 2026", "items_el": ["🧱 Υλικό για είδη «Άλλο»: νέο πεδίο — επιλέξτε υλικό (Επιχρυσωμένος Ορείχαλκος, Ανοξείδωτο Ατσάλι, Μπρούτζος…) αντί να το γράφετε στην περιγραφή. Στη δημιουργία ετικέτας και στην Επεξεργασία.", "💎 Πέτρες με ένα άγγιγμα (χωρίς καράτια/σχήμα) για είδη «Άλλο» — στην Επεξεργασία του κομματιού.", "🛍️ Το υλικό και οι πέτρες εμφανίζονται πλέον καθαρά στο online showroom και στη σελίδα κομματιού, σε Ελληνικά & Αγγλικά αυτόματα."], "date_en": "Jul 2026", "items_en": ["🧱 Material for \"Other\" items: a new field — pick the material (Gold Plated Brass, Stainless Steel, Bronze…) instead of typing it into the description. On the label screen and in Edit.", "💎 One-tap stones (no carat/shape) for \"Other\" items — in Edit Item.", "🛍️ Material and stones now show cleanly in the online showroom and the item page, in Greek & English automatically."]}, {"version": "v12.18", "date_el": "Ιούλιος 2026", "items_el": ["🔀 Ένας προμηθευτής μπορεί πλέον να έχει ΚΑΙ μεταλλικές (χρυσό/ασήμι) ΚΑΙ «άλλες» κατηγορίες (μπρούτζο, ατσάλι…) μαζί — δεν χρειάζεται ξεχωριστός προμηθευτής.", "⚙️ Επεξεργασία προμηθευτή → εναλλαγή «Μέταλλο»/«Άλλο» για να προσθέσετε κάθε είδος· αποθηκεύονται και τα δύο (δεν σβήνει πια τίποτα).", "🧮 Στον υπολογισμό, το κουμπί μετάλλου δείχνει τις σωστές κατηγορίες: Χρυσός/Ασήμι → μεταλλικές, Άλλο → «άλλες».", "🔒 Οι υπάρχουσες τιμές, κωδικοί και ετικέτες όλων των κομματιών μένουν ακριβώς ίδιες (ελεγμένο σε όλο το πραγματικό απόθεμα)."], "date_en": "Jul 2026", "items_en": ["🔀 A vendor can now hold BOTH metal (gold/silver) AND \"other\" categories (bronze, steel…) at once — no need for a separate vendor.", "⚙️ Edit vendor → switch Metal/Other to add each kind; both are saved (nothing gets wiped anymore).", "🧮 In Calc, the metal button shows the right set: Gold/Silver → metal categories, Other → \"other\" categories.", "🔒 Every existing item's price, code and tag stays exactly the same (verified across the whole real inventory)."]}, {"version": "v12.16", "date_el": "Ιούλιος 2026", "items_el": ["🎁 Δώρο σε πελάτη — δώστε ένα μικρό κομμάτι (συνήθως στάσιμο) χωρίς πώληση. Πατήστε το 🎁 στην κάρτα του κομματιού.", "📦 Αφαιρείται από το απόθεμα (σωστές μετρήσεις & απογραφή) και το κόστος του καταγράφεται ως έξοδο καλής θέλησης — μηδέν έσοδο, αλλά το κέρδος της περιόδου δείχνει πόσο κόστισε το δώρο.", "↩️ Αν το διαγράψετε από τις Πωλήσεις, το κομμάτι επιστρέφει στο απόθεμα. Το κάνουν και οι υπάλληλοι."], "date_en": "Jul 2026", "items_en": ["🎁 Give as a gift — hand a small (usually slow-moving) piece to a customer with no sale. Tap the 🎁 on the item's card.", "📦 It leaves stock (so counts & the stocktake stay right) and its cost is booked as a goodwill expense — zero revenue, but the period's profit shows what the gift cost.", "↩️ Deleting it from Sales puts the piece back in stock. Employees can do it too."]}, {"version": "v12.15", "date_el": "Ιούλιος 2026", "items_el": ["🖼️ Φωτογραφία σε κάθε κομμάτι μέσα στην ομάδα — πατήστε την για μεγέθυνση σε πλήρη οθόνη.", "🔁 Αν τα κομμάτια είναι ίδια, η φωτογραφία εμφανίζεται μία φορά, στο πρώτο· αν διαφέρουν (π.χ. κόκκινο και γαλάζιο), το καθένα δείχνει τη δική του."], "date_en": "Jul 2026", "items_en": ["🖼️ A photo on every piece inside a group — tap it to enlarge full-screen.", "🔁 Identical pieces show the photo once, on the first one; pieces that differ (a red and a light blue) each show their own."]}, {"version": "v12.14","date_el": "Ιούλιος 2026", "items_el": ["✨ Αυτόματη στρογγυλοποίηση τιμής: σκανάρετε ένα κομμάτι και ο πελάτης βλέπει 240,00 αντί για 239,42.", "🎯 Στρογγυλοποιεί στα πλησιέστερα 5 €: 80, 85, 90, 155, 160, 1205… (82,49 → 80 · 82,50 → 85).", "🔓 Η ακριβής τιμή δεν χάνεται πουθενά — πατήστε το ✕ δίπλα στη στρογγυλοποίηση και επανέρχεται.", "💶 Κομμάτια κάτω από 20 € κρατούν την ακριβή τους τιμή.", "⚙️ Ρυθμίσεις → Φόρος & Περιθώριο: απενεργοποιήστε το ή αλλάξτε βήμα (1 €, 5 €, 10 €) και κατώφλι όποτε θέλετε.", "📄 Η στρογγυλεμένη τιμή περνά στην πώληση, στο καλάθι και στην προσφορά· η καρτέλα του κομματιού κρατά την ακριβή τιμή."], "date_en": "Jul 2026", "items_en": ["✨ Automatic price rounding: scan a piece and the customer sees 240.00 instead of 239.42.", "🎯 Rounds to the nearest €5: 80, 85, 90, 155, 160, 1205… (82.49 → 80 · 82.50 → 85).", "🔓 The exact price is never lost — tap the ✕ next to the rounding box and it comes straight back.", "💶 Pieces under €20 keep their exact price.", "⚙️ Settings → Tax & Margin: switch it off, or change the step (€1, €5, €10) and the threshold, whenever you like.", "📄 The rounded price carries into the sale, the cart and the quote; the piece's own record keeps the exact price."]}, {"version": "v12.13","date_el": "Ιούλιος 2026", "items_el": ["✨ Νέο πεδίο «Επιχρύσωση» για τα ασημένια: επιχρυσωμένο, ροζ επιχρυσωμένο, επιπλατινωμένο και οι συνδυασμοί δύο τόνων.", "📍 Στα ίδια σημεία με το χρώμα χρυσού: Υπολογισμός → Ετικέτα, Απόθεμα → Επεξεργασία, «Προσθήκη παρόμοιων», και «Επεξεργασία όλων» της ομάδας.", "🌐 Στη βιτρίνα η κάρτα γράφει «Επιχρυσωμένο Ασήμι 925» — και διορθώθηκε το λανθασμένο «925K».", "🔗 Δύο επιχρυσώσεις της ίδιας ομάδας εμφανίζονται ως ξεχωριστές κάρτες στη βιτρίνα.", "🔎 Νέο φίλτρο «Επιχρύσωση» στο Απόθεμα και στη βιτρίνα."], "date_en": "Jul 2026", "items_en": ["✨ New \"Plating\" field for silver pieces: gold plated, rose gold plated, platinum plated and the two-tone combinations.", "📍 In the same places as gold colour: Calc → Tag, Stock → Edit, \"Add similar items\", and the group's \"Edit all\".", "🌐 The showroom card now reads \"Gold Plated Silver 925\" — and the incorrect \"925K\" is fixed.", "🔗 Two platings of the same group show as separate showroom cards.", "🔎 New \"Plating\" filter in Stock and in the showroom."]}, {"version": "v12.11", "date_el": "Ιούλιος 2026", "items_el": ["🚚 Ρυθμίσεις → «Μεταφορά Φωτογραφιών στο Cloudinary»: αντιγράφει όλες τις παλιές φωτογραφίες από το ImgBB.", "🛡️ Τίποτα δεν σβήνεται· κάθε κόσμημα αλλάζει μόνο αφού η νέα του φωτογραφία δουλέψει.", "⏸️ Σταματάει και ξανατρέχει όποτε θες.", "💡 Οι περιγραφές αναζήτησης μεταφέρονται μαζί, χωρίς να ξαναγραφούν."], "date_en": "Jul 2026", "items_en": ["🚚 Settings → \"Move Photos to Cloudinary\": copies all your old photos across from ImgBB.", "🛡️ Nothing is deleted; a piece changes only once its new photo works.", "⏸️ Stop and re-run whenever you like.", "💡 The photo-search descriptions move with them, unrewritten."]}, {"version": "v12.10", "date_el": "Ιούλιος 2026", "items_el": ["☁️ Οι φωτογραφίες μπορούν πλέον να ανεβαίνουν στο Cloudinary αντί για το ImgBB: Συγχρονισμός → Cloudinary.", "🧪 Το «Δοκιμή & Αποθήκευση» ανεβάζει πραγματική δοκιμαστική εικόνα· αν δεν δουλέψει, δεν αποθηκεύεται τίποτα.", "🔀 Διακόπτης «Νέες φωτογραφίες πάνε σε»: ImgBB ή Cloudinary.", "🖼️ Οι παλιές φωτογραφίες ΔΕΝ πειράζονται."], "date_en": "Jul 2026", "items_en": ["☁️ Photos can now go to Cloudinary instead of ImgBB: Sync → Cloudinary.", "🧪 \"Test & Save\" uploads a real test image; if it doesn't work, nothing is saved.", "🔀 A \"New photos go to\" switch: ImgBB or Cloudinary.", "🖼️ Existing photos are NOT touched."]}, {"version": "v12.09", "date_el": "Ιούλιος 2026", "items_el": ["📷 Το κλειδί ανεβάσματος φωτογραφιών μπαίνει πλέον από την εφαρμογή: Συγχρονισμός → «Κλειδί Ανεβάσματος Φωτογραφιών».", "🔑 Αν το ImgBB κόψει το κλειδί, βγάζεις νέο και το αλλάζεις μόνος σου σε δευτερόλεπτα.", "🧪 Το «Δοκιμή & Αποθήκευση» ανεβάζει πραγματική δοκιμαστική εικόνα και δείχνει ακριβώς τι απαντά το ImgBB· κλειδί που δεν δουλεύει δεν αποθηκεύεται.", "🔒 Το κλειδί έφυγε από το δημόσιο αρχείο της εφαρμογής."], "date_en": "Jul 2026", "items_en": ["📷 The photo upload key is now set from inside the app: Sync → \"Photo Upload Key\".", "🔑 If ImgBB cuts off your key, make a new one and swap it yourself in seconds.", "🧪 \"Test & Save\" uploads a real test image and shows exactly what ImgBB replies; a key that doesn't work is not saved.", "🔒 The key is out of the app's public file."]}, {"version": "v12.08", "date_el": "Ιούλιος 2026", "items_el": ["🔎 Τα ΝΕΑ κομμάτια δεν έπαιρναν ποτέ περιγραφή για την αναζήτηση με φωτογραφία.", "🐛 Η αυτόματη περιγραφή έψαχνε το κομμάτι στη λίστα πριν προλάβει να μπει σε αυτήν, οπότε το προσπερνούσε αθόρυβα.", "✅ Πλέον κάθε νέο κομμάτι περιγράφεται μόλις αποθηκευτεί.", "🔁 Για όσα προστέθηκαν στο μεταξύ, τρέξε μία φορά τη δημιουργία περιγραφών από τις Ρυθμίσεις."], "date_en": "Jul 2026", "items_en": ["🔎 NEW pieces never got a photo-search description.", "🐛 The automatic description looked the piece up in the stock list before it had been added to it, so it skipped it in silence.", "✅ Every new piece is now described the moment it is saved.", "🔁 For the ones added in between, run the description build once from Settings."]}, {"version": "v12.07", "date_el": "Ιούλιος 2026", "items_el": ["🏷️ Οι ετικέτες από τα «Όμοια είδη» τύπωναν το ΚΕΙΜΕΝΟ του κωδικού αναφοράς αλλά το QR έκρυβε τον παλιό κοινό κωδικό — γι' αυτό ρωτούσε ακόμα «ποιο κρατάς;».", "✅ Τώρα το QR έχει τον κωδικό αναφοράς, όπως σε κάθε άλλη εκτύπωση.", "🔁 Το ίδιο διορθώθηκε στην επανεκτύπωση μετά από αλλαγή πέτρας και στο restock.", "⚠️ Οι ήδη τυπωμένες ετικέτες θέλουν ξανά τύπωμα."], "date_en": "Jul 2026", "items_en": ["🏷️ Tags from \"Add similar items\" showed the reference code as TEXT but hid the old shared code in the QR — which is why it still asked \"which one are you holding?\".", "✅ The QR now carries the reference code, like every other print path.", "🔁 Same fixed for the stone-change reprint and for restock.", "⚠️ Tags already printed need reprinting."]}, {"version": "v12.06", "date_el": "Ιούλιος 2026", "items_el": ["↩️ Πίσω στον έναν έλεγχο ανά φωτογραφία — όπως ήταν όταν ανέβηκαν πάνω από 1000 φωτογραφίες χωρίς πρόβλημα.", "⚠️ Οι 4 προσπάθειες της v12.05 έκαναν μέχρι 8 αιτήματα ανά κόσμημα σε 5 δευτερόλεπτα, ακριβώς όταν το ImgBB ήδη αρνιόταν.", "🗣️ Κρατήθηκε μόνο το χρήσιμο: αν αποτύχει, λέει ΓΙΑΤΙ."], "date_en": "Jul 2026", "items_en": ["↩️ Back to one try per photo — the way it was when 1000+ photos uploaded without a single problem.", "⚠️ The 4 retries in v12.05 meant up to 8 requests per jewel in 5 seconds, precisely when ImgBB was already refusing.", "🗣️ Only the useful half was kept: if it fails, it says WHY."]}, {"version": "v12.05", "date_el": "Ιούλιος 2026", "items_el": ["📷 Η φωτογραφία ξαναδοκιμάζει μόνη της μέχρι 4 φορές αν το ImgBB κάνει στιγμιαία κοιλιά — πριν, μία άτυχη στιγμή την έχανε οριστικά.", "🗣️ Αν τελικά αποτύχει, λέει πλέον ΓΙΑΤΙ αντί για ένα σκέτο «απέτυχε».", "🔍 Κομμάτια χωρίς φωτογραφία: Απόθεμα → Φίλτρα → «📷 Χωρίς φωτογραφία»."], "date_en": "Jul 2026", "items_en": ["📷 A photo now retries by itself up to 4 times if ImgBB has a momentary wobble — before, one unlucky moment lost it for good.", "🗣️ If it does fail it now says WHY, instead of just \"failed\".", "🔍 Pieces with no photo: Stock → Filters → \"📷 No photo\"."]}, {"version": "v12.04", "date_el": "Ιούλιος 2026", "items_el": ["🔒 Ο κωδικός του Showroom αλλάζει πλέον μέσα από την εφαρμογή: Συγχρονισμός → «Κωδικός Showroom».", "🔓 Μπορεί και να σβηστεί τελείως, ώστε το Showroom να ανοίγει σε όλους.", "👁️ Φαίνεται καθαρά στην εφαρμογή, αλλά στο διαδίκτυο ανεβαίνει μόνο κρυπτογραφημένος."], "date_en": "Jul 2026", "items_en": ["🔒 The showroom code can now be changed from inside the app: Sync → \"Showroom Code\".", "🔓 It can also be switched off completely so the showroom is open to everyone.", "👁️ It is shown in plain text in the app, but only an encrypted form is published online."]}, {"version": "v12.03", "date_el": "Ιούλιος 2026", "items_el": ["🔑 Νέα «Κάρτα Ανάκτησης» στο Συγχρονισμό — Firebase URL + Database Secret, με Αντιγραφή και Εκτύπωση. Τύπωσέ την και βάλ' την στο χρηματοκιβώτιο.", "🛟 Είναι το μόνο πράγμα που δεν επιστρέφει μόνο του από το cloud.", "🔒 Η εφαρμογή ζητά «μόνιμη αποθήκευση», ώστε ο browser να μη σβήνει μόνος του δεδομένα όταν γεμίσει το κινητό."], "date_en": "Jul 2026", "items_en": ["🔑 New \"Recovery Card\" in Sync — Firebase URL + Database Secret, with Copy and Print. Print it and put it in the safe.", "🛟 It is the one thing that cannot come back from the cloud by itself.", "🔒 The app now asks for \"persistent storage\", so the browser won't quietly discard data when the phone runs low on space."]}, {"version": "v12.02", "date_el": "Ιούλιος 2026", "items_el": ["🔕 Τέλος το «Αποθήκευση κωδικού;» του browser σε κάθε αλλαγή καρτέλας — δεν υπάρχει σύνδεση με κωδικό εδώ.", "🧹 Σταματάει και το να γεμίζουν μόνα τους κάποια πεδία με άσχετους αριθμούς (π.χ. 5.8 από βάρος).", "👁️ Τα μυστικά πεδία στο Συγχρονισμό δείχνουν κανονικά τελείες, όπως πριν."], "date_en": "Jul 2026", "items_en": ["🔕 No more \"Save password?\" from the browser on every tab change — there is no password login in this app.", "🧹 It also stops stray numbers autofilling into fields (e.g. 5.8 from a weight).", "👁️ The secret fields in Sync still show dots exactly as before."]}, {"version": "v12.01", "date_el": "Ιούλιος 2026", "items_el": ["🔎 Το «Τι βλέπει η αναζήτηση με φωτογραφία» βγήκε από την Επεξεργασία.", "⚙️ Ανάβει από Ρυθμίσεις → «Έλεγχος Αναζήτησης με Φωτογραφία», κλειστό από προεπιλογή."], "date_en": "Jul 2026", "items_en": ["🔎 \"What the photo search sees\" is out of the Edit form.", "⚙️ Switch it on in Settings → \"Photo Search Check\"; off by default."]}, {"version": "v12.00", "date_el": "Ιούλιος 2026", "items_el": ["🔍 Το AI πλέον μόνο κοιτάζει τη φωτογραφία· η εφαρμογή ψάχνει τον κατάλογο μόνη της.", "🎯 Ζυγίζονται οι σπάνιες λέξεις — «δελφίνια» κρίνει, «χρυσό» όχι.", "✅ Στα δικά σου δεδομένα το μενταγιόν βρίσκεται πρώτο."], "date_en": "Jul 2026", "items_en": ["🔍 The AI now only looks at the photo; the app searches the catalogue itself.", "🎯 Rare words are weighted — \"dolphins\" decides, \"gold\" does not.", "✅ On your own data the pendant now comes back first."]}, {"version": "v11.99", "date_el": "Ιούλιος 2026", "items_el": ["💳 Τα 42 απέτυχαν επειδή τελείωσαν τα credits στο OpenRouter, όχι από λάθος της εφαρμογής.", "🗣️ Τα σφάλματα εμφανίζονται πλέον σε απλά ελληνικά αντί για κωδικούς."], "date_en": "Jul 2026", "items_en": ["💳 The 42 failed because the OpenRouter credit ran out, not because of an app fault.", "🗣️ Errors are now shown in plain language instead of status codes."]}, {"version": "v11.98", "date_el": "Ιούλιος 2026", "items_el": ["💬 Οι αποτυχίες λένε πλέον γιατί και ποια κομμάτια — το μήνυμα το έσβηνε το ίδιο το πάνελ.", "🔢 π.χ. «⚠️ 42 απέτυχαν — 42× ai-http-429» με τους κωδικούς."], "date_en": "Jul 2026", "items_en": ["💬 Failures now say why and which pieces — the panel had been wiping its own message.", "🔢 e.g. \"⚠️ 42 failed — 42× ai-http-429\" with the reference codes."]}, {"version": "v11.97", "date_el": "Ιούλιος 2026", "items_el": ["🔧 Τα 42 που κολλούσαν έφταιγαν στο δικό μου φίλτρο κατά της αντιγραφής — απέρριπτε αληθινές περιγραφές αλυσίδων.", "✅ Το φίλτρο κρίνει πλέον ΟΛΗ την πρόταση, όχι κοινές λέξεις.", "💬 Οι αποτυχίες λένε πλέον γιατί και ποια κομμάτια."], "date_en": "Jul 2026", "items_en": ["🔧 The 42 stuck pieces were my own anti-copying filter rejecting genuine chain descriptions.", "✅ The filter now judges the WHOLE sentence, not shared vocabulary.", "💬 Failures now say why, and which pieces."]}, {"version": "v11.96", "date_el": "Ιούλιος 2026", "items_el": ["⚠️ Το «καλό παράδειγμα» προς το AI ήταν γραμμένο από το δικό σου μενταγιόν και το AI το γύρισε αυτούσιο.", "🧪 Τα παραδείγματα δεν περιγράφουν πια υπαρκτά κομμάτια, και κάθε αντιγραφή παραδείγματος απορρίπτεται αυτόματα.", "🐬 Η λέξη «δελφίνια» αφαιρέθηκε από τις οδηγίες."], "date_en": "Jul 2026", "items_en": ["⚠️ The \"good example\" given to the AI was written from your own pendant, and the AI returned it verbatim.", "🧪 Examples no longer describe real pieces, and any answer copying an example is rejected automatically.", "🐬 The word \"dolphins\" was removed from the instructions."]}, {"version": "v11.95", "date_el": "Ιούλιος 2026", "items_el": ["🎯 Το πρόβλημα ήταν οι οδηγίες προς το AI: γραμμένες σαν λίστα, το AI επέστρεφε τις λέξεις της λίστας αντί να περιγράψει.", "📊 Στα 698: 87% λίστες λέξεων, 33% ολόιδιες μεταξύ τους.", "✍️ Τώρα ζητείται πρόταση, με παραδείγματα σωστού και λάθους.", "⚠️ Κάθε σάρωση ελέγχει μόνη της την ποιότητα και σε ειδοποιεί."], "date_en": "Jul 2026", "items_en": ["🎯 The problem was my instructions to the AI: written as a checklist, so it returned the checklist words instead of describing.", "📊 Across 698: 87% word lists, 33% identical to each other.", "✍️ It now asks for a sentence, with worked right and wrong examples.", "⚠️ Every scan checks its own quality and warns you."]}, {"version": "v11.94", "date_el": "Ιούλιος 2026", "items_el": ["🔎 Στην Επεξεργασία βλέπεις «Τι βλέπει η αναζήτηση με φωτογραφία» για κάθε κομμάτι.", "↻ Κουμπί για να ξαναγραφεί η περιγραφή μόνο αυτού του κομματιού."], "date_en": "Jul 2026", "items_en": ["🔎 Editing a piece now shows \"What the photo search sees\" for it.", "↻ A button rewrites the description for just that one piece."]}, {"version": "v11.93", "date_el": "Ιούλιος 2026", "items_el": ["🔆 Δεν σταματάει όταν σβήνει η οθόνη — η εφαρμογή την κρατάει ξύπνια όσο τρέχει.", "🚀 Τέσσερις φωτογραφίες ταυτόχρονα: από ώρες σε λίγα λεπτά, με ίδια ποιότητα.", "⏹️ Η «Διακοπή» δουλεύει και με τα τέσσερα παράλληλα· συνεχίζει από εκεί που έμεινε.", "💡 Τρέχει και από τον υπολογιστή, αν προτιμάς."], "date_en": "Jul 2026", "items_en": ["🔆 It no longer stops when the screen goes off — the app holds the screen awake while it runs.", "🚀 Four photos at a time: hours become minutes, with no change in quality.", "⏹️ Stop works with all four running; it resumes from where it left off.", "💡 It runs from the computer too, if you prefer."]}, {"version": "v11.92", "date_el": "Ιούλιος 2026", "items_el": ["🔬 Οι περιγραφές γράφονταν από τη μικρή φωτογραφία (270×480), όπου ένα χαραγμένο θέμα πιάνει ~89 pixel — δεν φαινόταν.", "🖼️ Τώρα γράφονται από τη φωτογραφία υψηλής ανάλυσης (675×1200).", "🐬 Το AI ονομάζει πρώτα το θέμα (δελφίνι, χελώνα, σταυρός…) και κοιτάζει μέσα στο κεντρικό δισκάκι. Όριο 30 λέξεις αντί 14.", "🎯 Δύο φωτογραφίες ανά κλήση αντί για τέσσερις.", "🔄 Ξαναπάτησε «Δημιουργία περιγραφών» για να ξαναγραφούν όλες (~€0.60–1)."], "date_en": "Jul 2026", "items_en": ["🔬 Descriptions were written from the small photo (270×480), where an engraved subject lands on ~89 pixels — invisible.", "🖼️ They are now written from the high-resolution photo (675×1200).", "🐬 The AI names the subject first (dolphin, turtle, cross…) and looks inside the central disc. 30-word limit instead of 14.", "🎯 Two photos per request instead of four.", "🔄 Press \"Build search descriptions\" again to rewrite them all (~€0.60–1)."]}, {"version": "v11.91", "date_el": "Ιούλιος 2026", "items_el": ["🔍 Πάτα τη φωτογραφία ενός αποτελέσματος για να τη δεις ΜΕΓΑΛΗ.", "🖼️ Ανοίγει η φωτογραφία υψηλής ανάλυσης όπου υπάρχει· η λίστα φορτώνει με τις μικρές.", "📷 Πατιέται και η δική σου φωτογραφία, για σύγκριση.", "⚖️ Το ίδιο και στα αποτελέσματα αναζήτησης με βάρος."], "date_en": "Jul 2026", "items_en": ["🔍 Tap a result's photo to see it BIG.", "🖼️ It opens the high-resolution photo where one exists; the list still loads the small ones.", "📷 Your own photo is tappable too, for comparison.", "⚖️ Same in the weight search results."]}, {"version": "v11.90", "date_el": "Ιούλιος 2026", "items_el": ["🪄 Αυτόματο: κάθε νέο κόσμημα που αποθηκεύεις περιγράφεται μόνο του για την αναζήτηση.", "⚡ Δεν καθυστερεί τίποτα — η αποθήκευση τελειώνει αμέσως και η περιγραφή γράφεται από πίσω.", "💰 Αλλαγή τιμής ή βάρους δεν ξαναχρεώνεται· μόνο αλλαγή ΦΩΤΟΓΡΑΦΙΑΣ.", "🔗 Πολλά όμοια κομμάτια με την ίδια φωτογραφία περιγράφονται ΜΙΑ φορά.", "🤫 Σε αποτυχία μένει σιωπηλό — το κομμάτι εμφανίζεται στο κουμπί «Δημιουργία περιγραφών»."], "date_en": "Jul 2026", "items_en": ["🪄 Automatic: every new piece you save now describes itself for the photo search.", "⚡ It delays nothing — the save finishes instantly and the description is written behind it.", "💰 Changing a price or weight costs nothing extra; only changing the PHOTO rewrites it.", "🔗 Several similar pieces sharing one photo are described ONCE.", "🤫 On failure it stays quiet — the piece reappears in the \"Build search descriptions\" count."]}, {"version": "v11.89", "date_el": "Ιούλιος 2026", "items_el": ["🔍 Γιατί απέτυχαν τα ασημένια: το AI είδε τέλεια τη χελώνα, αλλά η γραμμή του κομματιού στον κατάλογο έγραφε μόνο «Μενταγιόν | ασήμι 925 | χωρίς πέτρες». Το 30% των ασημένιων δεν έχουν ούτε περιγραφή ούτε πέτρες.", "✍️ Νέο κουμπί «Δημιουργία περιγραφών για αναζήτηση»: το AI περιγράφει μία φορά κάθε φωτογραφία και από κει και πέρα βρίσκονται όλα.", "🔒 Γράφει σε ΝΕΟ πεδίο — οι δικές σου περιγραφές δεν αλλάζουν.", "⏱️ Μία φορά, με πρόοδο και διακοπή· συνεχίζει από εκεί που σταμάτησε.", "🎯 Τα φίλτρα περιορίζουν ήδη την αναζήτηση με φωτογραφία."], "date_en": "Jul 2026", "items_en": ["🔍 Why silver pieces failed: the AI saw the turtle perfectly, but the piece's catalogue line read only \"Pendant | silver 925 | no stones\". 30% of silver pieces have neither a description nor stones.", "✍️ New \"Build search descriptions\" button: the AI describes each photo once and from then on everything is findable.", "🔒 It writes to a NEW field — your own descriptions are not changed.", "⏱️ Runs once, with progress and a stop button; resumes where it left off.", "🎯 The filters already narrow the photo search."]}, {"version": "v11.88", "date_el": "Ιούλιος 2026", "items_el": ["🎯 Η αναζήτηση με φωτογραφία δείχνει ΜΟΝΟ το κομμάτι που βρήκε· τα υπόλοιπα πίσω από ένα «Δες και τα υπόλοιπα».", "🧹 Αφαιρέθηκε η τοπική αναζήτηση φωτογραφίας στη συσκευή — έδινε φτωχά αποτελέσματα και κόστιζε 42MB κατέβασμα και ευρετήριο.", "📉 Η εφαρμογή μίκρυνε κατά ~14KB· δεν χρειάζεται πια «χτίσιμο ευρετηρίου φωτογραφιών»."], "date_en": "Jul 2026", "items_en": ["🎯 The photo search shows ONLY the piece it found; the rest fold away behind \"Show the others\".", "🧹 Removed the on-device photo search — it gave poor results and cost a 42MB download plus an index.", "📉 The app is ~14KB smaller; there is no longer any \"build photo index\" step."]}, {"version": "v11.86", "date_el": "Ιούλιος 2026", "items_el": ["🤖 Το «Ταύτιση με φωτογραφία» χρησιμοποιεί τώρα AI και ψάχνει ΟΛΟ το απόθεμα — χωρίς να διαλέξεις φίλτρα πρώτα.", "💎 Στέλνει τη φωτογραφία μαζί με τον κατάλογό σου σε κείμενο (είδος, μέταλλο, ΠΕΤΡΕΣ, περιγραφή) αντί να συγκρίνει εικόνες με εικόνες.", "💬 Σου λέει τι νομίζει ότι βλέπει και γιατί διάλεξε το κάθε κομμάτι (ΣΙΓΟΥΡΟ / ΠΙΘΑΝΟ / ΑΒΕΒΑΙΟ).", "🛡️ Κωδικός που δεν υπάρχει αγνοείται — δεν εμφανίζεται ποτέ φανταστικό κόσμημα.", "📴 Χωρίς ίντερνετ ή κλειδί, γυρίζει στην τοπική αναζήτηση φωτογραφίας."], "date_en": "Jul 2026", "items_en": ["🤖 \"Match by photo\" now uses AI and searches your WHOLE stock — no need to pick filters first.", "💎 It sends your photo together with your catalogue as text (type, metal, STONES, description) instead of comparing pictures to pictures.", "💬 It tells you what it thinks it sees and why it chose each piece (CONFIDENT / LIKELY / UNSURE).", "🛡️ A code that does not exist is discarded — an invented piece never reaches the screen.", "📴 With no internet or no key it falls back to the on-device photo search."]}, {"version": "v11.85", "date_el": "Ιούλιος 2026", "items_el": ["🔐 ΣΗΜΑΝΤΙΚΟ: το κλειδί OpenRouter ήταν γραμμένο ΜΕΣΑ στο αρχείο της εφαρμογής, που είναι δημόσιο στο internet. Αφαιρέθηκε εντελώς.", "🔑 Νέο πεδίο «OpenRouter API Key» στην καρτέλα Συγχρονισμός (μόνο ιδιοκτήτης), αποθηκευμένο ιδιωτικά όπως το token του Telegram.", "✅ Η «Αποθήκευση κλειδιού» ελέγχει το κλειδί στο OpenRouter και δείχνει το όριο δαπάνης.", "⚠️ Ακύρωσε το παλιό κλειδί στο openrouter.ai και βάλε καινούργιο."], "date_en": "Jul 2026", "items_en": ["🔐 IMPORTANT: the OpenRouter key was written INSIDE the app file, which is public on the internet. It has been removed completely.", "🔑 New \"OpenRouter API Key\" field in the Sync tab (owner only), stored privately like the Telegram token.", "✅ \"Save key\" verifies the key with OpenRouter and shows your spend limit.", "⚠️ Revoke the old key at openrouter.ai and issue a new one."]}, {"version": "v11.84", "date_el": "Ιούλιος 2026", "items_el": ["📷 Ταύτιση με φωτογραφία στο «Βρες Κόσμημα». Έχασες την ετικέτα και το βάρος δεν βοηθάει (γιατί έχεις αφαιρέσει το βάρος των πετρών); Φωτογράφισε το κόσμημα και η εφαρμογή σου δείχνει τα πιο όμοια από το απόθεμα, με ποσοστό ταιριάσματος.", "🎯 Δουλεύει μαζί με τα φίλτρα: διάλεξε π.χ. Δαχτυλίδι + 18Κ και μετά φωτογράφισε — η σύγκριση γίνεται μόνο μέσα σε αυτά.", "🔒 Όλα γίνονται ΣΤΗ ΣΥΣΚΕΥΗ. Καμία φωτογραφία δεν φεύγει από το κινητό.", "⚙️ Την πρώτη φορά χρειάζεται ίντερνετ και ένα «χτίσιμο ευρετηρίου» των φωτογραφιών — μία φορά, λίγα λεπτά.", "⚖️ Το βάρος αγνοείται στην αναζήτηση με φωτογραφία — ακριβώς επειδή στα κομμάτια με πέτρες είναι μικρότερο από το πραγματικό."], "date_en": "Jul 2026", "items_en": ["📷 Match by photo in \"Find Jewelry\". Lost the tag and the weight can't help (because you deducted the stone weight)? Photograph the piece and the app shows the closest matches in your stock, with a match score.", "🎯 Works together with the filters: pick e.g. Ring + 18K first, then photograph — it compares only within those.", "🔒 Everything runs ON THE DEVICE. No photo ever leaves your phone.", "⚙️ The first time it needs internet and a one-off \"build photo index\" of your stock photos — a few minutes, once.", "⚖️ Weight is ignored in a photo search — precisely because a stone-set piece is stored lighter than it really is."]}, {"version": "v11.83", "date_el": "Ιούλιος 2026", "items_el": ["🆔 Ένας κωδικός = ένα κόσμημα. Στο «Προσθήκη όμοιων ειδών», αν το νέο κομμάτι διαφέρει σε ΒΑΡΟΣ, ΠΕΤΡΑ ή ΧΡΩΜΑ, παίρνει πλέον ΔΙΚΟ ΤΟΥ κωδικό αναφοράς (π.χ. ER0702) αντί να μοιράζεται τον ER0701. Το σκανάρισμα το βρίσκει κατευθείαν, χωρίς να σε ρωτάει «ποιο κρατάς;».", "🔗 Αν το νέο κομμάτι είναι ΟΛΟΪΔΙΟ, κρατάει τον ίδιο κωδικό όπως πριν — 12 ίδια δαχτυλίδια, ένας κωδικός, μία ετικέτα σε πολλά αντίτυπα. Μένουν και τα δύο στην ίδια ομάδα είτε έτσι είτε αλλιώς.", "🆔 Το παράθυρο σου λέει από πριν τι θα γίνει: «ίδιος κωδικός ER0701» ή «θα πάρει δικό του κωδικό».", "💎 Ο έλεγχος ταυτότητας κοιτάει τώρα και την ΠΕΤΡΑ — πριν έβλεπε μόνο βάρος και χρώμα.", "❓ Η ερώτηση «ποιο κρατάς;» παραμένει μόνο για τα παλιά κομμάτια που ήδη μοιράζονται κωδικό."], "date_en": "Jul 2026", "items_en": ["🆔 One code = one piece. In \"Add similar items\", a new piece that differs in WEIGHT, STONE or COLOUR now gets its OWN reference code (e.g. ER0702) instead of sharing ER0701. Scanning finds it directly, with no \"which one are you holding?\" question.", "🔗 A piece that is truly IDENTICAL keeps sharing the code exactly as before — 12 identical rings, one code, one label printed N times. Either way they stay in the same group.", "🆔 The sheet tells you up front which it will be: \"shares code ER0701\" or \"gets its own code\".", "💎 The identity check now looks at the STONE too — it previously compared only weight and colour.", "❓ The \"which one?\" question remains only for older pieces that already share a code."]}, {"version": "v11.82", "date_el": "Ιούλιος 2026", "items_el": ["💎 Στο «Προσθήκη όμοιων ειδών» μπορείς τώρα να διαλέξεις ΑΛΛΗ ΠΕΤΡΑ. Φτιάχνεις το ίδιο κόσμημα με τυρκουάζ αντί για ακουαμαρίνα με μία κίνηση — ο κωδικός QR και η περιγραφή ενημερώνονται μόνα τους, χωρίς να χρειάζεται να το διορθώσεις μετά με επεξεργασία.", "💎 Καράτια, ποσότητα/μελέ και ποιότητα κρατιούνται όπως είναι — αλλάζει μόνο το είδος της πέτρας. Εμφανίζεται όταν το κόσμημα έχει μία πέτρα· με πολλές, αντιγράφονται όπως είναι.", "🔗 Όταν μείνει ΕΝΑ μόνο κομμάτι σε μια ομάδα, εμφανίζεται πλέον σαν κανονικό κόσμημα και όχι σαν ομάδα του ενός — όλα τα κουμπιά είναι κατευθείαν στην κάρτα. Αν προσθέσεις ξανά όμοια κομμάτια, η ομάδα ξαναφτιάχνεται μόνη της.", "🔗 Το φίλτρο «Ομαδοποιημένα» δεν δείχνει πια το τελευταίο μονό κομμάτι, ώστε να συμφωνεί με αυτό που βλέπεις στη λίστα."], "date_en": "Jul 2026", "items_en": ["💎 \"Add similar items\" can now use a DIFFERENT STONE. Make the same piece in turquoise instead of aquamarine in one step — the QR code and the description update themselves, with no need to edit the piece afterwards.", "💎 Carats, quantity/melee and grade are carried over — only the stone type changes. Shown when the piece has one stone; with several, they are copied as they are.", "🔗 When only ONE piece is left in a group it now shows as an ordinary item instead of a group of one, with all its buttons on the card. Add similar pieces again and the group re-forms by itself.", "🔗 The \"Grouped\" filter no longer lists that last lone piece, so the pill agrees with what the list shows."]}, {"version": "v11.81", "date_el": "Ιούλιος 2026", "items_el": ["🔎 Νέα καρτέλα «Βρες Κόσμημα» (μενού ☰) — έχασες την ετικέτα; Διάλεξε είδος / μέταλλο / καθαρότητα, ζύγισε το κόσμημα και βρες το, χωρίς να ψάχνεις όλο το απόθεμα.", "⚖️ Ψάχνει πρώτα με ΑΚΡΙΒΕΣ βάρος (συνήθως ένα μόνο αποτέλεσμα). Αν δεν βρεθεί τίποτα, το κουμπί «Ψάξε πιο πλατιά» ανοίγει σε ±0.2 γρ. — για όταν δύο ζυγαριές δεν συμφωνούν.", "🏷️ Κάθε αποτέλεσμα δείχνει φωτογραφία, κωδικό και βάρος, με κουμπί εκτύπωσης ετικέτας δίπλα.", "🔒 Δεν αλλάζει ΠΟΤΕ το αποθηκευμένο βάρος — μόνο ψάχνει.", "🔧 Διόρθωση: όταν δύο κομμάτια της ίδιας ομάδας έχουν τον ΙΔΙΟ κωδικό αναφοράς αλλά διαφορετικές πέτρες (π.χ. ακουαμαρίνα και τυρκουάζ), το σκανάρισμα έδειχνε ΠΑΝΤΑ το πρώτο. Τώρα ρωτάει «Ποιο κρατάτε;» και δείχνει χρώμα ΚΑΙ πέτρα, ώστε να διαλέξεις το σωστό — και η τιμή, η φωτογραφία και η πώληση ακολουθούν αυτό ακριβώς το κομμάτι.", "🔧 Αν το ένα από τα δύο έχει ήδη πουληθεί, το σκανάρισμα πάει κατευθείαν σε αυτό που υπάρχει στο απόθεμα, χωρίς ερώτηση."], "date_en": "Jul 2026", "items_en": ["🔎 New \"Find Jewelry\" tab (☰ menu) — lost the tag? Pick type / metal / purity, weigh the piece and find it, instead of walking the whole inventory.", "⚖️ Searches EXACT weight first (usually a single result). If nothing matches, a \"Search wider\" button opens it to ±0.2 g — for when two scales disagree.", "🏷️ Each result shows photo, reference code and weight, with a print-tag button right there.", "🔒 It NEVER changes a stored weight — it only searches.", "🔧 Fix: when two pieces of the same group share ONE reference code but have different stones (e.g. aquamarine and turquoise), scanning always showed the first one. It now asks \"Which one are you holding?\" and shows colour AND stone, so you pick the right piece — and the price, the photo and the sale all follow that exact record.", "🔧 If one of the two is already sold, the scan goes straight to the one still in stock, with no question."]}, {"version": "v11.80", "date_el": "Ιούλιος 2026", "items_el": ["↩️ Το ✕ γυρίζει πίσω ένα βήμα και στα υπόλοιπα σημεία: από ομάδα ίδιων κομματιών → Επεξεργασία → ✕ επιστρέφεις στην ομάδα· από την αναφορά «Στάσιμο Απόθεμα» → Επεξεργασία → ✕ επιστρέφεις στην αναφορά (με το ίδιο φίλτρο ετών)· από τις ειδοποιήσεις 🔔 → δωροεπιταγή → ✕ επιστρέφεις στις ειδοποιήσεις.", "↩️ Όταν μετά την αποθήκευση εμφανίζεται η ερώτηση για νέα ετικέτα (αλλαγή πετρών), η λίστα ΔΕΝ ξανανοίγει από πάνω — για να μην κρύψει την ερώτηση."], "date_en": "Jul 2026", "items_en": ["↩️ The ✕ steps back one level in the remaining places too: from a group of similar pieces → Edit → ✕ returns to the group; from the Stale Stock report → Edit → ✕ returns to the report (with the same years filter); from 🔔 notifications → gift card → ✕ returns to the notifications.", "↩️ When the \"print a new tag\" question appears after saving (because the stones changed), the list is NOT reopened on top of it — so the question is never hidden."]}, {"version": "v11.79", "date_el": "Ιούλιος 2026", "items_el": ["↩️ Το ✕ σε γυρίζει πίσω ένα βήμα, όχι στην αρχή. Σε πώληση με πολλά αντικείμενα, αν πατήσεις ένα κομμάτι για να δεις τα στοιχεία του, το ✕ σε επιστρέφει τώρα στη συνολική πώληση — όχι στη λίστα πωλήσεων.", "↩️ Το ίδιο και στο ιστορικό αγορών ενός πελάτη: ανοίγεις μια πώληση, πατάς ✕, και γυρίζεις στο ιστορικό του πελάτη."], "date_en": "Jul 2026", "items_en": ["↩️ The ✕ now takes you back one step, not all the way out. In a multi-item sale, tapping a piece to see its details and then pressing ✕ returns you to the whole transaction — not to the sales list.", "↩️ Same in a client's purchase history: open a sale, press ✕, and you land back in that client's history."]}, {"version": "v11.78", "date_el": "Ιούλιος 2026", "items_el": ["🔧 Σημαντική διόρθωση: μια πώληση από την αριθμομηχανή συνέδεε το κόσμημα με βάση τον κωδικό ως κείμενο. Σε 4 παλιά κομμάτια (Ιούνιος 2026, σταυροί/σκουλαρίκια με πέτρες) ο αποθηκευμένος κωδικός γράφτηκε με «+» αντί για «−», οπότε η πώληση δεν ταίριαζε με κανένα κομμάτι: το κόσμημα έμενε στο απόθεμα, το «Δες Αντικείμενο» έβγαζε σφάλμα και το πιστοποιητικό τυπωνόταν χωρίς φωτογραφία και στοιχεία.", "🔗 Πλέον κάθε πώληση κρατάει την ΑΚΡΙΒΗ εγγραφή του κομματιού (όχι τον κωδικό ως κείμενο) — όπως ήδη έκαναν οι πωλήσεις από την καρτέλα Απόθεμα. Επίσης οι δύο γραφές του ίδιου κωδικού («+» και «−») θεωρούνται πια ίδιες παντού, ώστε και οι παλιές εγγραφές να βρίσκουν το κόσμημά τους.", "🔍 Ρυθμίσεις → «Έλεγχος Συνδέσεων Πωλήσεων»: βρίσκει τώρα και τις πωλήσεις που πληρώθηκαν αλλά το κόσμημα έμεινε στο απόθεμα, και με ένα πάτημα το σημειώνει πουλημένο και το συνδέει. Τα ποσά δεν αλλάζουν."], "date_en": "Jul 2026", "items_en": ["🔧 Important fix: a sale made from the calculator linked to the jewel by its code as TEXT. On 4 older pieces (June 2026, stone-set crosses/earrings) the stored code was written with a \"+\" where a \"−\" belongs, so the sale matched no piece at all: the jewel stayed listed in stock, \"View Item\" errored, and the certificate printed with no photo and no details.", "🔗 Every sale now remembers the EXACT piece record instead of a code string — the way sales made from the Stock card already did. The two spellings of a code (\"+\" and \"−\") are also treated as the same code everywhere, so older sale records find their jewel too.", "🔍 Settings → \"Sale Link Check\" now also finds sales that were paid for while the jewel stayed in stock, and marks it sold and links it in one tap. No amounts are changed."]}, {"version": "v11.77", "date_el": "Ιούλιος 2026", "items_el": ["🔧 Διόρθωση: η ταξινόμηση «Ημ. πώλησης» έμενε ενεργή μετά από ανανέωση της εφαρμογής ακόμη κι όταν το φίλτρο «Πουλημένα» είχε επανέλθει στο κανονικό. Πλέον, αν κατά την εκκίνηση δεν είναι επιλεγμένο το φίλτρο «Πουλημένα», η ταξινόμηση επιστρέφει αυτόματα στο «Νεότερο πρώτα» — έτσι η ταξινόμηση κατά ημ. πώλησης εμφανίζεται μόνο όταν βλέπετε πουλημένα κομμάτια."], "date_en": "Jul 2026", "items_en": ["🔧 Fix: the \"Sold date\" sort stayed active after refreshing the app even when the \"Sold\" filter had reset to normal. Now, if the \"Sold\" filter isn't on at startup, the sort falls back to \"Newest first\" automatically — so sorting by sold date only appears when you're viewing sold pieces."]}, {"version": "v11.76", "date_el": "Ιούλιος 2026", "items_el": ["🕒 Διόρθωση ταξινόμησης «Ημ. πώλησης». Τα κομμάτια που πουλήθηκαν την ίδια μέρα κρατούσαν όλα την ίδια ώρα (μεσάνυχτα), οπότε δεν ταξινομούνταν σωστά μεταξύ τους. Πλέον κάθε πώληση αποθηκεύει την πραγματική ώρα, ώστε η ταξινόμηση «Ημ. πώλησης (νεότερα → παλαιότερα)» να δείχνει σωστά το τελευταίο που πουλήσατε πρώτο. (Ισχύει για τις νέες πωλήσεις· όσα καταγράφηκαν πριν την ενημέρωση παραμένουν στην ώρα που είχαν.)"], "date_en": "Jul 2026", "items_en": ["🕒 Fixed the \"Sold date\" sort. Pieces sold on the same day all kept the same timestamp (midnight), so they weren't ordered correctly among themselves. Each sale now stores its actual time, so \"Sold date: Newest → Oldest\" correctly shows the last thing you sold first. (Applies to new sales; anything recorded before this update keeps its earlier timestamp.)"]}, {"version": "v11.75", "date_el": "Ιούλιος 2026", "items_el": ["✏️ Επεξεργασία όλων σε μια ομάδα με ένα πάτημα. Στην καρτέλα της ομάδας (π.χ. 8 ίδια κομμάτια) υπάρχει πλέον κουμπί «Επεξεργασία όλων» που αλλάζει μαζί την περιγραφή, τον κωδικό προμηθευτή, το χειροποίητο, το κοινό, το χρώμα, το χρώμα χρυσού και την απόκρυψη από τη βιτρίνα — σε όλα τα κομμάτια. Το βάρος, η τιμή και ο κωδικός κάθε κομματιού μένουν ως έχουν. Αν η ομάδα έχει διαφορετικά χρώματα, το χρώμα μένει ανέπαφο εκτός αν το επιλέξετε ρητά (ώστε να μη χαλάσει κατά λάθος μια ομάδα με πολλά χρώματα)."], "date_en": "Jul 2026", "items_en": ["✏️ Edit a whole group in one tap. The group card (e.g. 8 identical pieces) now has an \"Edit all\" button that changes the description, vendor code, handmade, target audience, colour, gold colour and hide-from-showroom for every piece at once. Each piece's weight, price and code stay as they are. If the group has different colours, colour is left untouched unless you explicitly pick one (so a multi-colour set can't be flattened by accident)."]}, {"version": "v11.74", "date_el": "Ιούλιος 2026", "items_el": ["⚡ Το σκανάρισμα έγινε πολύ πιο γρήγορο. Μέχρι τώρα κάθε σκανάρισμα κατέβαζε ΟΛΟ το απόθεμα (1000+ κομμάτια). Πλέον χρησιμοποιεί το αντίγραφο που έχει ήδη — μετρήθηκε: 1ο σκανάρισμα ~1.2 δευτ., τα επόμενα ~0.05 δευτ. Αν κάτι αλλάξει από άλλη συσκευή, η τιμή διορθώνεται μόνη της.", "🛡️ Ένα σκανάρισμα χωρίς σήμα ΔΕΝ σβήνει πια το απόθεμα από τη μνήμη. Πριν, μία στιγμή χωρίς ίντερνετ χαλούσε όλες τις επόμενες αναζητήσεις μέχρι να ξαναφορτώσει.", "⚠️ Στα είδη «Άλλο» με χειροκίνητη τιμή: αν δεν υπάρχει σύνδεση, εμφανίζεται προειδοποίηση ότι δείχνει την υπολογισμένη τιμή και μπορεί να διαφέρει από τη δική σας."], "date_en": "Jul 2026", "items_en": ["⚡ Scanning is much faster. Every scan used to download your ENTIRE stock (1000+ pieces). It now uses the copy it already has — measured: first scan ~1.2s, every scan after ~0.05s. If something changes on another device, the price corrects itself.", "🛡️ A scan taken with no signal no longer wipes the stock from memory. Before, one moment offline broke every lookup after it until a reload.", "⚠️ On \"Other\" items with a manually-set price: if there is no connection, a warning now says the calculated price is showing and may differ from yours."]}, {"version": "v11.73", "date_el": "Ιούλιος 2026", "items_el": ["🛡️ ΣΗΜΑΝΤΙΚΟ — διορθώθηκε λάθος τιμή σε σκανάρισμα. Σε κομμάτια με τιμή «ανά τεμάχιο», αν το σκανάρισμα γινόταν με αργή σύνδεση, η τιμή προλάβαινε να υπολογιστεί ΠΡΙΝ φορτώσει η καρτέλα του κομματιού — και έδειχνε μόνο την αξία του μετάλλου (π.χ. €6.22 αντί για €80.01), χωρίς να διορθώνεται μετά. Πλέον η τιμή περιμένει την καρτέλα, όσο αργή κι αν είναι η σύνδεση.", "⚠️ Και αν η καρτέλα δεν φορτώσει καθόλου (χωρίς ίντερνετ), εμφανίζεται κόκκινη προειδοποίηση ότι ΔΕΝ είναι η τιμή πώλησης — αντί για έναν αριθμό που μοιάζει σωστός."], "date_en": "Jul 2026", "items_en": ["🛡️ IMPORTANT — fixed a wrong price on scan. On per-item priced pieces, a scan over a slow connection calculated the price BEFORE the piece's own record had loaded, showing only the metal value (e.g. €6.22 instead of €80.01) — and it never corrected itself. The price now waits for the record, however slow the connection.", "⚠️ And if the record cannot be loaded at all (no internet), a red warning says this is NOT the selling price — instead of a plausible-looking number."]}, {"version": "v11.72", "date_el": "Ιούλιος 2026", "items_el": ["➖ Νέο κουμπί «Αφαίρεση» στο ακατέργαστο μέταλλο. Όταν παίρνετε γραμμάρια από το σωρό για να φτιάξετε ένα κόσμημα, τα αφαιρείτε πλέον κανονικά — δείχνει τι απομένει πριν το επιβεβαιώσετε. Το κόστος αγοράς και η «αξία κατά την προσθήκη» μειώνονται αναλογικά, ώστε να μένουν σωστά για το μέταλλο που έμεινε.", "🔢 Διορθώθηκαν τα δεκαδικά στο βάρος του μετάλλου. Προσθέτοντας σωρούς έβγαινε 53.300000000000004 αντί για 53.30."], "date_en": "Jul 2026", "items_en": ["➖ New \"Remove\" button on raw metal. When you take grams off the pile to make a piece, you can now record it properly — it shows what will be left before you confirm. The purchase cost and \"value when added\" scale down with it, so they stay right for the metal that remains.", "🔢 Fixed the decimals on metal weight. Adding piles together produced 53.300000000000004 instead of 53.30."]}, {"version": "v11.71", "date_el": "Ιούλιος 2026", "items_el": ["📷 Νέο φίλτρο «Χωρίς φωτό» στο Απόθεμα (στην ομάδα Κατάσταση). Δείχνει μόνο τα κομμάτια που δεν έχουν φωτογραφία, για να τα βρείτε χωρίς να ψάχνετε 700 προϊόντα ένα-ένα. (Νομίσματα και μέταλλο δεν μετρούν — δεν έχουν φωτογραφία έτσι κι αλλιώς.)", "💰 Νέα ταξινόμηση κατά ημερομηνία πώλησης (νεότερη ή παλαιότερη πρώτα). Εμφανίζεται στη λίστα ταξινόμησης μόνο όταν είναι πατημένο το φίλτρο «Πουλήθηκε»."], "date_en": "Jul 2026", "items_en": ["📷 New \"No photo\" filter in Stock (in the Status group). Shows only the pieces with no photo uploaded, so you can find them without scrolling through 700 items. (Coins and raw metal don't count — they never have a photo.)", "💰 New sort by sale date (newest or oldest first). It appears in the sort list only while the \"Sold\" filter is pressed."]}, {"version": "v11.70", "date_el": "Ιούλιος 2026", "items_el": ["🔧 Νέο εργαλείο στις Ρυθμίσεις: «Έλεγχος Συνδέσεων Πωλήσεων». Βρίσκει παλιές πωλήσεις που έχουν κολλήσει πάνω τους τη σύνδεση αλυσίδας-με-το-γραμμάριο αντί για το ίδιο τους το κομμάτι, και τις διορθώνει (σύνδεση, κόστος, κέρδος). Δείχνει πρώτα τι θα αλλάξει — δεν πειράζει τίποτα μέχρι να πατήσετε «Διόρθωση».", "🛡️ Και δεν μπορεί να ξανασυμβεί: μια πώληση δεν δέχεται πλέον σύνδεση με παρτίδα αλυσίδας αν το κομμάτι που πουλήθηκε δεν είναι αυτή η παρτίδα."], "date_en": "Jul 2026", "items_en": ["🔧 New Settings tool: \"Sale Link Check\". It finds older sales that have a by-the-gram chain link stuck to them instead of their own piece, and repairs the link, cost and profit. It shows you what will change first — nothing is touched until you press Repair.", "🛡️ And it cannot happen again: a sale will no longer accept a chain-batch link when the piece being sold is not that batch."]}, {"version": "v11.69", "date_el": "Ιούλιος 2026", "items_el": ["🏷️ Το έντυπο πώλησης δείχνει επιτέλους σωστά κάθε κομμάτι. Ο σταυρός τυπωνόταν ως αλυσίδα με λάθος βάρος, γιατί η εγγραφή του είχε κολλήσει πάνω της ο σύνδεσμος της αλυσίδας.", "🔗 Βρέθηκε και η αιτία: σε πώληση καλαθιού που ΔΕΝ ξεκινούσε με αλυσίδα-με-το-γραμμάριο, το πρώτο κομμάτι έπαιρνε κατά λάθος τα στοιχεία της αλυσίδας από τον υπολογισμό — και αν σβήνατε αυτή την πώληση, γύριζαν γραμμάρια στην παρτίδα αντί να ξαναμπεί το κομμάτι στο απόθεμα. Διορθώθηκε για τις επόμενες πωλήσεις."], "date_en": "Jul 2026", "items_en": ["🏷️ The sale document now shows each piece correctly. The cross printed as a chain with the wrong weight, because its sale record had the chain's batch link stuck to it.", "🔗 Root cause found too: on a cart sale that did NOT start with a by-the-gram chain, the first piece picked up the chain's details from the calculator — and deleting that sale would have returned grams to the batch instead of putting the piece back in stock. Fixed for future sales."]}, {"version": "v11.68", "date_el": "Ιούλιος 2026", "items_el": ["🏷️ Διορθώθηκε στο νέο έντυπο πώλησης: όταν ένα κομμάτι δεν έχει δική του περιγραφή, έπαιρνε κατά λάθος το όνομα του διπλανού του — ένας σταυρός τυπωνόταν ως «Bulk chains».", "✅ Τώρα κάθε γραμμή γράφει το είδος της (Σταυρός, Αλυσίδα...) στη γλώσσα της εφαρμογής, και οι αλυσίδες με το γραμμάριο δεν δείχνουν πια την εσωτερική ονομασία της παρτίδας."], "date_en": "Jul 2026", "items_en": ["🏷️ Fixed in the new sale document: a piece with no description of its own picked up its neighbour's name — a cross printed as \"Bulk chains\".", "✅ Every line now falls back to its own type (Cross, Chain...) in the app's language, and by-the-gram chains no longer show the internal batch name."]}, {"version": "v11.67", "date_el": "Ιούλιος 2026", "items_el": ["🖨️ Νέο κουμπί «Εκτύπωση» μέσα σε κάθε πώληση: τυπώνετε Προσφορά ή Πιστοποιητικό ΜΕΤΑ την πώληση — με τα ποσά που πληρώθηκαν πραγματικά.", "📤 Και τα δύο βγαίνουν και σε PDF για αποστολή, όπως ακριβώς στον υπολογισμό.", "🧾 Σε πώληση με πολλά αντικείμενα τυπώνεται ένα έντυπο με όλα τα κομμάτια και το σύνολο. Στις αλυσίδες με το γραμμάριο μπαίνουν τα γραμμάρια που πουλήθηκαν, χωρίς φωτογραφία."], "date_en": "Jul 2026", "items_en": ["🖨️ New \"Print\" button inside every sale: print a Quote or a Certificate AFTER the sale — with the amounts actually paid.", "📤 Both are also available as a shareable PDF, exactly like on the calculator.", "🧾 A multi-item sale prints one document listing every piece and the total. A by-the-gram chain shows the grams sold, with no photo."]}, {"version": "v11.66", "date_el": "Ιούλιος 2026", "items_el": ["💳 Στην πώληση, η κάρτα δείχνει τώρα το υπόλοιπό της και τι θα μείνει μετά — π.χ. «Υπόλοιπο κάρτας: €520,00 → μετά: €364,77».", "↩️ Αν ανοίξετε μια πώληση από τις κινήσεις της κάρτας, το ✕ σας γυρίζει πίσω στην κάρτα και όχι έξω.", "🗑️ Διορθώθηκε: η διαγραφή της τελευταίας δωροεπιταγής/πίστωσης δεν αποθηκευόταν και η κάρτα ξαναεμφανιζόταν μετά από ανανέωση."], "date_en": "Jul 2026", "items_en": ["💳 A card applied to a sale now shows its balance and what will be left — e.g. \"Card balance: €520.00 → after: €364.77\".", "↩️ Opening a sale from a card's history and pressing ✕ now takes you back to the card instead of out of it.", "🗑️ Fixed: deleting the last gift certificate/credit didn't save, so the card came back on the next refresh."]}, {"version": "v11.65", "date_el": "Ιούλιος 2026", "items_el": ["📶 Οι πωλήσεις χωρίς σήμα δεν χάνονται πλέον. Μέχρι τώρα μια πώληση που καταχωρούσατε χωρίς ίντερνετ έμενε μόνο στο κινητό — και ο επόμενος συγχρονισμός τη διέγραφε αθόρυβα.", "⏳ Ό,τι δεν προλάβει να σταλεί μπαίνει σε ουρά (αντέχει και κλείσιμο της εφαρμογής) και στέλνεται μόνο του μόλις επανέλθει η σύνδεση. Βλέπετε «X σε αναμονή» πάνω δεξιά και «συγχρονίστηκαν» όταν φύγουν.", "🛡️ Καμία λίστα δεν μπορεί πλέον να αδειάσει ολόκληρη από λάθος — η εφαρμογή αρνείται να σβήσει τα πάντα."], "date_en": "Jul 2026", "items_en": ["📶 Sales recorded with no signal are no longer lost. Until now a sale rung up without internet lived only on that phone — and the next sync quietly erased it.", "⏳ Anything that can't be sent is queued (it survives closing the app) and goes up by itself the moment the connection returns. You'll see \"X pending\" at the top and a confirmation when it clears.", "🛡️ No list can ever be emptied wholesale by mistake now — the app refuses to delete everything."]}, {"version": "v11.64", "date_el": "Ιούλιος 2026", "items_el": ["🛡️ ΜΕΓΑΛΗ ΑΛΛΑΓΗ — ασφαλής χρήση από πολλά κινητά ταυτόχρονα. Μέχρι τώρα κάθε αποθήκευση έστελνε ΟΛΟΚΛΗΡΗ τη λίστα: ένα κινητό ανοιχτό από το πρωί έσβηνε ό,τι είχαν καταχωρήσει τα άλλα στο μεταξύ, χωρίς κανένα μήνυμα.", "✅ Πλέον κάθε πώληση, δωροεπιταγή, κράτηση, επισκευή και πελάτης αποθηκεύεται ΞΕΧΩΡΙΣΤΑ — όπως πάντα έκανε το απόθεμα, που γι' αυτό δεν είχε ποτέ τέτοιο πρόβλημα. Δύο κινητά δεν μπορούν να σβήσουν το ένα τη δουλειά του άλλου.", "🔑 Κάθε συσκευή δίνει πλέον δικούς της μοναδικούς κωδικούς εγγραφών, ώστε δύο πωλήσεις την ίδια στιγμή να μην μπερδεύονται ποτέ.", "🔄 Η εφαρμογή ανανεώνει τα δεδομένα μόλις ξαναπιάνετε το κινητό — όχι μόνο σε πλήρη επανεκκίνηση. Βλέπετε τι έκαναν οι υπόλοιποι."], "date_en": "Jul 2026", "items_en": ["🛡️ BIG ONE — safe to use from several phones at once. Until now every save sent the WHOLE list: a phone left open since morning would erase whatever the others had recorded in the meantime, silently.", "✅ Now each sale, gift card, reservation, repair and client is saved ON ITS OWN — the way stock always has been, which is why stock never had this problem. Two phones can no longer wipe each other's work.", "🔑 Each device now mints its own unique record numbers, so two sales rung up at the same moment can never collide.", "🔄 The app refreshes the moment you pick the phone back up, not only on a full restart — so you see what the others have done."]}, {"version": "v11.63", "date_el": "Ιούλιος 2026", "items_el": ["🧾 Η πίστωση από επιστροφή τυπώνεται πλέον ως «Πίστωση» — όχι «Κάρτα Αλλαγής». Κάρτα αλλαγής είναι το χαρτί που συνοδεύει ένα δώρο και δεν έχει αξία· μόλις το κόσμημα επιστραφεί, αυτό που κρατά ο πελάτης είναι χρήματα.", "🛍️ Κάθε επανεκτύπωση δείχνει το υπόλοιπο μεγάλο, το αρχικό ποσό από κάτω, και ΤΙ αγόρασε ο πελάτης (κωδικός, είδος, καράτια) — ίδια εικόνα στο χαρτί και στην καρτέλα του Πάγκου.", "🛒 Σοβαρή διόρθωση σε πολλαπλή πώληση πληρωμένη με δωροεπιταγή/πίστωση: διαγράφοντας μία μόνο γραμμή, είτε δεν επέστρεφε τίποτα, είτε επέστρεφε ΟΛΟ το ποσό ενώ οι υπόλοιπες γραμμές έμεναν — δηλαδή χάριζε χρήματα. Τώρα επιστρέφεται ακριβώς το μερίδιο της γραμμής."], "date_en": "Jul 2026", "items_en": ["🧾 A return credit now prints as \"Credit\", not \"Exchange Card\". An exchange card is the paper that goes with a gift and carries no value; once the piece actually comes back, what the customer holds is money.", "🛍️ Every reprint shows the balance large, the original amount beneath it, and WHAT was bought (ref code, type, karat) — the same on paper and on the Desk card.", "🛒 Serious fix on a multi-item sale paid by a certificate or credit: deleting a single line either released nothing, or released the WHOLE amount while the other lines stayed — giving money away. It now returns exactly that line's share."]}, {"version": "v11.62", "date_el": "Ιούλιος 2026", "items_el": ["📦 Σοβαρή διόρθωση: όταν διαγραφόταν μια πώληση, το κομμάτι εμφανιζόταν ως «επαναφέρθηκε σε απόθεμα» ακόμη κι αν η αποθήκευση δεν είχε φτάσει ποτέ στο cloud — και έτσι ξαναγύριζε πουλημένο. Τώρα ελέγχεται αν η εγγραφή όντως αποθηκεύτηκε.", "⚠️ Αν δεν αποθηκευτεί, το βλέπετε αμέσως με σαφές μήνυμα αντί για ψεύτικο «επιτυχία».", "🔧 Αν πατήσετε «Δες Πώληση» σε κομμάτι που είναι πουλημένο αλλά η πώληση δεν υπάρχει πλέον, σας προτείνεται πλέον απευθείας η επαναφορά του σε απόθεμα.", "🎯 Το «Δες Πώληση» βρίσκει τώρα την ακριβή πώληση του συγκεκριμένου κομματιού, κι όχι του πανομοιότυπου διπλανού του."], "date_en": "Jul 2026", "items_en": ["📦 Serious fix: when a sale was deleted, the piece reported \"restored to stock\" even if that save never reached the cloud — so it came back sold. The app now checks the write actually landed.", "⚠️ If it doesn't save, you're told plainly instead of getting a false \"success\".", "🔧 Pressing \"View Sale\" on a piece that's marked sold but whose sale no longer exists now offers to put it straight back in stock.", "🎯 \"View Sale\" now finds that exact piece's sale, not an identical twin's."]}, {"version": "v11.61", "date_el": "Ιούλιος 2026", "items_el": ["🛠️ Σοβαρή διόρθωση: αν διαγραφόταν μια πώληση που πληρώθηκε με δωροεπιταγή ή πίστωση ενώ η εφαρμογή δεν είχε προλάβει να φορτώσει τις κάρτες, τα χρήματα ΔΕΝ επέστρεφαν στην κάρτα — και καμία προειδοποίηση δεν εμφανιζόταν.", "🔒 Η αναίρεση επιστροφής της οποίας η πίστωση έχει ήδη ξοδευτεί μπλοκάρεται τώρα σωστά. Πριν, αν οι κάρτες δεν είχαν φορτώσει, περνούσε κανονικά.", "📡 Οι έλεγχοι αυτοί φορτώνουν πλέον τις κάρτες πρώτα. Χωρίς σύνδεση, η ενέργεια σταματά με σαφές μήνυμα αντί να προχωρήσει στα τυφλά.", "↩️ Νέο κουμπί στην καρτέλα: αν χρήματα εμφανίζονται ξοδεμένα σε πώληση που δεν υπάρχει πλέον, με ένα πάτημα επιστρέφουν στην κάρτα."], "date_en": "Jul 2026", "items_en": ["🛠️ Serious fix: deleting a sale paid with a gift certificate or credit did NOT hand the money back to the card if the app hadn't finished loading the cards — and said nothing about it.", "🔒 Undoing a return whose credit has already been spent is now properly blocked. Before, if the cards hadn't loaded, it went straight through.", "📡 These checks now load the cards first. With no connection the action stops with a clear message instead of proceeding blind.", "↩️ New button on the card: if money shows as spent on a sale that no longer exists, one tap gives it back."]}, {"version": "v11.60", "date_el": "Ιούλιος 2026", "items_el": ["🛒 Σαρώνετε τη δωροεπιταγή ή την πίστωση ΠΡΙΝ την πώληση και κρατιέται. Η πελάτισσα δοκιμάζει έξι κομμάτια, εσείς πατάτε ΠΩΛΗΘΗΚΕ και μπαίνει μόνη της — δεν χρειάζεται να τη σαρώσετε ξανά.", "👀 Με τη σάρωση ανοίγει και η καρτέλα της, για να δείτε αμέσως το υπόλοιπο.", "🔒 Δεν ξεφεύγει: φεύγει μόλις καταχωρηθεί η πώληση, μόλις πατήσετε το ✕ δίπλα της, ή μετά από 30 λεπτά. Δεν μπορεί να μπει κατά λάθος στον επόμενο πελάτη."], "date_en": "Jul 2026", "items_en": ["🛒 Scan a gift certificate or credit BEFORE the sale and it is held. The customer tries six pieces, you press SOLD and it applies itself — no need to scan it again.", "👀 Scanning also opens its card, so you can read the balance out straight away.", "🔒 It can't escape: it's released once the sale is recorded, the moment you press the ✕ beside it, or after 30 minutes. It cannot land on the next customer by accident."]}, {"version": "v11.59", "date_el": "Ιούλιος 2026", "items_el": ["🐞 Διόρθωση: η σάρωση κάρτας αλλαγής (X-…) δούλευε μόνο αν είχατε ήδη ανοίξει τις Πωλήσεις εκείνη τη φορά. Σε φρέσκο άνοιγμα της εφαρμογής δεν έβρισκε τίποτα. Τώρα φορτώνει μόνη της ό,τι χρειάζεται.", "⌨️ Μπορείτε πλέον να ΠΛΗΚΤΡΟΛΟΓΗΣΕΤΕ τον κωδικό κάρτας (G-0004 ή X-0001) στο πεδίο κωδικού, όπως ακριβώς τον σαρώνετε. Χρήσιμο αν το QR έχει φθαρεί ή αν έχετε μόνο τον αριθμό."], "date_en": "Jul 2026", "items_en": ["🐞 Fixed: scanning an exchange card (X-…) only worked if you had already opened Sales that session. On a fresh app open it found nothing. It now loads what it needs by itself.", "⌨️ You can now TYPE a card code (G-0004 or X-0001) into the code box, exactly as if you scanned it. Useful when a QR is scratched, or when you only have the number."]}, {"version": "v11.58", "date_el": "Ιούλιος 2026", "items_el": ["🧾 Οι κινήσεις της δωροεπιταγής δείχνουν πλέον κωδικό αναφοράς και περιγραφή («ER0664 Σκουλαρίκια · 14K»), όχι τους παλιούς κωδικούς QR. Στις πολλαπλές πωλήσεις δεν διπλογράφονται πια τα είδη.", "👆 Πατώντας μια κίνηση ανοίγει κατευθείαν η πώληση.", "💍 ΣΗΜΑΝΤΙΚΟ: το «Pearl» εμφανιζόταν στα ελληνικά ως «Δάκρυl» — το σχήμα «Pear» έτρωγε τη λέξη. Ίσχυε παντού: προσφορές, πιστοποιητικά, καταλόγους. Διορθώθηκε· τώρα «Μαργαριτάρι».", "🔖 Το πλαίσιο της σφραγίδας έφυγε. Μένει ο ίδιος χώρος 10×5 εκ. με μια γραμμή και «ΣΦΡΑΓΙΔΑ» από κάτω, στο ίδιο ύψος με την υπογραφή — ξέρετε πού να σφραγίσετε χωρίς άσχημο κουτί.", "📄 Διόρθωση: όταν η δωροεπιταγή είχε αφιέρωση, το κείμενο στο κάτω μέρος έβγαινε έξω από το πλαίσιο. Τώρα χωράει πάντα, σε κάθε περίπτωση."], "date_en": "Jul 2026", "items_en": ["🧾 A certificate's history now shows the reference code and description (“ER0664 Earrings · 14K”) instead of raw QR codes, and a multi-item sale no longer lists its items twice.", "👆 Tap any line to open that sale.", "💍 IMPORTANT: “Pearl” was rendering in Greek as “Δάκρυl” — the shape “Pear” was eating the word. It affected quotes, certificates and catalogues everywhere. Fixed; it now reads «Μαργαριτάρι».", "🔖 The stamp box is gone. The same 10×5 cm of room remains, closed by a line with “STAMP” beneath it, level with the signature — so you know where to stamp without an ugly box.", "📄 Fixed: when a certificate carried a dedication, the text at the bottom spilled outside the frame. It now fits in every case."]}, {"version": "v11.57", "date_el": "Ιούλιος 2026", "items_el": ["🧾 Δωροεπιταγή ή πίστωση που έχει χρησιμοποιηθεί τυπώνεται πλέον ως ΚΑΤΑΣΤΑΣΗ: μεγάλο το υπόλοιπο, από κάτω το αρχικό ποσό, και αναλυτικά τι αγόρασε — είδος, ημερομηνία, ποσό.", "🗑 Έτσι πετάτε το παλιό χαρτί και του δίνετε ένα νέο που τα λέει όλα: «€80 σκουλαρίκια 12/05, €70 δαχτυλίδι 30/06, υπόλοιπο €50». Καμία απορία για το πού πήγαν τα λεφτά.", "📱 Τα ίδια φαίνονται και μέσα στην εφαρμογή, στην καρτέλα της επιταγής στον Πάγκο.", "🎁 Μια ΑΧΡΗΣΙΜΟΠΟΙΗΤΗ δωροεπιταγή δεν αλλάζει σε τίποτα — κρατά την αφιέρωση και το «Προς», όπως πρέπει για δώρο."], "date_en": "Jul 2026", "items_en": ["🧾 A gift certificate or credit that has been used now prints as a STATEMENT: the balance large, the original amount beneath it, and an itemised list of what it bought — item, date, amount.", "🗑 So you throw the old paper away and hand over a new one that explains itself: “€80 earrings 12/05, €70 ring 30/06, €50 left”. No doubt about where the money went.", "📱 The same breakdown appears in the app, on the card's page under Desk.", "🎁 An UNUSED gift certificate is completely unchanged — it keeps its dedication and “To”, as a present should."]}, {"version": "v11.56", "date_el": "Ιούλιος 2026", "items_el": ["⚠️ Όταν σαρώνετε δωροεπιταγή ή πίστωση που έχει ΗΔΗ χρησιμοποιηθεί, σας το λέει καθαρά: «υπόλοιπο €50.00 από €200.00», πόσα έχουν εξαργυρωθεί και πότε.", "🧾 Χρήσιμο γιατί το χαρτί στο χέρι του πελάτη γράφει πάντα το αρχικό ποσό. Τώρα το βλέπετε πριν καν χρεώσετε.", "📋 Το ίδιο και στη λίστα επιλογής: κάτω από το υπόλοιπο γράφει «από €200.00» όταν έχει χρησιμοποιηθεί.", "ℹ️ Υπενθύμιση: ΔΕΝ εκδίδεται νέα επιταγή για τα ρέστα. Η ίδια κάρτα κρατά τον αριθμό και το υπόλοιπό της μέχρι να εξαντληθεί."], "date_en": "Jul 2026", "items_en": ["⚠️ Scanning a gift certificate or credit that has ALREADY been partly used now says so plainly: “balance €50.00 of €200.00”, how much was redeemed and when.", "🧾 It matters because the paper in the customer's hand always shows the original amount. Now you see it before you charge anything.", "📋 Same in the picker list: it shows “of €200.00” under the balance once a card has been used.", "ℹ️ Reminder: no new certificate is issued for the change. The same card keeps its number and its remaining balance until it runs out."]}, {"version": "v11.55", "date_el": "Ιούλιος 2026", "items_el": ["🔖 Το πλαίσιο σφραγίδας είναι πλέον 10×5 εκ. — το πραγματικό μέγεθος της σφραγίδας — και ΙΔΙΟ και στα τρία έντυπα: προσφορά/πιστοποιητικό, κράτηση και δωροεπιταγή/κάρτα αλλαγής.", "📄 Στην κάρτα αλλαγής ο αριθμός και οι ημερομηνίες μετακινήθηκαν σε δική τους γραμμή, ώστε να χωρέσει η σφραγίδα σε πλήρες μέγεθος. Χωράει ακόμη σε ΕΝΑ φύλλο A4.", "🔤 Μεταφράστηκαν 9 κείμενα που έβγαιναν στα Αγγλικά ενώ η εφαρμογή ήταν στα Ελληνικά — μεταξύ τους η προειδοποίηση «δεν λαμβάνεται ζωντανή τιμή» και όλο το δεύτερο μέταλλο.", "🗂️ Η ταξινόμηση στους Πελάτες θυμάται πλέον την επιλογή σας, όπως και στο Απόθεμα. Διαλέγετε «Πιο πρόσφατοι» και έτσι μένει μετά την ανανέωση."], "date_en": "Jul 2026", "items_en": ["🔖 The stamp box is now 10×5 cm — the real size of the shop stamp — and IDENTICAL on all three documents: quote/certificate, reservation, and gift certificate / exchange card.", "📄 On the exchange card the number and dates moved to their own line to make room for the full-size stamp. It still fits on ONE A4 sheet.", "🔤 Translated 9 labels that appeared in English while the app was set to Greek — including the “cannot fetch live price” warning and the whole secondary-metal section.", "🗂️ The Clients sort now remembers your choice, like Stock does. Pick “Newest first” and it stays that way after a refresh."]}, {"version": "v11.54", "date_el": "Ιούλιος 2026", "items_el": ["⬆️ Και τα υπόλοιπα παράθυρα με πληκτρολόγηση ανοίγουν πλέον από ΠΑΝΩ, όχι από κάτω: ανεφοδιασμός αλυσίδας, καρτέλα ομάδας (πώληση πολλών) και αποστολή σε συνεργάτη.", "📜 Το παράθυρο ανεφοδιασμού δεν είχε καθόλου όριο ύψους — σε μικρή οθόνη μπορούσε να κοπεί χωρίς να φτάνετε στα κουμπιά. Τώρα κυλάει κανονικά.", "📐 Όλα κρατούν το ύψος τους μέσα στην οθόνη ακόμη κι όταν είναι ανοιχτό το πληκτρολόγιο."], "date_en": "Jul 2026", "items_en": ["⬆️ The remaining windows you type into now open from the TOP instead of the bottom: bulk chain restock, the group card (sell several) and share-to-team.", "📜 The restock window had no height limit at all — on a small screen it could be cut off with no way to reach the buttons. It scrolls properly now.", "📐 They all keep their height inside the screen even while the keyboard is up."]}, {"version": "v11.53", "date_el": "Ιούλιος 2026", "items_el": ["⬆️ Η επιλογή χώρας άνοιγε από κάτω, οπότε μόλις γράφατε, το πληκτρολόγιο σκέπαζε ακριβώς τη λίστα που ψάχνατε. Τώρα ανοίγει από ΠΑΝΩ: αναζήτηση και αποτελέσματα μένουν πάντα ορατά.", "⌨️ Ανοίγει κατευθείαν με το πληκτρολόγιο έτοιμο — πατάτε τη σημαία και γράφετε αμέσως τη χώρα. Η Ελλάδα παραμένει πρώτη για τη συνηθισμένη περίπτωση."], "date_en": "Jul 2026", "items_en": ["⬆️ The country picker opened from the bottom, so the moment you typed, the keyboard covered the very list you were reading. It now opens from the TOP: search and results stay visible.", "⌨️ It opens with the keyboard ready — tap the flag and start typing the country. Greece stays first for the usual case."]}, {"version": "v11.52", "date_el": "Ιούλιος 2026", "items_el": ["🌍 Νέα επιλογή χώρας στο τηλέφωνο. Πατάτε τη σημαία και ανοίγει λίστα με τα ΟΝΟΜΑΤΑ των χωρών, αλφαβητικά — η Ελλάδα πρώτη.", "🔎 Πεδίο αναζήτησης: γράφετε «no» και βγαίνει η Norway. Ψάχνει και με κωδικό κλήσης — «47» βγάζει το ίδιο.", "⚡ Τέλος το ατέλειωτο σκρολάρισμα σε 50 σημαιάκια χωρίς ονόματα. Ισχύει παντού: πώληση, πελάτες, κρατήσεις, επισκευές, δωροεπιταγές, επιστροφές."], "date_en": "Jul 2026", "items_en": ["🌍 New country picker on every phone field. Tap the flag and you get a list of country NAMES, alphabetical — Greece first.", "🔎 With a search box: type “no” and Norway comes up. It searches dial codes too — “47” finds the same.", "⚡ No more scrolling 50 nameless flags. Applies everywhere: sales, clients, reservations, repairs, gift certificates, returns."]}, {"version": "v11.51", "date_el": "Ιούλιος 2026", "items_el": ["👤 Η επιστροφή ζητά πλέον ΟΝΟΜΑ, τηλέφωνο και email του πελάτη. Σε μικρές πωλήσεις συνήθως δεν κρατάτε στοιχεία — αλλά μια πίστωση είναι χρέος που χρωστάτε, και δεν πρέπει ποτέ να είναι ανώνυμη.", "🔒 Χωρίς όνομα δεν εκδίδεται πίστωση. Σε επιστροφή με μετρητά ή κάρτα δεν απαιτείται τίποτα — δεν μένει χρέος.", "📇 Αν βάλετε όνομα χωρίς τηλέφωνο ή email, σας προειδοποιεί: δεν θα μπορείτε να τον ειδοποιήσετε πριν λήξει η πίστωση.", "🔎 Αυτόματη συμπλήρωση από τους Πελάτες, και ο πελάτης αποθηκεύεται στη λίστα σας με την καταχώριση. Η αρχική πώληση δεν αλλάζει."], "date_en": "Jul 2026", "items_en": ["👤 A return now asks for the customer's NAME, phone and email. Small sales usually have no details on them — but a credit is a debt you owe, and it should never be anonymous.", "🔒 No name, no credit. A cash or card refund asks for nothing — no debt is left behind.", "📇 Enter a name with no phone or email and it warns you: you won't be able to reach them before the credit expires.", "🔎 Autocompletes from your Clients, and saves the customer to that list on recording. The original sale is left untouched."]}, {"version": "v11.50", "date_el": "Ιούλιος 2026", "items_el": ["📐 Το πλαίσιο της σφραγίδας στη δωροεπιταγή / κάρτα αλλαγής μεγάλωσε από 4,4×2,6 εκ. σε 7×3,5 εκ., στην ίδια αναλογία 2:1 με το αρχικό πλαίσιο του πιστοποιητικού — η σφραγίδα είναι επιμήκης, όχι τετράγωνη.", "📄 Η κάρτα εξακολουθεί να χωράει σε ΕΝΑ φύλλο A4 οριζόντιο, ακόμη και με μεγάλη αφιέρωση."], "date_en": "Jul 2026", "items_en": ["📐 The stamp box on the gift certificate / exchange card grew from 4.4×2.6 cm to 7×3.5 cm, keeping the same 2:1 proportion as the original box on the certificate — the shop stamp is oblong, not square.", "📄 The card still fits on ONE A4 landscape sheet, even with a long dedication."]}, {"version": "v11.49", "date_el": "Ιούλιος 2026", "items_el": ["📜 Το κουτί της πώλησης ΚΥΛΑΕΙ ξανά. Με εφαρμοσμένη πίστωση το περιεχόμενο ξεπερνούσε την οθόνη και κοβόταν πάνω και κάτω, χωρίς να μπορείτε να φτάσετε ούτε στον τίτλο ούτε στο κουμπί καταχώρισης.", "🏷️ Ο Πάγκος λέει πλέον «Επιταγές & Πιστώσεις» — εκεί μέσα δεν είναι μόνο δωροεπιταγές.", "🔄 Το κουμπί «Δώρο — κάρτα αλλαγής» στην πώληση έγινε σκέτο «Κάρτα αλλαγής», με δικό του εικονίδιο. Το δωράκι δίπλα στη λέξη «Δώρο» το έκανε να μοιάζει με το κουμπί της δωροεπιταγής από πάνω.", "🎟️ Μια πίστωση χωρίς όνομα πελάτη δείχνει πλέον «Πίστωση επιστροφής» αντί για μια παύλα, και το σύνολο «Σε κυκλοφορία» δεν βάζει εικονίδιο δώρου όταν είναι όλο πιστώσεις."], "date_en": "Jul 2026", "items_en": ["📜 The sale box SCROLLS again. With a credit applied the content ran past the screen and was clipped top and bottom, leaving neither the title nor the record button reachable.", "🏷️ The Desk tab now reads “Gift Cards & Credit” — what's in there isn't only gift certificates.", "🔄 The “Gift — exchange card” button in the sale box is now plainly “Exchange card”, with its own icon. The gift emoji and the word “Gift” made it look like the gift-certificate button above it.", "🎟️ A credit with no customer name now reads “Return credit” instead of a bare dash, and the “Outstanding” total drops the gift icon when it's all credit."]}, {"version": "v11.48", "date_el": "Ιούλιος 2026", "items_el": ["🎟️ Διόρθωση: σαρώνοντας την κάρτα αλλαγής ΜΕΣΑ σε μια πώληση, τώρα μπαίνει κατευθείαν η πίστωση στο ποσό. Πριν σας πήγαινε στην καρτέλα της παλιάς πώλησης και δεν έμπαινε τίποτα.", "💡 Η κάρτα αλλαγής (X-0001) δεν κρατά η ίδια χρήματα — δείχνει ποια πώληση ήταν. Η εφαρμογή ακολουθεί πλέον μόνη της την αλυσίδα και βρίσκει την πίστωση (G-0003) που έβγαλε η επιστροφή.", "⚠️ Αν το κομμάτι δεν έχει επιστραφεί ακόμη, σας το λέει καθαρά αντί να σας πετάξει σε άλλη οθόνη.", "⚠️ Το ίδιο αν η πίστωση έχει ήδη ξοδευτεί."], "date_en": "Jul 2026", "items_en": ["🎟️ Fixed: scanning the exchange card WHILE writing a sale now puts the credit straight onto the amount. It used to take you to the old sale's card and apply nothing.", "💡 An exchange card (X-0001) holds no money itself — it identifies which sale it was. The app now follows that chain by itself and finds the credit (G-0003) the return produced.", "⚠️ If the piece hasn't been returned yet, it tells you plainly instead of throwing you onto another screen.", "⚠️ Same if the credit has already been spent."]}, {"version": "v11.47", "date_el": "Ιούλιος 2026", "items_el": ["🎟️ Η πίστωση από επιστροφή ΓΡΑΦΕΙ πλέον ότι είναι πίστωση. Πριν εμφανιζόταν παντού σαν απλή δωροεπιταγή — στη λίστα επιλογής, στο κουτί της πώλησης και στην καρτέλα της.", "🎁/🎟️ Ξεχωριστό εικονίδιο και ετικέτα σε κάθε σημείο: 🎁 Δωροεπιταγή (κάποιος την αγόρασε) ή 🎟️ Πίστωση επιστροφής (λεφτά του πελάτη που γυρίζουν).", "✏️ Νέα επιλογή «Είδος» στην Επεξεργασία κάρτας: μαρκάρετε μόνοι σας μια παλιά κάρτα ως πίστωση επιστροφής. Χρήσιμο για όσες φτιάχτηκαν πριν υπάρξουν οι επιστροφές.", "🐞 Διόρθωση: το κουμπί «Δώρο — κάρτα αλλαγής» στην πώληση έδειχνε τον κωδικό του κειμένου αντί για την ετικέτα."], "date_en": "Jul 2026", "items_en": ["🎟️ A credit from a return now SAYS it's a credit. It previously looked like an ordinary gift certificate everywhere — in the picker, in the sale box and on its own card.", "🎁/🎟️ A distinct icon and label at every point: 🎁 Gift certificate (someone bought it) or 🎟️ Return credit (the customer's own money coming back).", "✏️ New “Type” option in Edit card: mark an older card as a return credit yourself. Useful for any created before returns existed.", "🐞 Fixed: the “Gift — exchange card” button in the sale box showed its internal text code instead of its label."]}, {"version": "v11.46", "date_el": "Ιούλιος 2026", "items_el": ["↩️ ΕΠΙΣΤΡΟΦΕΣ — το μεγάλο νέο. Κάθε πώληση έχει πλέον κουμπί «Επιστροφή»: το κομμάτι γυρίζει στο απόθεμα και τα λεφτά αντιλογίζονται σωστά, χωρίς να πειραχτεί η αρχική πώληση.", "🎁 ΚΑΡΤΑ ΑΛΛΑΓΗΣ ΓΙΑ ΔΩΡΑ: στο κουτί της πώλησης υπάρχει διακόπτης «Δώρο». Τυπώνεται κάρτα που δείχνει το κόσμημα ΧΩΡΙΣ ΤΙΜΗ — αυτός που ανοίγει το δώρο δεν μαθαίνει ποτέ τι πληρώθηκε.", "📷 Όταν το φέρουν πίσω, σαρώνετε τον κωδικό της κάρτας και βρίσκετε αμέσως το κόσμημα και την πώληση. Από εκεί: άμεση αλλαγή με κάτι άλλο, ή έκδοση πίστωσης.", "🎁 Αν σας τη ζητήσουν μετά την πώληση, ανοίγετε την πώληση και πατάτε «Κάρτα Αλλαγής». Αν χαθεί, το ίδιο κουμπί βγάζει την ίδια κάρτα — όχι δεύτερη.", "🎟️ ΠΙΣΤΩΣΗ: επιστρέφετε ως πίστωση και ο πελάτης παίρνει κάρτα αλλαγής με αξία και κωδικό (G-0012). Τη σαρώνετε στην επόμενη επίσκεψη ακριβώς όπως δωροεπιταγή, χρησιμοποιείται και τμηματικά, ισχύει 2 χρόνια — ώστε να προλαβαίνει και η επόμενη σεζόν.", "🔄 «Αλλαγή τώρα»: αμέσως μετά την επιστροφή διαλέγετε το νέο κόσμημα και η πίστωση μπαίνει μόνη της στην πώληση.", "📅 Η επιστροφή καταχωρείται στη ΣΗΜΕΡΙΝΗ ημέρα, όχι στην ημέρα της πώλησης. Ο περασμένος μήνας κρατά το τζίρο του και το ιστορικό δεν σβήνεται ποτέ — όπως ακριβώς κάνει ένα κανονικό ταμείο.", "💵 Επιστροφή και σε μετρητά ή κάρτα. Ό,τι είχε πληρωθεί με δωροεπιταγή γυρίζει πάντα ως πίστωση — δεν δίνονται μετρητά για λεφτά που δεν μπήκαν ποτέ.", "📦 Διακόπτης «επιστροφή στο απόθεμα». Αν το κομμάτι γύρισε σπασμέν
