<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');
  :root {
    --gold:#C9A84C; --gold-light:#E8C97A; --gold-dim:#8C7E60;
    --ink:#0E0C08; --surface:#131108; --surface-2:#1C1A10; --surface-3:#252210;
    --border:rgba(201,168,76,0.18); --text:#F0EAD6; --text-dim:#8C7E60; --text-muted:#5A5240;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--ink);color:var(--text);font-family:'DM Sans',sans-serif;font-weight:300;min-height:100vh;-webkit-font-smoothing:antialiased}
  header{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;position:sticky;top:0;background:rgba(14,12,8,0.96);backdrop-filter:blur(10px);z-index:10}
  .lang-toggle{display:flex;gap:6px}
  .lang-btn{background:none;border:1px solid var(--border);color:var(--text-muted);font-family:'DM Mono',monospace;font-size:11px;letter-spacing:0.12em;padding:6px 12px;border-radius:4px;cursor:pointer;transition:all .18s}
  .lang-btn.active{border-color:var(--gold);color:var(--gold);background:rgba(201,168,76,0.08)}
  .container{max-width:640px;margin:0 auto;padding:28px 20px 70px}
  h1{font-family:'Cormorant Garamond',Georgia,serif;font-size:34px;font-weight:600;color:var(--gold-light);margin-bottom:6px}
  .subtitle{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:0.14em;color:var(--text-muted);text-transform:uppercase;margin-bottom:26px}
  .entry{border-top:1px solid var(--border);padding:20px 0}
  .entry:first-of-type{border-top:none}
  .entry-head{display:flex;align-items:baseline;gap:12px;margin-bottom:12px;flex-wrap:wrap}
  .entry-ver{font-family:'DM Mono',monospace;font-size:16px;font-weight:500;color:var(--gold)}
  .entry-date{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:0.1em;color:var(--text-muted);text-transform:uppercase}
  .entry-items{list-style:none;display:flex;flex-direction:column;gap:10px}
  .entry-items li{font-size:14px;line-height:1.6;color:var(--text);padding-left:2px}
  .backlink{display:inline-block;margin-top:8px;font-family:'DM Mono',monospace;font-size:11px;letter-spacing:0.12em;color:var(--gold-dim);text-decoration:none;text-transform:uppercase;border:1px solid var(--border);border-radius:4px;padding:9px 16px;transition:all .18s}
  .backlink:hover{border-color:var(--gold);color:var(--gold)}
  footer{text-align:center;padding:24px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.12em;color:var(--text-muted);text-transform:uppercase;border-top:1px solid rgba(201,168,76,0.06)}
</style>
</head>

<script>
const CHANGELOG = [{"version":"v11.26","date_el":"Ιούλιος 2026","items_el":["🔍 Το «Δες το →» δουλεύει ξανά για κομμάτια μέσα σε ομάδα. Η ομάδα εμφανίζεται με ΜΙΑ κάρτα, οπότε ένα κομμάτι-μέλος δεν είχε δική του κάρτα και το κουμπί δεν πήγαινε πουθενά. Τώρα σας πάει στην κάρτα της ομάδας. Το ίδιο και για τα «Δες το» από ειδοποιήσεις και από πωλήσεις.","🔎 Αναζήτηση με κωδικό αναφοράς δείχνει ΟΛΗ την ομάδα. Πριν, ψάχνοντας ER0509 έβλεπες «1 σε απόθεμα» ενώ η ομάδα είχε 2 — έμοιαζε σαν να λείπει κομμάτι.","🏷️ Η κάρτα ομάδας δείχνει «ER0509 +1» όταν τα κομμάτια έχουν διαφορετικούς κωδικούς, και η λίστα κομματιών δείχνει τον κωδικό αναφοράς του καθενός (αυτόν που γράφει η ετικέτα του) — ώστε να ταιριάζετε σίγουρα το κόσμημα στο χέρι σας."],"date_en":"Jul 2026","items_en":["🔍 \"View →\" works again for pieces inside a group. A group shows as ONE card, so a member piece had no card of its own and the button went nowhere. It now takes you to the group card. Same for \"View item\" from notifications and from sales.","🔎 Searching a reference code now shows the WHOLE group. Before, searching ER0509 showed \"1 in stock\" when the group had 2 — it looked like a piece had gone missing.","🏷️ The group card shows \"ER0509 +1\" when its pieces have different codes, and the piece list shows each piece's reference code (the one printed on its tag) so you can match the jewel in your hand."]},{"version":"v11.25","date_el":"Ιούλιος 2026","items_el":["🐞 ΣΗΜΑΝΤΙΚΟ: σκανάροντας ετικέτα κωδικού μπορούσε να εμφανιστεί ΑΛΛΟ κόσμημα. Ο παλιός περιγραφικός κωδικός δεν περιέχει τον τύπο του κοσμήματος, οπότε ένα μενταγιόν κι ένα ζευγάρι σκουλαρίκια του ίδιου προμηθευτή/κατηγορίας/βάρους έχουν ΤΟΝ ΙΔΙΟ κωδικό (NOH14L2.8). Τώρα ο κωδικός αναφοράς υπερισχύει πάντα και δείχνει ακριβώς το σωστό κομμάτι — και η ΠΩΛΗΣΗ σημειώνει το σωστό."],"date_en":"Jul 2026","items_en":["🐞 IMPORTANT: scanning a ref tag could show a DIFFERENT piece. The old descriptive code does not include the jewelry type, so a pendant and a pair of earrings from the same vendor/category/weight share the SAME code (NOH14L2.8). The reference code now always wins and resolves the exact piece — and the SALE marks the right one."]},{"version":"v11.24","date_el":"Ιούλιος 2026","items_el":["🆔 Κάθε ΝΕΑ ετικέτα τυπώνεται πλέον με τον κωδικό αναφοράς στο QR. Η ετικέτα δείχνει το κόσμημα αντί να το περιγράφει — άρα δεν «παλιώνει» ποτέ. Οι παλιές ετικέτες διαβάζονται κανονικά όπως πάντα.","💎 Αλλάζετε πέτρες σε κόσμημα με ετικέτα κωδικού; Καμία επανεκτύπωση — η εφαρμογή ενημερώνει μόνη της τα στοιχεία και η ετικέτα παραμένει σωστή. (Στις παλιές ετικέτες ζητά επανεκτύπωση, όπως πριν.)","🎯 Όταν σκανάρετε ετικέτα κωδικού, η εφαρμογή ξέρει ακριβώς ποιο κομμάτι κρατάτε — δεν ρωτά πια «ποιο κρατάτε;» άδικα, ακόμα κι αν δύο κομμάτια έχουν ίδιο βάρος."],"date_en":"Jul 2026","items_en":["🆔 Every NEW tag now prints the reference code in the QR. The tag identifies the piece instead of describing it — so it can never go stale. Old tags keep scanning exactly as before.","💎 Change the stones on a piece with a ref tag? No reprint — the app keeps its details in step by itself and the tag stays correct. (Old tags still ask for a reprint, as before.)","🎯 When you scan a ref tag the app knows exactly which piece you are holding — so it no longer asks \"which one?\" for nothing, even when two pieces weigh the same."]},{"version":"v11.23","date_el":"Ιούλιος 2026","items_el":["🆔 Νέο κουμπί «Εκτύπωση ως ετικέτα κωδικού» (κάτω από την Εκτύπωση, στην κάρτα του είδους): το QR δείχνει τον κωδικό αναφοράς (RG0110) αντί για τον περιγραφικό. Έτσι η ετικέτα ΔΕΙΧΝΕΙ το κόσμημα αντί να το περιγράφει — και βάρος, πέτρες ή χρώμα αλλάζουν χωρίς νέα εκτύπωση. Οι παλιές ετικέτες συνεχίζουν κανονικά.","🔗 Ρυθμίσεις → «Κοινοί Κωδικοί»: δείχνει ΜΟΝΟ τις ετικέτες που πρέπει να τυπώσετε — το παλαιότερο κομμάτι κάθε ζευγαριού κρατά τον κωδικό του, τα υπόλοιπα παίρνουν δικό τους. Κάθε γραμμή = μία ετικέτα. Πατήστε τη φωτογραφία για μεγέθυνση, ώστε να ξεχωρίζετε σίγουρα το κομμάτι."],"date_en":"Jul 2026","items_en":["🆔 New \"Print as ref tag\" button (under Print, on the item card): the QR carries the reference code (RG0110) instead of the descriptive one. The tag then IDENTIFIES the piece instead of describing it — so weight, stones or colour can change without reprinting. Existing tags keep working exactly as before.","🔗 Settings → \"Shared Codes\" now lists ONLY the tags you need to print — the oldest piece of each pair keeps its code, the rest get their own. Every row is one label. Tap a photo to enlarge it, so you can be sure which piece you are holding."]},{"version":"v11.22","date_el":"Ιούλιος 2026","items_el":["🆔 Νέο κουμπί «Εκτύπωση ως ετικέτα κωδικού» (κάτω από την Εκτύπωση, στην κάρτα του είδους): το QR δείχνει τον κωδικό αναφοράς (RG0110) αντί για τον περιγραφικό. Έτσι η ετικέτα ΔΕΙΧΝΕΙ το κόσμημα αντί να το περιγράφει — και βάρος, πέτρες ή χρώμα αλλάζουν χωρίς νέα εκτύπωση. Οι παλιές ετικέτες συνεχίζουν κανονικά.","🔗 Ρυθμίσεις → «Κοινοί Κωδικοί»: λίστα με τα κομμάτια που τυπώνουν τον ΙΔΙΟ κωδικό ενώ ΔΕΝ είναι ίδια (άλλο βάρος ή χρώμα). Μια ετικέτα δεν μπορεί να δείχνει δύο διαφορετικά κομμάτια — γι΄ αυτό, πληκτρολογώντας ή σκανάροντας τον κωδικό, έβγαινε πάντα το πρώτο. Πατήστε «Εκτύπωση» σε ένα από κάθε ζευγάρι: παίρνει δικό του κωδικό και νέα ετικέτα."],"date_en":"Jul 2026","items_en":["🆔 New \"Print as ref tag\" button (under Print, on the item card): the QR carries the reference code (RG0110) instead of the descriptive one. The tag then IDENTIFIES the piece instead of describing it — so weight, stones or colour can change without reprinting. Existing tags keep working exactly as before.","🔗 Settings → \"Shared Codes\": lists the pieces that print the SAME code while NOT being identical (different weight or colour). One tag cannot identify two different pieces — which is why typing or scanning that code always brought up the first one. Print one of each pair: it gets its own code and a new tag."]},{"version":"v11.21","date_el":"Ιούλιος 2026","items_el":["🔎 Το ζουμ του σαρωτή θυμάται τη ρύθμισή σας. Βάλτε το εκεί που βολεύει την κάμερά σας και θα ανοίγει έτσι κάθε φορά. Αποθηκεύεται ανά συσκευή — το κινητό σας και του υπαλλήλου κρατούν το δικό τους ζουμ."],"date_en":"Jul 2026","items_en":["🔎 The scanner zoom now remembers your setting. Put it where your camera likes it and it opens there every time. Saved per device — your phone and your employee's keep their own zoom."]},{"version":"v11.20","date_el":"Ιούλιος 2026","items_el":["🔍 Η κάμερα εστιάζει επιτέλους στα κινητά! Η εντολή «συνεχής εστίαση» έτρεχε ΜΟΝΟ σε υπολογιστή — κανένα κινητό δεν την είχε ποτέ. Γι' αυτό κινητά που δεν εστιάζουν από κοντά (π.χ. το Xiaomi) ήθελαν κράτημα από μακριά. Τώρα ζητείται σε κάθε συσκευή, και στη σάρωση του Απογραφικού Ελέγχου.","🔎 Νέο ζουμ στον σαρωτή: αν η κάμερα υποστηρίζει ζουμ, εμφανίζεται μπάρα — κρατήστε την ετικέτα σε απόσταση που εστιάζει άνετα και κάντε ζουμ. Ευκολότερο από το να παλεύετε με τον φακό."],"date_en":"Jul 2026","items_en":["🔍 The camera finally focuses on phones! The \"continuous focus\" request only ever ran on desktop — no phone ever got it. That is why a phone that will not focus up close (e.g. the Xiaomi) had to be held far away. It is now requested on every device, and in the Inventory Check scanner too.","🔎 New zoom in the scanner: if the camera supports zoom, a slider appears — hold the tag at a distance the lens focuses at comfortably and zoom in. Easier than fighting the lens."]},{"version":"v11.18","date_el":"Ιούλιος 2026","items_el":["🧪 Ρυθμίσεις → «Δοκιμή Ετικέτας»: τυπώνει δοκιμαστικές ετικέτες για να συγκρίνετε μέγεθος QR και ευκολία σάρωσης — κωδικός αναφοράς σε cell 2 και cell 3 (με 30% διόρθωση σφάλματος), και τη σημερινή ετικέτα για σύγκριση. Κάθε δοκιμαστική ετικέτα τυπώνει επάνω της τις ρυθμίσεις της. Προσωρινό εργαλείο — θα αφαιρεθεί μόλις αποφασίσουμε."],"date_en":"Jul 2026","items_en":["🧪 Settings → \"Tag Test\": prints sample tags so you can compare QR size and how easily each scans — a reference code at cell 2 and cell 3 (with 30% error correction), plus today's tag for comparison. Each test strip prints its own settings on it. Temporary tool — it comes out once we decide."]},{"version":"v11.17","date_el":"Ιούλιος 2026","items_el":["🎨 «Ποιο κρατάτε;» — Κομμάτια της ίδιας ομάδας με ίδιο βάρος έχουν ΙΔΙΑ ετικέτα (ίδιο QR και ίδιο κωδικό αναφοράς), οπότε το σκανάρισμα δεν μπορεί να ξέρει ποιο έχετε στο χέρι. Αν διαφέρουν στο χρώμα, ανοίγει τώρα ένα καθαρό παράθυρο με ΛΙΣΤΑ (φωτογραφία + χρώμα, το ένα κάτω από το άλλο): διαλέγετε, κλείνει, και ο υπολογισμός δείχνει το σωστό δαχτυλίδι. Χωράει άνετα 8+ παραλλαγές. Η επιλογή σας καθορίζει τη φωτογραφία, την ΠΩΛΗΣΗ και την κράτηση — πριν έδειχνε πάντα το πρώτο, οπότε πουλώντας το ροζ σημειωνόταν πουλημένο το λευκόχρυσο.","📦 Επίσης: αν σκανάρετε κωδικό που έχει και πουλημένο και διαθέσιμο κομμάτι, η ένδειξη έλεγε λανθασμένα «Πουλήθηκε». Τώρα δείχνει το κομμάτι που είναι πράγματι σε απόθεμα."],"date_en":"Jul 2026","items_en":["🎨 \"Which one are you holding?\" — Pieces in a group with the same weight carry the SAME tag (same QR and same reference code), so a scan cannot know which one is in your hand. When they differ in colour, a clean sheet now opens with them LISTED one under another (photo + colour): you pick, it closes, and the calculator shows the right ring. It fits 8+ variants comfortably. Your choice drives the photo, the SALE and the reservation — before it always took the first, so selling the rose one marked the white one sold.","📦 Also: scanning a code that has both a sold and an in-stock piece wrongly showed \"Sold\". It now shows the piece that is actually in stock."]},{"version":"v11.16","date_el":"Ιούλιος 2026","items_el":["🎨 «Ποιο κρατάτε;» — Δύο κομμάτια της ίδιας ομάδας με ίδιο βάρος έχουν ΙΔΙΑ ετικέτα, οπότε το σκανάρισμα δεν μπορεί να ξέρει ποιο έχετε στο χέρι. Αν διαφέρουν στο χρώμα (π.χ. ροζ χρυσό vs χρυσό & λευκόχρυσο), η εφαρμογή σας ρωτάει τώρα με φωτογραφίες — και η επιλογή σας καθορίζει τη φωτογραφία, την ΠΩΛΗΣΗ και την κράτηση. Πριν έδειχνε πάντα το πρώτο, οπότε πουλώντας το ροζ σημειωνόταν πουλημένο το λευκόχρυσο.","📦 Επίσης: αν σκανάρετε κωδικό που έχει και πουλημένο και διαθέσιμο κομμάτι, η ένδειξη έλεγε λανθασμένα «Πουλήθηκε». Τώρα δείχνει το κομμάτι που είναι πράγματι σε απόθεμα."],"date_en":"Jul 2026","items_en":["🎨 \"Which one are you holding?\" — Two pieces in a group with the same weight carry the SAME tag, so a scan cannot know which one is in your hand. When they differ in colour (e.g. rose gold vs gold & white gold), the app now asks, with photos — and your choice drives the photo, the SALE and the reservation. Before it always took the first, so selling the rose one marked the white one sold.","📦 Also: scanning a code that has both a sold and an in-stock piece wrongly showed \"Sold\". It now shows the piece that is actually in stock."]},{"version":"v11.15","date_el":"Ιούλιος 2026","items_el":["🖼️ Η ομάδα δείχνει ξανά το ΑΡΧΙΚΟ της κόσμημα. Πριν, η κάρτα της ομάδας έδειχνε όποιο κομμάτι έτυχε να είναι πρώτο στην τρέχουσα ταξινόμηση — έτσι, προσθέτοντας ένα νέο χρώμα (π.χ. ροζ χρυσό), άλλαζε μόνη της η φωτογραφία της ομάδας. Τώρα δείχνει πάντα το πρώτο που προσθέσατε.","💰 Πώληση διπλών κομματιών: όταν δύο κομμάτια μοιράζονται τον ίδιο κωδικό (ίδια ομάδα, ίδιο βάρος), η πώληση με σκανάρισμα έβρισκε πάντα το ΠΡΩΤΟ. Έτσι, αφού πουλούσατε το ένα, η πώληση του δεύτερου δεν έκανε τίποτα και το δεύτερο έμενε «σε απόθεμα» για πάντα. Τώρα διαλέγει πάντα ένα κομμάτι που είναι όντως σε απόθεμα."],"date_en":"Jul 2026","items_en":["🖼️ A group shows its ORIGINAL piece again. The group card used to show whichever member the current sort put first — so adding a new colour (e.g. rose gold) silently changed the group's photo. It now always shows the first piece you added.","💰 Selling twin pieces: when two pieces share one code (same group, same weight), a scanned sale always found the FIRST record. So after selling one, selling its twin did nothing and left the twin \"in stock\" forever. It now always picks a piece that is actually in stock."]},{"version":"v11.14","date_el":"Ιούλιος 2026","items_el":["🩹 Αυτο-διόρθωση κοσμημάτων που «κόλλησαν» σε λάθος προμηθευτή. Όταν διαγραφόταν ένας προμηθευτής (πριν το φτιάξουμε στην v11.12), όσα κοσμήματα ήταν από κάτω του δείχνανε σε λάθος προμηθευτή. Κάθε κόσμημα αποθηκεύει και το ΟΝΟΜΑ του προμηθευτή του, οπότε τώρα, αν το όνομα διαφωνεί με τη θέση, κερδίζει το όνομα — και η τιμή βγαίνει σωστή. Δεν αλλάζει τίποτα στα δεδομένα σας, μόνο στον υπολογισμό.","✅ Στα δικά σας δεδομένα βρέθηκαν ακριβώς 2 τέτοια κοσμήματα (2 σμαραγδένια του Κούλη από τις 18 Ιουνίου) — και τα δύο τιμολογούνται πλέον σωστά στα €25/γρ. αντί για λάθος/καθόλου εργατικά."],"date_en":"Jul 2026","items_en":["🩹 Pieces stuck on the wrong vendor now heal themselves. When a vendor was deleted (before v11.12 fixed that), every piece below it started pointing at the wrong vendor. Each piece also stores its vendor's NAME, so when the name disagrees with the position, the name now wins — and the price comes out right. Nothing in your data is rewritten; only the calculation changes.","✅ Your data had exactly 2 such pieces (two of Κούλης's emerald items from 18 June) — both now price correctly at €25/g instead of with the wrong labour or none at all."]},{"version":"v11.13","date_el":"Ιούλιος 2026","items_el":["🐞 Διόρθωση: εμφανιζόταν λανθασμένη προειδοποίηση «άλλαξες το καράτι» σε προμηθευτές που έχουν δύο κατηγορίες με ίδιο όνομα και διαφορετικό καράτι (π.χ. «Διάφορα κοσμήματα 18k» και «Διάφορα κοσμήματα 14k») — ακόμα κι αν δεν αγγίζατε τίποτα. Δεν χαλούσε τίποτα, αλλά τρόμαζε άδικα. Βρέθηκε ελέγχοντας τα πραγματικά σας δεδομένα."],"date_en":"Jul 2026","items_en":["🐞 Fix: a false \"you changed the karat\" warning appeared on vendors that have two categories with the same name at different karats (e.g. \"Διάφορα κοσμήματα 18k\" and \"Διάφορα κοσμήματα 14k\") — even when you changed nothing. It broke nothing, but it was alarming for no reason. Found by auditing your real data."]},{"version":"v11.12","date_el":"Ιούλιος 2026","items_el":["🛡️ Η διαγραφή προμηθευτή δεν χαλάει πια το απόθεμα. Μέχρι τώρα, σβήνοντας έναν προμηθευτή, ΟΛΑ τα κοσμήματα των επόμενων προμηθευτών «γλιστρούσαν» σε λάθος προμηθευτή και άλλαζαν σιωπηλά τιμή (π.χ. σκουλαρίκι €17/γρ. γινόταν δαχτυλίδι €30/γρ.). Τώρα ο προμηθευτής ΑΠΟΣΥΡΕΤΑΙ: φεύγει από τις λίστες, αλλά τα κοσμήματά του κρατούν τιμές και ετικέτες — και μπορείτε να τον επαναφέρετε με ένα κουμπί.","🛡️ Το ίδιο και για τις κατηγορίες: αποσύρονται αντί να σβήνονται, οπότε καμία τιμή και καμία ετικέτα δεν χαλάει.","⚠️ Προειδοποίηση αν αλλάξετε καράτι σε κατηγορία: το καράτι είναι μέσα στον τυπωμένο κωδικό (ΚΑΛ14Σ), οπότε η αλλαγή του τον αλλάζει (ΚΑΛ14Σ → ΚΑΛ18Σ) και οι τυπωμένες ετικέτες σταματούν να διαβάζονται. Τώρα σας το λέει πριν το κάνει, δείχνοντας παλιό και νέο κωδικό.","🔤 Οι κωδικοί προμηθευτών μένουν πάντα 3 γράμματα: ΚΑΛΟΓΕΡΑΣ → ΚΑΛ, ΚΑΛΑΜΑΤΑ → ΚΑΑ (όχι ΚΑΛΑ), ώστε το QR να μη μεγαλώνει."],"date_en":"Jul 2026","items_en":["🛡️ Deleting a vendor can no longer wreck your stock. Until now, removing one made EVERY piece belonging to the vendors below it slide onto the wrong vendor and silently reprice (a €17/g earring became a €30/g ring). A vendor is now RETIRED instead: it leaves the lists, but its pieces keep their prices and tags — and one button brings it back.","🛡️ Same for categories: they retire instead of being deleted, so no price and no tag ever breaks.","⚠️ You now get a warning before changing a category's karat. The karat is inside the printed code (ΚΑΛ14Σ), so changing it rewrites the code (ΚΑΛ14Σ → ΚΑΛ18Σ) and printed tags stop scanning. It now tells you first, showing the old and the new code.","🔤 Vendor codes always stay 3 letters: ΚΑΛΟΓΕΡΑΣ → ΚΑΛ, ΚΑΛΑΜΑΤΑ → ΚΑΑ (not ΚΑΛΑ), so the QR never grows."]},{"version":"v11.11","date_el":"Ιούλιος 2026","items_el":["🏭 Και τα ονόματα ΠΡΟΜΗΘΕΥΤΩΝ ξεκλείδωσαν, με τον ίδιο τρόπο. Πιο σημαντικό: μέχρι τώρα, αν προσθέτατε νέο προμηθευτή που ξεκινούσε με τα ίδια 3 γράμματα (π.χ. ΚΑΛΑΜΑΤΑ δίπλα στον ΚΑΛΟΓΕΡΑ), ο κωδικός του ΠΑΛΙΟΥ προμηθευτή άλλαζε μόνος του (ΚΑΛ → ΚΑΛΟ) και χαλούσαν όλες οι ετικέτες του — χωρίς καν να τον αγγίξετε. Τώρα ο παλιός κρατάει το ΚΑΛ και ο νέος παίρνει ΚΑΛΑ.","⚖️ Το καράτι ακολουθεί την κατηγορία: μόλις διαλέξετε «Σκουλαρίκια (18K)», το καράτι στον υπολογισμό γίνεται αυτόματα 18Κ (και για ασήμι αλλάζει σε ασήμι 925). Πριν μπορούσατε να υπολογίσετε 14Κ και να τυπώσετε ετικέτα που έγραφε 18 — και το σκανάρισμα αργότερα έδινε λάθος τιμή."],"date_en":"Jul 2026","items_en":["🏭 VENDOR names are unlocked too, the same way. More importantly: until now, adding a new vendor whose name began with the same 3 letters (e.g. ΚΑΛΑΜΑΤΑ next to ΚΑΛΟΓΕΡΑΣ) silently renumbered the OLD vendor's code (ΚΑΛ → ΚΑΛΟ) and broke every tag it had ever printed — without you touching that vendor at all. Now the old one keeps ΚΑΛ and the new one gets ΚΑΛΑ.","⚖️ The karat now follows the category: pick \"Earrings (18K)\" and the calculator switches to 18K automatically (and to silver 925 for a silver category). Before, you could price at 14K and print a tag that said 18 — and scanning that tag later gave the wrong price."]},{"version":"v11.10","date_el":"Ιούλιος 2026","items_el":["🔒 Τα ονόματα κατηγοριών ξεκλείδωσαν! Ο κωδικός κάθε κατηγορίας «καρφώνεται» πλέον σε αυτό που γράφουν ήδη οι τυπωμένες ετικέτες, την πρώτη φορά που θα ανοίξετε και θα αποθηκεύσετε τον προμηθευτή. Από εκεί και πέρα μετονομάστε ελεύθερα ό,τι θέλετε (π.χ. «Μενταγιόν 14€/g 14k» → «Μενταγιόν») — καμία ετικέτα δεν χαλάει. Πριν, μια μετονομασία άλλαζε στα κρυφά τον κωδικό και οι παλιές ετικέτες δεν διαβάζονταν πια.","👯 Ίδιο όνομα σε πολλές κατηγορίες: μπορείτε τώρα να έχετε «Σκουλαρίκια (14K · €17/γρ.)» και «Σκουλαρίκια (18K · €20/γρ.)» — ακόμα και ίδιο καράτι με άλλη τιμή. Οι νέες κατηγορίες παίρνουν κωδικό δύο γραμμάτων (Σκουλαρίκια → ΣΚ, το επόμενο → ΣΟ, μετά ΣΥ).","🔢 Χωρίς περιττά μηδενικά στην τιμή: €17/γρ. αντί για €17.00/γρ. (τα μισά δεκαδικά μένουν, π.χ. €12.5/γρ.)."],"date_en":"Jul 2026","items_en":["🔒 Category names are unlocked! Each category's code is now pinned to what its printed tags already say, the first time you open and save that vendor. From then on rename anything you like (e.g. \"Μενταγιόν 14€/g 14k\" → \"Μενταγιόν\") — no tag ever breaks. Before, a rename silently changed the code and the old tags stopped scanning.","👯 The same name can now be used more than once: \"Earrings (14K · €17/g)\" and \"Earrings (18K · €20/g)\" — even the same karat at a different rate. New categories get a two-letter code (Earrings → ΣΚ, the next one → ΣΟ, then ΣΥ).","🔢 No more trailing zeros on the rate: €17/g instead of €17.00/g (halves still show, e.g. €12.5/g)."]},{"version":"v11.09","date_el":"Ιούλιος 2026","items_el":["🖨️ Η επανεκτύπωση ετικέτας δεν προσθέτει πια το κόσμημα δεύτερη φορά. Μόλις αποθηκευτεί στο απόθεμα, το παράθυρο της ετικέτας το γράφει («✓ Αποθηκεύτηκε στο απόθεμα — PE0599») και το κουμπί γίνεται «Επανεκτύπωση»: πατήστε το όσες φορές θέλετε, τυπώνει μόνο χαρτί. Για αλλαγές ή για δεύτερο ίδιο κομμάτι, πηγαίνετε στο Απόθεμα (✏️ Επεξεργασία ή «🔗 Προσθήκη παρόμοιων»).","🏷️ Η λίστα «Κατηγορία Εργασίας» δείχνει τώρα καράτια και τιμή — π.χ. «Σκουλαρίκια (18K · €22.00/γρ.)». Έτσι μπορείτε να έχετε την ίδια κατηγορία σε δύο καράτια (18Κ και 14Κ) χωρίς να μετονομάσετε τίποτα."],"date_en":"Jul 2026","items_en":["🖨️ Reprinting a tag no longer adds the piece to stock a second time. Once it is saved the label box says so (\"✓ Saved to stock — PE0599\") and the button becomes \"Reprint\": press it as often as you like, it only puts ink on paper. To change something, or to add a second identical piece, use Stock (✏️ Edit or \"🔗 Add similar items\").","🏷️ The \"Labor Category\" dropdown now shows the karat and the rate — e.g. \"Earrings (18K · €22.00/g)\". So you can keep the same category at two karats (18K and 14K) without renaming anything."]},{"version":"v11.08","date_el":"Ιούλιος 2026","items_el":["👁️ «Μόνο επιλεγμένα»: όταν ξεπατάτε ένα είδος, εξαφανίζεται αμέσως από τη λίστα — έτσι όσο δουλεύετε (π.χ. αλλάζετε φωτογραφίες) μένουν να φαίνονται μόνο όσα δεν έχετε τελειώσει ακόμη."],"date_en":"Jul 2026","items_en":["👁️ \"View selected only\": deselecting an item now removes it from the view instantly — so as you work through them (e.g. changing photos) only the ones still left to do stay on screen."]},{"version":"v11.07","date_el":"Ιούλιος 2026","items_el":["⬇️ Στην επιλογή ειδών: η μπάρα ενεργειών (Κοινοποίηση / Ομάδα / Κράτηση / Πώληση) έχει τώρα κουμπί ελαχιστοποίησης — πατήστε το βελάκι για να την κρύψετε και να φτάσετε τα κουμπιά που βρίσκονται από πίσω· ξαναπατήστε το μικρό εικονίδιο για να επανέλθει."],"date_en":"Jul 2026","items_en":["⬇️ When selecting items: the action bar (Share / Group / Reserve / Sell) now has a minimize button — tap the arrow to hide it and reach the buttons behind it; tap the small icon to bring it back."]},{"version":"v11.06","date_el":"Ιούλιος 2026","items_el":["☰ Το μενού «Περισσότερα» (πάνω δεξιά) εμφανίζεται πλέον σωστά και στο Απόθεμα και στις Πωλήσεις (πριν κρυβόταν πίσω από τη λίστα).","🔎 Φίλτρο: τα φύλα εμφανίζονται πλέον στα Ελληνικά (Γυναικεία / Ανδρικά / Παιδικά).","🔍 Αναζήτηση με πολλές λέξεις χωρισμένες με κόμμα — π.χ. «CR0100, CR0200» δείχνει και τα δύο.","✅ Στην επιλογή ειδών: νέο κουμπί «Επιλεγμένα» δείχνει μόνο όσα έχετε επιλέξει (ξαναπατήστε το για όλα). Και κρατήστε πατημένη μια κάρτα για να μπείτε σε λειτουργία επιλογής από όπου κι αν βρίσκεστε στη λίστα.","🔗 Προσθήκη όμοιων ειδών: τώρα μπορείτε να ορίσετε και Χρώμα Χρυσού (π.χ. χρυσό / λευκόχρυσο) και να τραβήξετε/ανεβάσετε διαφορετική φωτογραφία ανά παραλλαγή. Στη βιτρίνα τα διαφορετικά χρώματα εμφανίζονται ως ξεχωριστές εικόνες. (Κενή φωτό = ίδια με την ομάδα.)"],"date_en":"Jul 2026","items_en":["☰ The \"More\" menu (top right) now shows correctly on the Stock and Sales tabs too (it used to hide behind the list).","🔎 Filter: genders now display in Greek (Women / Men / Children).","🔍 Search several terms separated by commas — e.g. \"CR0100, CR0200\" shows both.","✅ When selecting items: a new \"Selected\" button shows only the ones you picked (tap again for all). Also press & hold any card to enter select mode from anywhere in the list — no need to scroll back up.","🔗 Add similar items: you can now also set the Gold Color (e.g. gold / white gold) and take/upload a different photo per variant. In the showroom, different colours appear as separate images. (Blank photo = same as the group.)"]},{"version":"v11.05","date_el":"Ιούλιος 2026","items_el":["☀️ Νέο ανοιχτό (light) θέμα! Ρυθμίσεις → Εμφάνιση → 🌙 Σκούρο / ☀️ Ανοιχτό. Ελεφαντόδοντο φόντο με χρυσές πινελιές, σαν τα εκτυπωμένα έντυπα. Η επιλογή σας αποθηκεύεται. (Μόνο χρώματα — δεν βάρυνε η εφαρμογή.)"],"date_en":"Jul 2026","items_en":["☀️ New light theme! Settings → Appearance → 🌙 Dark / ☀️ Light. Ivory background with gold accents, like the printed forms. Your choice is remembered. (Colours only — no real size added.)"]},{"version":"v11.04","date_el":"Ιούλιος 2026","items_el":["❌ Ενιαία κουμπιά σε όλα τα παράθυρα: το «✕» για κλείσιμο έχει πλέον την ίδια εμφάνιση και θέση (πάνω δεξιά) παντού, και τα κουμπιά διαγραφής/ακύρωσης είναι διακριτικά (περίγραμμα, όχι γεμάτα) και πάντα με επιβεβαίωση — για λιγότερα λάθη και πιο γρήγορη δουλειά."],"date_en":"Jul 2026","items_en":["❌ Consistent buttons across every popup: the \"✕\" close is now the same look and place (top-right) everywhere, and delete/cancel buttons are quiet (outlined, not filled) and always ask for confirmation — fewer mistakes, faster work."]},{"version":"v11.03","date_el":"Ιούλιος 2026","items_el":["🛡️ Περισσότερη ασφάλεια: ζητείται πλέον επιβεβαίωση πριν διαγράψετε προσφορά, καθαρίσετε τη μνήμη τιμών πετρών, καθαρίσετε όλες τις ειδοποιήσεις, επαναφέρετε την αρχική τιμή είδους ή διαγράψετε εγγραφή ετικέτας — ώστε να μη χάνεται τίποτα κατά λάθος."],"date_en":"Jul 2026","items_en":["🛡️ More safety: you now get a confirmation before deleting a saved quote, clearing the stone-price cache, clearing all notifications, resetting an item's initial price, or deleting a label-history entry — so nothing is lost by an accidental tap."]},{"version":"v11.02","date_el":"Ιούλιος 2026","items_el":["🧭 Νέα διάταξη εργαλείων στο Απόθεμα: το «Φίλτρο» μετακινήθηκε δίπλα στην μπάρα αναζήτησης, και τα «Ταξινόμηση / Επιλογή / Στάσιμο» μπήκαν από κάτω σε τρία ίσα κουμπιά που χωράνε πάντα, σε κάθε γλώσσα και σε υπολογιστή — χωρίς κρυφή κύλιση."],"date_en":"Jul 2026","items_en":["🧭 Reworked the Stock toolbar: Filter moved up beside the search bar, and Sort / Select / Stale sit below as three equal buttons that always fit — every language and on desktop — with nothing hidden to scroll for."]},{"version":"v11.01","date_el":"Ιούλιος 2026","items_el":["🔧 Η μπάρα φίλτρων στο Απόθεμα κυλάει πλέον οριζόντια, ώστε το κουμπί «Στάσιμο απόθεμα» να χωράει και σε στενές οθόνες. Αφαιρέθηκε το εικονίδιο emoji για ομοιομορφία με τα άλλα κουμπιά."],"date_en":"Jul 2026","items_en":["🔧 The Stock filter bar now scrolls sideways so the \"Stale Stock\" button fits on narrow screens. Removed its emoji icon to match the other buttons."]},{"version":"v11.0","date_el":"Ιούλιος 2026","items_el":["📱 Στα δελτία Επισκευής/Παραγγελίας, τα κουμπιά ειδοποίησης (WhatsApp/SMS/Email) χρησιμοποιούν τώρα και το τηλέφωνο/email του πελάτη από την καρτέλα Πελατών — αν προσθέσετε τον αριθμό εκεί αργότερα, το WhatsApp εμφανίζεται αυτόματα στο δελτίο."],"date_en":"Jul 2026","items_en":["📱 On Repair/Custom-order tickets, the notify buttons (WhatsApp/SMS/Email) now also use the customer's phone/email from the Clients tab — so if you add the number there later, the WhatsApp button appears on the ticket automatically."]},{"version":"v10.99","date_el":"Ιούλιος 2026","items_el":["🕰️ Νέο «Στάσιμο απόθεμα» (μόνο ιδιοκτήτης): φίλτρο «Χρόνος στο απόθεμα» (1+/2+/3+/5+ σεζόν) + αναφορά που δείχνει λιανική, αξία μετάλλου και περιθώριο έκπτωσης για κομμάτια που κάθονται καιρό — με εξαγωγή CSV.","🔒 Στο Απόθεμα, στην «Επιλογή» πολλών κομματιών προστέθηκε κουμπί «Κράτηση» για κράτηση πολλών μαζί. Τα κρατημένα κομμάτια έχουν πλέον ευδιάκριτο σήμα «🔒 Κρατημένο».","🛍️ Βιτρίνα: οι μετρήσεις κατηγοριών μετράνε πλέον τις κάρτες (ομαδοποιημένα ίδια κομμάτια) όπως εμφανίζονται, όχι κάθε τεμάχιο ξεχωριστά."],"date_en":"Jul 2026","items_en":["🕰️ New \"Stale Stock\" (owner only): a \"Time in Stock\" filter (1+/2+/3+/5+ seasons) + a report showing retail, metal-value floor and discount room for long-sitting pieces — with CSV export.","🔒 In Stock select-mode, a new \"Reserve\" button holds several selected pieces at once. Reserved pieces now carry a clear \"🔒 Reserved\" badge.","🛍️ Showroom: category counts now count the cards you actually see (grouped identical pieces collapse to one), not every individual piece."]},{"version":"v10.98","date_el":"Ιούλιος 2026","items_el":["🔧 Τα δελτία Επισκευής και Παραγγελίας ξεχωρίζουν πλέον καθαρά με χρωματιστό σήμα (✨ Παραγγελία / 🔧 Επισκευή).","🇬🇷 Τα κουμπιά «Προσθήκη Νομίσματος/Μετάλλου/Χύδην Αλυσίδες» στο Απόθεμα δεν ξεχειλίζουν πλέον στα Ελληνικά — μπαίνουν σε δική τους σειρά και χωράνε σωστά.","⚖️ Στην πώληση αλυσίδας «με το γραμμάριο»: αδειάζοντας το πεδίο στρογγυλοποίησης, η έκπτωση μηδενίζεται σωστά (πριν κρατούσε παλιά τιμή και έβγαζε ~99% έκπτωση)."],"date_en":"Jul 2026","items_en":["🔧 Repair vs Custom-order tickets now stand apart clearly with a coloured badge (✨ Custom order / 🔧 Repair).","🇬🇷 The Add Coin / Add Metal / Bulk Chains buttons in Stock no longer overflow in Greek — they sit on their own row and fit.","⚖️ By-the-gram chain sale: clearing the round-price field now resets the discount to zero (it used to keep a stale value, showing a ~99% discount)."]},{"version":"v10.97","date_el":"Ιούλιος 2026","items_el":["🇬🇷 Διόρθωση μεταφράσεων: μερικές ετικέτες («Κοινό Αγοραστικό», «Χρώμα Χρυσού», φίλτρα «Φύλο»/«Μικτό Μέταλλο», κουμπί «OK») εμφανίζονταν στα Αγγλικά ενώ η εφαρμογή ήταν στα Ελληνικά — τώρα εμφανίζονται σωστά."],"date_en":"Jul 2026","items_en":["🇬🇷 Translation fix: a few labels (\"Target Audience\", \"Gold Color\", the \"Gender\"/\"Mixed Metal\" filters, the \"OK\" button) showed in English while the app was set to Greek — they now display correctly."]},{"version":"v10.96","date_el":"Ιούλιος 2026","items_el":["🔓 Διόρθωση: είδη που έμεναν «κρατημένα» ενώ η κράτηση είχε ακυρωθεί/διαγραφεί τώρα ξεκλειδώνουν αυτόματα. Το σύστημα αυτο-διορθώνεται όταν ανοίγετε το Απόθεμα, και η ακύρωση/διαγραφή κράτησης πλέον απελευθερώνει σωστά τα είδη ακόμη κι αν δεν έχει φορτωθεί η λίστα."],"date_en":"Jul 2026","items_en":["🔓 Fix: items that stayed \"reserved\" after their reservation was cancelled/deleted now unlock automatically. The app self-heals when you open Stock, and cancelling/deleting a reservation now releases its items correctly even if the stock list wasn't loaded."]},{"version":"v10.95","date_el":"Ιούλιος 2026","items_el":["🏷️ Και οι αλυσίδες «με το γραμμάριο» δείχνουν τώρα την έκπτωση στη φόρμα κράτησης (αρχική τιμή → έκπτωση → τελική), όπως τα υπόλοιπα είδη. Ισχύει για νέες κρατήσεις."],"date_en":"Jul 2026","items_en":["🏷️ \"By-the-gram\" chains now show their discount on the reservation form too (initial price → discount → final), like every other item. Applies to new reservations."]},{"version":"v10.94","date_el":"Ιούλιος 2026","items_el":["💵 Ένα ενιαίο κουμπί «Μετρητά» παντού (κρατήσεις, επισκευές, προσφορές) — πατημένο = μετρητά, μη πατημένο = απόδειξη, ακριβώς όπως στις πωλήσεις. Πιο απλό και συνεπές."],"date_en":"Jul 2026","items_en":["💵 A single \"Cash\" toggle everywhere (reservations, repairs, quotes) — pressed = cash, not pressed = receipt, exactly like on a sale. Simpler and consistent."]},{"version":"v10.93","date_el":"Ιούλιος 2026","items_el":["🏷️ Η φόρμα κράτησης δείχνει τώρα ανά είδος την αρχική τιμή, την έκπτωση (αν είναι ≥5%) και την τελική τιμή — π.χ. σταυρός 811,12€ → -19,9% → 650€.","🧾 Επιλογή «Απόδειξη / Μετρητά» προστέθηκε και στις προσφορές/πιστοποιητικά. Σε συναλλαγή με μετρητά (χωρίς απόδειξη) ο ΦΠΑ δεν εμφανίζεται πουθενά στο έντυπο."],"date_en":"Jul 2026","items_en":["🏷️ The reservation form now shows, per item, the initial price, the discount (if ≥5%) and the final price — e.g. a cross €811.12 → -19.9% → €650.","🧾 A \"Receipt / Cash\" choice was added to quotes & certificates too. For a cash (no-receipt) transaction, VAT is not shown anywhere on the printout."]},{"version":"v10.92","date_el":"Ιούλιος 2026","items_el":["💶 Στην παραλαβή επισκευής/παραγγελίας προστέθηκε πεδίο «Κόστος» — αν χρεώσατε 30€ αλλά η επισκευή σας κόστισε 10€, το κέρδος υπολογίζεται σωστά (20€).","🧾 Επιλογή «Απόδειξη / Μετρητά» στην παραλαβή — τα μαύρα (μετρητά) υπολογίζονται στο κέρδος όπως ακριβώς στις πωλήσεις.","🔧 Διορθώσεις: τα δύο πεδία εκτίμησης (από–έως) έχουν πλέον ίσο μέγεθος, και το κουμπί «Καταγραφή στα έσοδα» φαίνεται καθαρά."],"date_en":"Jul 2026","items_en":["💶 A \"Cost\" field was added when collecting a repair/custom order — if you charged €30 but the repair cost you €10, the profit is now calculated correctly (€20).","🧾 A \"Receipt / Cash\" choice on collection — cash (off-the-books) is treated in the profit exactly like it is on a sale.","🔧 Fixes: the two estimate fields (from–to) are now equal in size, and the \"Log as income\" button is clearly visible."]},{"version":"v10.91","date_el":"Ιούλιος 2026","items_el":["🧾 Στη δημιουργία κράτησης επιλέγετε πλέον «Απόδειξη» ή «Μετρητά» — όπως στις πωλήσεις. Η επιλογή κλειδώνει στην κράτηση και μεταφέρεται αυτόματα στην πώληση κατά την ολοκλήρωση.","📄 Η φόρμα κράτησης δείχνει τώρα την αρχική τιμή, την έκπτωση, τον τρόπο συναλλαγής και (για απόδειξη) την ανάλυση ΦΠΑ."],"date_en":"Jul 2026","items_en":["🧾 When creating a reservation you now choose \"Receipt\" or \"Cash\" — just like on a sale. The choice is locked into the reservation and carried into the sale automatically on completion.","📄 The reservation form now shows the initial price, the discount, the transaction type and (for receipts) the VAT breakdown."]},{"version":"v10.90","date_el":"Ιούλιος 2026","items_el":["📄 Η φόρμα κράτησης ξαναφτιάχτηκε στο ίδιο κομψό στυλ με την προσφορά — με φωτογραφίες των ειδών, επώνυμη κεφαλίδα και χρυσά σύνολα.","🖨 Ξεχωριστά κουμπιά «Εκτύπωση» (πάει κατευθείαν στην εκτύπωση) και «Αποστολή» (στέλνει PDF σε WhatsApp/email) στη φόρμα κράτησης."],"date_en":"Jul 2026","items_en":["📄 The reservation form was rebuilt in the same elegant style as the quote — with item photos, a branded header and gold totals.","🖨 Separate \"Print\" (goes straight to the print dialog) and \"Share\" (sends a PDF to WhatsApp/email) buttons on the reservation form."]},{"version":"v10.89","date_el":"Ιούλιος 2026","items_el":["🔧 Νέο: Επισκευές & Παραγγελίες στην καρτέλα «Εργασίες». Ανοίξτε δελτίο για επισκευή (με φωτογραφία του κοσμήματος του πελάτη και υποχρεωτική εκτίμηση κόστους) ή για παραγγελία κατασκευής (με υποχρεωτική προκαταβολή).","📄 Κάθε δελτίο εκτυπώνεται/μοιράζεται ως επώνυμο PDF με φωτογραφία, εκτίμηση, προκαταβολή, χώρο υπογραφής και σφραγίδα.","📱 Κουμπί «Ειδοποίηση πελάτη» (WhatsApp/SMS/Email) όταν το κόσμημα είναι έτοιμο. Στην παραλαβή μπορείτε να καταγράψετε την τελική τιμή στα έσοδα της ημέρας."],"date_en":"Jul 2026","items_en":["🔧 New: Repairs & Custom Orders in the Desk tab. Open a ticket for a repair (with a photo of the customer's item and a required cost estimate) or a custom piece to make (with a required deposit).","📄 Every ticket prints/shares as a branded PDF with photo, estimate, deposit, a signature line and a stamp box.","📱 A \"Notify customer\" button (WhatsApp/SMS/Email) when the piece is ready. On collection you can log the final price into the day's income."]},{"version":"v10.88","date_el":"Ιούλιος 2026","items_el":["📄 Έντυπη φόρμα κράτησης: από τα στοιχεία μιας κράτησης μπορείτε τώρα να δημιουργήσετε επώνυμη φόρμα PDF (λογότυπο, είδη, συμφωνημένη τιμή, προκαταβολή, υπόλοιπο, ημ. λήξης) με χώρο για υπογραφή πελάτη και σφραγίδα — για εκτύπωση ή αποστολή στον πελάτη."],"date_en":"Jul 2026","items_en":["📄 Printable reservation form: from a reservation you can now generate a branded PDF (logo, items, agreed price, deposit, balance, hold-until date) with a customer-signature line and stamp box — for printing or sharing with the customer."]},{"version":"v10.87","date_el":"Ιούλιος 2026","items_el":["📞 Επιλογέας κωδικού χώρας μπροστά από κάθε πεδίο τηλεφώνου (κράτηση, πελάτης, πώληση) — π.χ. για Δανό πελάτη επιλέγετε Δανία (+45) και γράφετε μόνο τον αριθμό.","⌨️ Στη νέα κράτηση, το όνομα πελάτη έχει τώρα αυτόματη συμπλήρωση — επιλέγοντας υπάρχοντα πελάτη γεμίζουν όνομα/τηλέφωνο/email.","📞 Το τηλέφωνο στην καρτέλα πελάτη είναι πλέον κουμπί κλήσης (πιο φωτεινό) που ανοίγει τον τηλεφωνητή."],"date_en":"Jul 2026","items_en":["📞 Country-code picker in front of every phone field (reservation, client, sale) — e.g. for a Danish customer pick Denmark (+45) and just type the number.","⌨️ In a new reservation, the customer name now autocompletes — picking an existing customer fills in name/phone/email.","📞 The phone on the client card is now a (brighter) tap-to-call button that opens the dialer."]},{"version":"v10.86","date_el":"Ιούλιος 2026","items_el":["🗓 Στη φόρμα κράτησης, η ημερομηνία «Κράτηση έως» εμφανίζεται πλέον στη μορφή των Ρυθμίσεων (π.χ. ΗΗ/ΜΜ/ΕΕΕΕ) και όχι στη μορφή του κινητού.","📞 Κουμπί κλήσης δίπλα στο τηλέφωνο πελάτη (καρτέλα πελάτη & κράτηση) — ανοίγει τον τηλεφωνητή του κινητού.","🗑 Οι ακυρωμένες/ληγμένες κρατήσεις μπορούν πλέον να διαγραφούν οριστικά από τη λίστα."],"date_en":"Jul 2026","items_en":["🗓 In the reserve form, the «Hold until» date now shows in your Settings date format (e.g. DD/MM/YYYY) rather than the phone's format.","📞 Call button next to the customer phone (client card & reservation) — opens the phone's dialer.","🗑 Cancelled/expired reservations can now be permanently deleted from the list."]},{"version":"v10.85","date_el":"Ιούλιος 2026","items_el":["👤 Οι πελάτες αποθηκεύονται αυτόματα: όταν κάνετε κράτηση ή πώληση με όνομα πελάτη, ο πελάτης (με τηλέφωνο/email) προστίθεται στη λίστα Πελατών — ή συμπληρώνεται τηλέφωνο/email που έλειπε. Προστέθηκε πεδίο τηλεφώνου στη φόρμα πώλησης. Στην «Ολοκλήρωση» κράτησης, όνομα/τηλέφωνο/email του πελάτη συμπληρώνονται αυτόματα."],"date_en":"Jul 2026","items_en":["👤 Customers are saved automatically: making a reservation or a sale with a customer name now adds them (with phone/email) to the Clients list — or fills in a missing phone/email. Added a phone field to the sale form. On reservation «Complete», the customer's name/phone/email are pre-filled."]},{"version":"v10.84","date_el":"Ιούλιος 2026","items_el":["🔒 Κράτηση και στα ομαδοποιημένα είδη: εικονίδιο λουκέτου στην ομαδική κάρτα (χρυσό αν κάποιο κομμάτι είναι κρατημένο) και κουμπί «Κράτηση» σε κάθε κομμάτι μέσα στη λίστα της ομάδας."],"date_en":"Jul 2026","items_en":["🔒 Reserve on grouped items too: a padlock icon on the group card (gold if any piece is reserved) and a «Reserve» button on each piece inside the group's list."]},{"version":"v10.83","date_el":"Ιούλιος 2026","items_el":["🔧 Διόρθωση: το εικονίδιο κράτησης (λουκέτο) στην κάρτα αποθέματος φαινόταν χρυσό (σαν κρατημένο) σε όλα τα είδη. Τώρα είναι γκρι όταν το είδος είναι διαθέσιμο και χρυσό μόνο όταν είναι πράγματι κρατημένο."],"date_en":"Jul 2026","items_en":["🔧 Fix: the reserve icon (padlock) on the Stock card looked gold (as if reserved) on every item. It's now grey when the item is available and gold only when it's actually reserved."]},{"version":"v10.82","date_el":"Ιούλιος 2026","items_el":["🔒 Κρατήσεις — ολοκλήρωση & παράδοση: κάθε κράτηση έχει τώρα κουμπί «Ολοκλήρωση & Πώληση» που ανοίγει την κανονική πώληση με τη συμφωνημένη τιμή (ένα ή πολλά είδη· οι χύδην αλυσίδες αφαιρούν τα γραμμάρια), καταχωρεί την πώληση και κλείνει την κράτηση. Νέο φίλτρο «🔒 Κρατημένα» στην κατάσταση αποθέματος. Αν πουλήσετε κρατημένο είδος, σας κατευθύνει στην κράτηση. Αυτόματη λήξη: μετά την ημερομηνία «κράτηση έως» τα είδη επιστρέφουν στη βιτρίνα. Διορθώθηκε το πεδίο ποσού προκαταβολής/πληρωμής.","🗓 Οι ημερομηνίες σε PDF και ειδοποιήσεις ακολουθούν πλέον τη «Μορφή Ημερομηνίας» των Ρυθμίσεων (όπως όλες οι υπόλοιπες)."],"date_en":"Jul 2026","items_en":["🔒 Reservations — completion & handover: every reservation now has a «Complete & sell» button that opens the normal sale at the agreed price (single or multiple items; bulk chains deduct their grams), records the sale and closes the reservation. New «🔒 Reserved» filter in Stock status. Selling a reserved item steers you to its reservation. Auto-expiry: after the «hold until» date items return to the showroom. Fixed the deposit/payment amount box.","🗓 Dates in PDFs and notifications now follow the Settings «Date Format» (like every other date)."]},{"version":"v10.81","date_el":"Ιούλιος 2026","items_el":["🔒 Κρατήσεις μέσα από τη ροή πώλησης: για ένα είδος πατήστε «Κράτηση» δίπλα στο «Πωλήθηκε» στην μπάρα τιμής· για πολλά, από το καλάθι· ή απευθείας από την κάρτα ενός είδους στο Απόθεμα (εικονίδιο 🔒). Ανοίγει διάλογος για πελάτη (όνομα/τηλέφωνο/email), προκαταβολή και ημερομηνία «κράτηση έως». Η συμφωνημένη τιμή (με εκπτώσεις/στρογγυλοποίηση) κλειδώνει, τα είδη σημειώνονται ως κρατημένα και κρύβονται από την online βιτρίνα. (Ολοκλήρωση/παράδοση, αυτόματη λήξη και εκτυπώσιμη φόρμα έρχονται στη συνέχεια.)"],"date_en":"Jul 2026","items_en":["🔒 Reservations from within the sale flow: for one item, tap «Reserve» next to «Sold» on the price bar; for several, from the cart; or straight from an item card in Stock (🔒 icon). A dialog captures the customer (name/phone/email), a deposit and a «hold until» date. The agreed price (with discounts/rounding) is locked in, items are marked reserved and hidden from the online showroom. (Completion/handover, auto-expiry and a printable form come next.)"]},{"version":"v10.80","date_el":"Ιούλιος 2026","items_el":["🧭 Νέα, καθαρότερη πλοήγηση: το κάτω μενού έχει τώρα 5 βασικές καρτέλες (Υπολ. · Απόθεμα · Πωλήσεις · Πελάτες · Πάγκος) και τα Προμηθευτές/Συγχρονισμός/Ρυθμίσεις/Πληροφορίες μετακόμισαν στο μενού «☰» πάνω δεξιά.","🔒 Κρατήσεις (νέα καρτέλα «Πάγκος»): κρατήστε είδη για έναν πελάτη, με προαιρετική προκαταβολή και παρακολούθηση δόσεων & υπολοίπου. Τα κρατημένα είδη κρύβονται αυτόματα από την online βιτρίνα. (Ολοκλήρωση/παράδοση, εκτυπώσιμη υπογεγραμμένη φόρμα και οι Επισκευές έρχονται αμέσως μετά.)"],"date_en":"Jul 2026","items_en":["🧭 New, cleaner navigation: the bottom bar now has 5 core tabs (Calc · Stock · Sales · Clients · Desk) and Vendors/Sync/Settings/Info moved into the «☰» menu top-right.","🔒 Reservations (new «Desk» tab): hold items for a customer, with an optional deposit and installment & balance tracking. Reserved items are automatically hidden from the online showroom. (Completion/handover, a printable signed form, and Repairs are coming right after.)"]},{"version":"v10.79","date_el":"Ιούλιος 2026","items_el":["🔗 Προσθήκη όμοιων ειδών: αν αφήσετε το βάρος κενό, χρησιμοποιείται αυτόματα το ίδιο βάρος με τα υπόλοιπα είδη της ομάδας — έτσι για πανομοιότυπα κομμάτια βάζετε μόνο την ποσότητα. (Αντικαθιστά την προηγούμενη αλλαγή που ζητούσε βάρος.)"],"date_en":"Jul 2026","items_en":["🔗 Add similar items: leaving the weight blank now automatically uses the same weight as the rest of the group — so for identical pieces you just set the quantity. (Replaces the earlier version that asked for a weight.)"]},{"version":"v10.78","date_el":"Ιούλιος 2026","items_el":["♻️ Επαναχρησιμοποίηση κωδικών αναφοράς: όταν διαγράφετε ένα είδος, ο αριθμός του κωδικού (π.χ. CR0300) έμενε αχρησιμοποίητος για πάντα. Πλέον η επόμενη νέα ετικέτα χρησιμοποιεί αυτόματα τον χαμηλότερο ελεύθερο αριθμό, ώστε να μη χάνονται κωδικοί. (Οι αριθμοί είναι κοινοί για όλους τους τύπους — τα γράμματα δείχνουν απλώς τον τύπο. Τα πουλημένα είδη κρατούν τον αριθμό τους.)","🔗 Προσθήκη όμοιων ειδών: αν αφήσετε το πεδίο βάρους κενό, η προεπισκόπηση δείχνει τώρα «βάλτε βάρος» αντί για τον κωδικό του υπάρχοντος είδους — ώστε να μη φαίνεται ότι θα χρησιμοποιήσει το βάρος του. (Χρειάζεται πάντα βάρος.)"],"date_en":"Jul 2026","items_en":["♻️ Reuse reference codes: when you delete an item, its code number (e.g. CR0300) used to be lost forever. New tags now automatically reuse the lowest freed number, so codes aren't wasted. (Numbers are shared across all types — the letters just show the type. Sold items keep their number.)","🔗 Add similar items: if you leave the weight box empty, the preview now says «enter a weight» instead of showing the existing item's code — so it no longer looks like it will reuse that item's weight. (A weight is always required.)"]},{"version":"v10.77","date_el":"Ιούλιος 2026","items_el":["🔧 Διόρθωση εξαγωγής CSV στα Ελληνικά: το αρχείο έβγαινε μπερδεμένο (οι αριθμοί κόβονταν σε λάθος στήλες) γιατί χρησιμοποιούσε «;» και υποδιαστολή κόμμα. Τώρα η ελληνική εξαγωγή έχει την ίδια δομή με την αγγλική (διαχωρισμός με κόμμα, υποδιαστολή τελεία) — μόνο τα κείμενα είναι στα ελληνικά — και ανοίγει σωστά."],"date_en":"Jul 2026","items_en":["🔧 Greek CSV export fix: the file came out scrambled (numbers split into the wrong columns) because it used «;» and decimal commas. The Greek export now uses the same structure as the English one (comma-separated, decimal points) with Greek text, and opens correctly."]},{"version":"v10.76","date_el":"Ιούλιος 2026","items_el":["🔧 Διόρθωση εξαγωγής CSV: στην ανάλυση ανά τύπο, η ανάλυση ασημιού ανά καθαρότητα εμφανιζόταν λάθος (π.χ. «925:30:00») επειδή το Excel το διάβαζε ως ώρα. Τώρα εμφανίζεται σωστά ως «925 (30)»."],"date_en":"Jul 2026","items_en":["🔧 CSV export fix: in the breakdown by type, the silver-by-fineness detail showed wrong (e.g. «925:30:00») because Excel read it as a time. It now shows correctly as «925 (30)»."]},{"version":"v10.75","date_el":"Ιούλιος 2026","items_el":["📊 Εξαγωγή CSV: στο τέλος του αρχείου προστέθηκε πίνακας «Ανάλυση ανά τύπο» — για κάθε τύπο (δαχτυλίδια, σταυροί κ.λπ.) δείχνει σύνολο τεμαχίων, πόσα χρυσά και πόσα ασημένια, με ανάλυση ανά καράτι (π.χ. δαχτυλίδια 90 · χρυσός 40 [18K:20 · 14K:20] · ασήμι 50 [925:50])."],"date_en":"Jul 2026","items_en":["📊 CSV export: a «Breakdown by type» table was added at the end of the file — for each type (rings, crosses, etc.) it shows total pieces, how many are gold and how many silver, broken down by karat (e.g. Rings 90 · gold 40 [18K:20 · 14K:20] · silver 50 [925:50])."]},{"version":"v10.74","date_el":"Ιούλιος 2026","items_el":["🔧 Διόρθωση εξαγωγής CSV: τα κουμπιά επιλογών (κατάσταση, τύποι, στήλες) δεν λειτουργούσαν σε ορισμένα κινητά και η λίστα «Τύποι» ήταν κενή αν δεν είχατε ανοίξει πρώτα το «Απόθεμα». Τώρα οι επιλογές είναι κανονικά κουμπιά που πατιούνται, και το απόθεμα φορτώνει αυτόματα μόλις ανοίξει η εξαγωγή."],"date_en":"Jul 2026","items_en":["🔧 CSV export fix: the option buttons (status, types, columns) didn't respond on some phones, and the «Types» list was empty unless you'd opened the Stock tab first. The options are now proper tappable buttons, and your inventory loads automatically when the export opens."]},{"version":"v10.73","date_el":"Ιούλιος 2026","items_el":["🔁 Έλεγχος απογραφής: αν σαρώσετε είδος που έχει ήδη σαρωθεί, εμφανίζεται αμέσως προειδοποίηση «Ήδη σαρωμένο» (με μικρή δόνηση) και δεν μετριέται δεύτερη φορά. Για ομάδες όμοιων ειδών ή νομίσματα που μοιράζονται τον ίδιο κωδικό, οι επαναλαμβανόμενες σαρώσεις επιτρέπονται μέχρι τον αριθμό των κομματιών στο απόθεμα (εμφανίζεται π.χ. «2/5»)."],"date_en":"Jul 2026","items_en":["🔁 Inventory check: scanning an item that's already been counted now shows an immediate «Already scanned» warning (with a short buzz) and isn't counted twice. For groups of identical items or coins that share the same code, repeat scans are allowed up to the number of pieces in stock (shown e.g. «2/5»)."]},{"version":"v10.72","date_el":"Ιούλιος 2026","items_el":["🔧 Διόρθωση ελέγχου απογραφής: η σάρωση έδειχνε «Άγνωστος κωδικός» για κανονικά είδη, όταν ανοίγατε τη σάρωση χωρίς να έχετε επισκεφθεί πρώτα την καρτέλα «Απόθεμα». Τώρα φορτώνει το απόθεμα αυτόματα μόλις ανοίξει η σάρωση, ώστε κάθε κωδικός να αναγνωρίζεται σωστά."],"date_en":"Jul 2026","items_en":["🔧 Inventory-check fix: scanning showed «Unknown code» for normal items when you opened the scanner without first visiting the Stock tab. It now loads your inventory automatically as the scanner opens, so every code is recognised correctly."]},{"version":"v10.71","date_el":"Ιούλιος 2026","items_el":["🔧 Διόρθωση: η εξαγωγή απογραφής σε CSV έδειχνε κόστος €0 για είδη τύπου «Άλλο». Τώρα υπολογίζει το πραγματικό κόστος (τιμή αγοράς − έκπτωση προμηθευτή), όπως ακριβώς φαίνεται όταν σαρώνετε το είδος."],"date_en":"Jul 2026","items_en":["🔧 Fix: the inventory CSV export showed €0 cost for «Other»-type items. It now computes the real cost (purchase price − supplier discount), exactly as shown when you scan the item."]},{"version":"v10.70","date_el":"Ιούλιος 2026","items_el":["🔍 Έλεγχος απογραφής τέλους σεζόν: Ρυθμίσεις → «Έλεγχος Απογραφής» → «Έναρξη». Εμφανίζεται κουμπί «Σάρωση» σε ΟΛΕΣ τις συσκευές — εσείς κι οι υπάλληλοι σαρώνετε τα QR όλων των ειδών (τα νομίσματα & το μέταλλο δεν μετρούν). Βλέπετε ζωντανά πόσα σαρώθηκαν συνολικά. Όταν τελειώσετε, «Ολοκλήρωση & Σύγκριση»: η εφαρμογή συγκρίνει ό,τι σαρώθηκε με το απόθεμα και δείχνει τι λείπει (με αξία), τι σαρώθηκε ενώ είναι πουλημένο, και άγνωστους κωδικούς. Εξαγωγή αποτελέσματος σε CSV. Λειτουργεί και με πληκτρολόγηση κωδικού (π.χ. σε iPhone)."],"date_en":"Jul 2026","items_en":["🔍 End-of-season inventory check: Settings → «Inventory Check» → «Start». A «Scan» button appears on EVERY device — you and your staff scan every item's QR (coins & scrap metal don't count). You see the running total scanned across all phones live. When done, «Finish & Compare»: the app checks what was scanned against your stock and shows what's missing (with value), what was scanned but marked sold, and any unknown codes. Export the result to CSV. Also works by typing a code (e.g. on iPhone)."]},{"version":"v10.69","date_el":"Ιούλιος 2026","items_el":["📊 Εξαγωγή απογραφής σε CSV (για τον λογιστή): Ρυθμίσεις → «📊 Εξαγωγή Απογραφής». Διαλέγετε τι περιλαμβάνεται (τύποι — τα νομίσματα & το μέταλλο εξαιρούνται προεπιλεγμένα), εύρος ημερομηνίας με κουμπιά σεζόν, μόνο απόθεμα ή και πουλημένα, και ποιες στήλες αξίας (κόστος, λιανική, καθαρά γραμμάρια). Το αρχείο ομαδοποιείται ανά τύπο με υποσύνολα (σύνολο δαχτυλίδια, βραχιόλια κ.λπ.), γενικό σύνολο, σύνοψη καθαρού χρυσού/ασημιού ανά καράτι, και σφραγίδα με ημερομηνία + τιμή χρυσού/ασημιού της στιγμής. Ανοίγει καθαρά σε ελληνικό Excel."],"date_en":"Jul 2026","items_en":["📊 Inventory CSV export (for your accountant): Settings → «📊 Export Inventory». Choose what's included (types — coins & scrap metal are excluded by default), a date range with season buttons, in-stock only or including sold, and which value columns (cost, retail, pure grams). The file is grouped by type with subtotals (total rings, bracelets, etc.), a grand total, a pure gold/silver-by-karat summary, and a stamp of the date + gold/silver price used. Opens cleanly in Excel."]},{"version":"v10.68","date_el":"Ιούλιος 2026","items_el":["📖 Ανανεωμένες & πλήρεις Οδηγίες Χρήσης σε ξεχωριστή σελίδα: οι παλιές οδηγίες ήταν ξεπερασμένες. Τώρα η καρτέλα «Πληροφορίες» → «📖 Οδηγίες Χρήσης» ανοίγει έναν πλήρη, δίγλωσσο οδηγό (21 ενότητες: τιμολόγηση, σάρωση, απόθεμα, όμοια είδη, νομίσματα, μέταλλο, πωλήσεις, πελάτες, online βιτρίνα, αντίγραφα ασφαλείας κ.ά.). Έτσι η εφαρμογή παραμένει ελαφριά."],"date_en":"Jul 2026","items_en":["📖 Refreshed & complete User Manual on its own page: the old manual was out of date. The Info tab → «📖 User Manual» now opens a full, bilingual guide (21 sections: pricing, scanning, stock, similar items, coins, metal, sales, clients, online showroom, backups, and more). This keeps the app itself lightweight."]},{"version":"v10.67","date_el":"Ιούλιος 2026","items_el":["🔍 Βελτιώσεις στη μεγεθυσμένη τιμή (η οθόνη προς τον πελάτη): (1) τώρα που προστέθηκε η φωτογραφία, η οθόνη χωράει ολόκληρη χωρίς κύλιση — η φωτογραφία προσαρμόζεται αυτόματα στον διαθέσιμο χώρο σε κάθε συσκευή. (2) Αν αλλάξετε καρτέλα ενώ είναι ανοιχτή, κλείνει αυτόματα — δεν «ξεπροβάλλει» πια στο φόντο."],"date_en":"Jul 2026","items_en":["🔍 Enlarged price view fixes (the customer-facing screen): (1) now that the photo was added, the screen fits without scrolling — the photo scales automatically to the available space on any device. (2) It closes automatically when you switch tabs — no more peeking through in the background."]},{"version":"v10.66","date_el":"Ιούλιος 2026","items_el":["📜 Πλήρες ιστορικό εκδόσεων σε ξεχωριστή σελίδα: μέχρι τώρα κρατούσαμε μόνο τις 10 τελευταίες εκδόσεις για να μη «φουσκώνει» η εφαρμογή. Πλέον στην καρτέλα «Πληροφορίες» εμφανίζεται μόνο η τρέχουσα έκδοση, με ένα κουμπί «📜 Ολόκληρο το ιστορικό εκδόσεων» που ανοίγει ΟΛΕΣ τις εκδόσεις από την αρχή (v9.29 έως σήμερα), δίγλωσσα. Έτσι δεν χάνεται πια τίποτα από το ιστορικό."],"date_en":"Jul 2026","items_en":["📜 Full version history on its own page: until now we only kept the last 10 versions so the app would not get bloated. The Info tab now shows only the current version, with a \"📜 View the full changelog\" button that opens EVERY version since the beginning (v9.29 to today), in both languages. Nothing from the history is lost anymore."]},{"version":"v10.65","date_el":"Ιούλιος 2026","items_el":["🖼️ Ολόκληρη η φωτογραφία και στις υπόλοιπες μικρές προεπισκοπήσεις: στη δημιουργία ετικέτας (καρτέλα Αριθμομηχανή), στο σκανάρισμα προς απόθεμα και στην Επεξεργασία είδους, η μικρή φωτογραφία κοβόταν — τώρα δείχνει ολόκληρο το κόσμημα σε λευκό φόντο.","🔍 Φωτογραφία στη μεγεθυσμένη τιμή: όταν πατάτε την τελική τιμή για να μεγαλώσει (η οθόνη προς τον πελάτη), εμφανίζεται πλέον και η φωτογραφία του κομματιού κάτω από τα στοιχεία — ώστε ο πελάτης να βλέπει και το κόσμημα, όχι μόνο την τιμή. (Αν το κομμάτι δεν έχει φωτογραφία, απλώς δεν εμφανίζεται τίποτα.)"],"date_en":"Jul 2026","items_en":["🖼️ Whole photo in the remaining small previews too: in label creation (Calc tab), scan-to-inventory and Edit item, the small photo was cropped — it now shows the whole piece on a white background.","🔍 Photo in the enlarged price view: when you tap the final price to enlarge it (the customer-facing screen), the piece's photo now appears under the details — so the customer sees the jewelry, not just the price. (If the piece has no photo, nothing is shown.)"]},{"version":"v10.64","date_el":"Ιούλιος 2026","items_el":["🖼️ Πλήρης εικόνα στις μικρογραφίες: οι μικρές φωτογραφίες κοβόντουσαν (π.χ. σε ψηλές φωτογραφίες κολιέ έβλεπες μόνο τη μέση της αλυσίδας, όχι το μοτίφ), οπότε δεν καταλάβαινες ποιο κομμάτι είναι χωρίς να τη μεγεθύνεις. Τώρα δείχνουν ολόκληρη τη φωτογραφία σε λευκό φόντο — στις κάρτες του αποθέματος, στο πλαίσιο τιμής της αριθμομηχανής όταν σκανάρετε ένα κομμάτι, και στην προειδοποίηση διπλού κωδικού QR. (Ίδιο σε κινητό και υπολογιστή.)"],"date_en":"Jul 2026","items_en":["🖼️ Full image in thumbnails: the small photos were being cropped (e.g. on tall necklace photos you only saw the middle of the chain, not the motif), so you couldn't tell which piece it was without enlarging it. They now show the whole photo on a white background — on the inventory cards, in the Calc price bar when you scan a piece, and in the duplicate-QR warning. (Same on mobile and desktop.)"]},{"version":"v10.63","date_el":"Ιούλιος 2026","items_el":["🔤 Διόρθωση τόνων στα κεφαλαία: στα ελληνικά, οι λέξεις γραμμένες ΟΛΕΣ ΜΕ ΚΕΦΑΛΑΙΑ δεν παίρνουν τόνο. Σε ορισμένα σημεία (π.χ. στη βιτρίνα ο τύπος «ΑΛΥΣΙΔΑ» και το μέταλλο «ΧΡΥΣΟΣ», καθώς και οι τίτλοι «ΚΑΤΑΛΟΓΟΣ» / «ΦΥΛΛΟ ΠΑΡΑΓΓΕΛΙΑΣ» στα PDF και το κουμπί «ΠΡΟΣΘΗΚΗ») εμφανιζόταν λανθασμένα ο τόνος. Αφαιρέθηκε παντού. Τα διαλυτικά (¨) διατηρούνται κανονικά."],"date_en":"Jul 2026","items_en":["🔤 Uppercase accent fix: in Greek, words written in ALL CAPS do not take an accent. In a few places (e.g. the showroom type \"ΑΛΥΣΙΔΑ\" and metal \"ΧΡΥΣΟΣ\", plus the \"ΚΑΤΑΛΟΓΟΣ\" / \"ΦΥΛΛΟ ΠΑΡΑΓΓΕΛΙΑΣ\" PDF titles and the \"ΠΡΟΣΘΗΚΗ\" button) the accent was showing incorrectly. Removed everywhere. The dialytika (¨) is kept as normal."]},{"version":"v10.62","date_el":"Ιούλιος 2026","items_el":["📈 Ποσοστό ανατίμησης στα σύνολα του αποθέματος: κάτω από τη «Συνολική Αξία Λιανική» και την «Αξία Μετάλλου» εμφανίζεται πλέον (μόνο για ιδιοκτήτη/διαχειριστή) το ποσοστό αύξησης/μείωσης — πράσινο για άνοδο, κόκκινο για πτώση — όπως ήδη βλέπετε σε κάθε κομμάτι. Είναι ανεξάρτητο από ποσότητα: όταν προσθέτετε ή πουλάτε ένα κομμάτι το ποσοστό ΔΕΝ αλλάζει — μόνο η πραγματική κίνηση της τιμής χρυσού/ασημιού το μετακινεί. Η Λιανική μετριέται από την τιμή που καταχωρήσατε κάθε κομμάτι· η Αξία Μετάλλου για τα υπάρχοντα κομμάτια μετριέται από την τιμή μετάλλου της 20ής Μαΐου 2025, ενώ ό,τι προσθέτετε από εδώ και πέρα ξεκινά από τη δική του τρέχουσα τιμή."],"date_en":"Jul 2026","items_en":["📈 Appreciation % on the inventory totals: under \"Total Retail Value\" and \"Metal Value\" you (owner/manager only) now see the rise/drop percentage — green for up, red for down — the same as on every item card. It is count-independent: adding or selling a piece does NOT move the %, only real gold/silver price movement does. Retail is measured from the price you entered each piece at; Metal Value for your existing stock is measured from the metal price on 20 May 2025, while anything you add from now on starts from its own current price."]},{"version":"v10.61","date_el":"Ιούλιος 2026","items_el":["🔧 Αφαιρέθηκε το κουμπί «Έλεγχος Διπλότυπων QR» από τις Ρυθμίσεις: το είχαμε φτιάξει παλιά για μια έκτακτη διόρθωση της βάσης. Πλέον χρησιμοποιούμε σκόπιμα ίδιους κωδικούς QR (στα νομίσματα και στα όμοια/επαναλαμβανόμενα είδη), οπότε το κουμπί έδειχνε δεκάδες «διπλότυπα» που είναι κανονικά — και το κουμπί «Διόρθωση» δίπλα τους θα άλλαζε το βάρος (άρα και την τιμή) ενός κομματιού. Η εφαρμογή ήδη σας προειδοποιεί μόνη της αν προσπαθήσετε να αποθηκεύσετε κατά λάθος ίδιο κωδικό, οπότε το εργαλείο δεν χρειάζεται πια."],"date_en":"Jul 2026","items_en":["🔧 Removed the \"Duplicate QR Check\" button from Settings: we built it long ago for a one-off database fix. We now deliberately use the same QR code in several places (coins, and identical/restocked \"similar items\"), so the button flagged dozens of perfectly normal \"duplicates\" — and its \"Fix\" button next to them would have changed a piece's weight (and therefore its price). The app already warns you by itself if you ever try to save a duplicate code by accident, so the tool is no longer needed."]},{"version":"v10.60","date_el":"Ιούλιος 2026","items_el":["📡 Διόρθωση «Δεν είναι δυνατή η λήψη τιμής χρυσού» στον υπολογιστή: όταν η εφαρμογή έμενε ανοιχτή για ώρα (και μετά από αδράνεια/ύπνο της οθόνης), εμφανιζόταν το κόκκινο μήνυμα και έπρεπε να την κλείσετε και να την ξανανοίξετε. Τώρα: (1) η τελευταία τιμή χρυσού/ασημιού αποθηκεύεται και επαναφέρεται, οπότε μια στιγμιαία διακοπή δικτύου δεν σβήνει την τιμή· (2) κάθε αίτημα έχει όριο χρόνου 12 δευτ. ώστε να μην «κολλάει»· (3) το προειδοποιητικό μήνυμα εμφανίζεται μόνο αν η τιμή είναι πραγματικά παλιά (καμία επιτυχής λήψη για ~30 λεπτά), όχι σε μία αποτυχημένη ανανέωση· (4) η εφαρμογή ξαναδοκιμάζει αυτόματα μέσα σε ένα λεπτό και μόλις επανέλθει το δίκτυο ή ξαναεστιάσετε το παράθυρο — χωρίς να χρειάζεται επανεκκίνηση."],"date_en":"Jul 2026","items_en":["📡 Fixed \"Cannot fetch live gold price\" on desktop: when the app was left open for a while (and after the screen went idle/asleep) the red warning would appear and you had to close and reopen the app. Now: (1) the last good gold/silver price is saved and restored, so a brief network drop never blanks the price; (2) each request has a 12-second timeout so it can no longer hang; (3) the warning only appears when the price is genuinely stale (no successful fetch for ~30 minutes), not on a single failed refresh; (4) the app automatically retries within a minute and refetches the moment the network returns or you refocus the window — no restart needed."]},{"version":"v10.59","date_el":"Ιούλιος 2026","items_el":["↩️ Σωστή επαναφορά όταν διαγράφετε πώληση όμοιου/πανομοιότυπου κομματιού: αν είχατε π.χ. ομάδα με 5 ίδια κομμάτια (ή νομίσματα με τον ίδιο κωδικό), πουλούσατε ένα και μετά ο πελάτης το επέστρεφε, η διαγραφή της πώλησης μπορούσε να ΜΗΝ ξαναβάλει το κομμάτι στο απόθεμα (η ομάδα έμενε στα 4 αντί να γυρίσει στα 5), γιατί όλα τα ίδια κομμάτια έχουν τον ίδιο κωδικό QR. Τώρα κάθε πώληση θυμάται το ΑΚΡΙΒΕΣ κομμάτι που πουλήθηκε, οπότε η διαγραφή το επαναφέρει σωστά και η ομάδα ξαναγίνεται 5. (Ισχύει και για τις παλιές πωλήσεις — η επαναφορά ψάχνει πλέον πουλημένο κομμάτι.)"],"date_en":"Jul 2026","items_en":["↩️ Correct restore when deleting the sale of an identical/grouped piece: if you had e.g. a group of 5 identical pieces (or coins sharing one code), sold one, and then the customer returned it, deleting the sale could FAIL to put the piece back in stock (the group stayed at 4 instead of returning to 5) — because all identical pieces share the same QR code. Now every sale remembers the EXACT piece that was sold, so deleting it restores that piece correctly and the group goes back to 5. (Also improved for older sales — the restore now looks for a sold piece.)"]},{"version":"v10.58","date_el":"Ιούλιος 2026","items_el":["📈 Ποσοστό μεταβολής και στις κάρτες ομάδας: κάτω από την τιμή μιας ομάδας όμοιων ειδών (π.χ. σκουλαρίκια, βραχιόλια) εμφανίζεται πλέον η «Αρχική αξία ομάδας» με το ποσοστό αύξησης/μείωσης — όπως στα μεμονωμένα κομμάτια. Ο υπολογισμός γίνεται μόνο πάνω στα κομμάτια που υπάρχουν αυτή τη στιγμή στην ομάδα: αν πουλήσετε ένα, το σύνολο μικραίνει αλλά το ποσοστό ΔΕΝ το μετράει ως πτώση τιμής — αφαιρείται μαζί και η αρχική του αξία, οπότε το ποσοστό δείχνει μόνο την πραγματική κίνηση της τιμής του χρυσού/ασημιού."],"date_en":"Jul 2026","items_en":["📈 Percentage change on group cards: under the price of a similar-items group (e.g. earrings, bracelets) there is now a \"Group initial value\" line with the rise/drop percentage — just like on individual pieces. It is calculated only over the pieces currently in the group: if you sell one, the total shrinks but the percentage does NOT read it as a price drop — that piece's original value is removed too, so the percentage reflects only real gold/silver price movement."]},{"version":"v10.57","date_el":"Ιούλιος 2026","items_el":["🔗 Νέο φίλτρο «Ομαδοποιημένα»: στα φίλτρα, στην ενότητα Κατάσταση (ανάμεσα σε «Πουλήθηκε» και «Κρυφά») προστέθηκε επιλογή «🔗 Ομαδοποιημένα» — δείχνει μόνο τα είδη που ανήκουν σε ομάδα όμοιων. Συνδυάζεται με τα άλλα φίλτρα: π.χ. «Δαχτυλίδια + Ομαδοποιημένα + Προμηθευτής» για να βρείτε γρήγορα μια υπάρχουσα ομάδα δαχτυλιδιών, χωρίς να ψάχνετε ανάμεσα στα μεμονωμένα."],"date_en":"Jul 2026","items_en":["🔗 New \"Grouped\" filter: under Status (between \"Sold\" and \"Hidden\") there is now a \"🔗 Grouped\" option — it shows only items that belong to a similar-items group. Combine it with the other filters, e.g. \"Rings + Grouped + Vendor\", to quickly find an existing ring group instead of hunting through the individual pieces."]},{"version":"v10.56","date_el":"Ιούλιος 2026","items_el":["🖥️ Ομοιόμορφες κάρτες στον υπολογιστή: στην προβολή 2/3 στηλών, η κάρτα ομαδοποιημένων («όμοιων») ειδών ήταν πιο κοντή από τις υπόλοιπες και φαινόταν άσχημα — τώρα όλες οι κάρτες σε μια σειρά έχουν το ίδιο ύψος και τα κουμπιά ευθυγραμμίζονται κάτω. (Στο κινητό δεν αλλάζει τίποτα.)","✋ Το σήμα «χειροποίητο» εμφανίζεται πλέον και στις κάρτες ομαδοποιημένων ειδών, όταν κάποιο από τα κομμάτια της ομάδας είναι χειροποίητο."],"date_en":"Jul 2026","items_en":["🖥️ Even cards on desktop: in the 2/3-column view the grouped (\"similar items\") card was shorter than the rest and looked awkward — now every card in a row shares the same height and the buttons line up along the bottom. (Nothing changes on mobile.)","✋ The handmade mark now also shows on grouped-item cards when any piece in the group is handmade."]},{"version":"v10.55","date_el":"Ιούλιος 2026","items_el":["🔢 «Προσθήκη όμοιων ειδών» με ποσότητα: στο παράθυρο προστέθηκε πεδίο «Ποσότητα» με βελάκια πάνω/κάτω. Βάλτε βάρος και ποσότητα (π.χ. 5) και προστίθενται και τα 5 μαζί με ένα πάτημα — και με «Εκτύπωση & Προσθήκη» τυπώνονται και οι 5 ίδιες ετικέτες με μία εντολή. Τέλος πια το ένα-ένα."],"date_en":"Jul 2026","items_en":["🔢 \"Add similar items\" with quantity: the window now has a \"Quantity\" field with up/down arrows. Enter a weight and a quantity (e.g. 5) and all 5 are added at once with one tap — and \"Print & Add\" prints all 5 identical labels in one command. No more one-by-one."]},{"version":"v10.54","date_el":"Ιούλιος 2026","items_el":["🎯 Διόρθωση τιμής «ανά τεμάχιο»: όταν το κόστος που δίνατε ήταν μικρότερο από την αξία του χρυσού του κομματιού, η τελική τιμή έβγαινε λάθος (π.χ. €54 αντί για €20 που ζητούσατε). Τώρα η Τιμή-Στόχος τηρείται πάντα σωστά.","💰 Αν αφήσετε το «Κόστος Αγοράς» κενό (σε κατηγορία ανά τεμάχιο), μπαίνει αυτόματα η αξία του μετάλλου πριν τον ΦΠΑ — ιδανικό για κομμάτια που φτιάχνετε εσείς, όπου το κόστος σας είναι ο χρυσός.","🖥️ Διόρθωση στον υπολογιστή: σε πλήρη οθόνη το πλαίσιο τελικής τιμής «έφευγε» προς τα δεξιά — τώρα είναι κεντραρισμένο κάτω από τη φόρμα."],"date_en":"Jul 2026","items_en":["🎯 Per-item price fix: when the cost you entered was lower than the piece's gold value, the final price came out wrong (e.g. €54 instead of the €20 you asked for). The Target Retail price is now always honored.","💰 Leaving \"Purchase Cost\" blank (per-item category) now auto-fills the metal value before VAT — ideal for pieces you make yourself, where your cost is the gold.","🖥️ Desktop fix: when maximized, the final-price box drifted to the right — it is now centered under the form."]},{"version":"v10.53","date_el":"Ιούλιος 2026","items_el":["🙈 Σήμανση «κρυφών» ειδών: όσα είδη έχετε κρύψει από τη βιτρίνα δείχνουν πλέον ένα εικονίδιο 🙈 στην κάρτα τους (δίπλα στα υπόλοιπα σήματα, όπως το χειροποίητο), για να τα ξεχωρίζετε με μια ματιά.","🔎 Φίλτρο «Κρυφά»: στα φίλτρα, στην ενότητα Κατάσταση (δίπλα σε «Σε Απόθεμα» / «Πουλήθηκε») προστέθηκε επιλογή «🙈 Κρυφά» — για να βλέπετε μόνο τα είδη που έχετε κρύψει από το online showroom."],"date_en":"Jul 2026","items_en":["🙈 \"Hidden\" mark on items: any piece you've hidden from the showroom now shows a 🙈 icon on its card (next to the other badges like handmade), so you can spot them at a glance.","🔎 \"Hidden\" filter: in Filters → Status (next to \"In Stock\" / \"Sold\") there's a new \"🙈 Hidden\" option — to list only the items you've hidden from the online showroom."]},{"version":"v10.52","date_el":"Ιούλιος 2026","items_el":["🖥️ Επιλογή στηλών στον υπολογιστή: πάνω δεξιά στο Απόθεμα προστέθηκε μενού «Λίστα / 2 στήλες / 3 στήλες» — διαλέγετε πόσο πυκνά θέλετε τη λίστα (λίστα για μικρή οθόνη laptop, 2–3 στήλες για μεγάλη οθόνη). Η επιλογή αποθηκεύεται. Εμφανίζεται μόνο στον υπολογιστή· στο κινητό δεν αλλάζει τίποτα.","🙈 «Απόκρυψη από βιτρίνα» σε κάθε είδος: νέος διακόπτης — και στη δημιουργία νέου είδους (Υπολογισμός → Ετικέτα) και στην Επεξεργασία στο Απόθεμα — που κρύβει το συγκεκριμένο κομμάτι από το online showroom. Λειτουργεί σε όλα τα είδη (χρυσό, ασήμι, άλλο). Ιδανικό π.χ. για ανταλλακτικά σκουλαρικιών που πουλάτε μόνο σε περαστικούς. Έτσι αποφασίζετε μόνοι σας τι φαίνεται στη βιτρίνα."],"date_en":"Jul 2026","items_en":["🖥️ Column picker on desktop: a \"List / 2 columns / 3 columns\" menu (top-right of Stock) lets you choose how dense the list is — List for a small laptop screen, 2–3 columns for a big monitor. Your choice is remembered. Desktop-only; nothing changes on the phone.","🙈 \"Hide from showroom\" on every item: a new toggle — both when creating a new item (Calc → Tag) and in Edit on the Stock tab — hides that specific piece from the online showroom. Works for all items (gold, silver, other). Great for e.g. earring backs you only sell to walk-ins. Now you decide what shows in the showroom yourself."]},{"version":"v10.51","date_el":"Ιούλιος 2026","items_el":["🖥️ Νέα προβολή για υπολογιστή: σε μεγάλες οθόνες η εφαρμογή γίνεται πιο φαρδιά και η καρτέλα Απόθεμα εμφανίζεται σε ΔΥΟ στήλες, ώστε να βλέπετε περισσότερα κομμάτια μαζί. Στο κινητό δεν αλλάζει τίποτα.","🐛 Διόρθωση στον υπολογιστή: το στρογγυλό βελάκι «πάνω» δεν εξαφανίζεται πλέον όταν κατεβαίνετε τη λίστα, και η κάτω μπάρα πλοήγησης ευθυγραμμίζεται σωστά με το Απόθεμα σε πλήρη οθόνη.","🙈 Οι υπάλληλοι δεν βλέπουν πλέον τα φίλτρα «Νόμισμα» και «Μέταλλο» (αφορούν μόνο εσάς)."],"date_en":"Jul 2026","items_en":["🖥️ New desktop view: on large screens the app now widens and the Stock tab shows TWO columns so you can see more pieces at once. Nothing changes on the phone.","🐛 Desktop fixes: the round \"back to top\" arrow no longer disappears as you scroll down the stock list, and the bottom navigation bar now lines up correctly with the inventory in fullscreen.","🙈 Employees no longer see the \"Coin\" and \"Metal\" filters (those are owner-only)."]},{"version":"v10.50","date_el":"Ιούλιος 2026","items_el":["✨ Μικρή αισθητική βελτίωση στην καρτέλα Απόθεμα: ο τίτλος «Απόθεμα» έγινε λίγο μικρότερος (δεν ακουμπάει πια στο κουμπί), και το χρυσό νόμισμα στο κουμπί «Προσθήκη νομίσματος» μπήκε αριστερά από τη λέξη — ώστε το κουμπί να είναι συμμετρικό με τα «Προσθήκη μετάλλου» και «Χύδην Αλυσίδες»."],"date_en":"Jul 2026","items_en":["✨ Small cosmetic tidy-up on the Stock tab: the \"Inventory\" title is a touch smaller (it no longer bumps into the button), and the gold coin on the \"Add Coin\" button now sits to the left of the word — so the button lines up symmetrically with \"Add Metal\" and \"Bulk Chains\"."]},{"version":"v10.49","date_el":"Ιούλιος 2026","items_el":["🐛 Διόρθωση λανθασμένου ποσοστού στα νομίσματα: τα νομίσματα που προσθέσατε πριν εμφανιστεί η γραμμή «Αρχική τιμή» (στην πρώτη μέρα των νομισμάτων) έδειχναν ψεύτικη πτώση ~3–7% αμέσως μετά την προσθήκη — γιατί η αρχική τους τιμή είχε αποθηκευτεί μαζί με το κέρδος πώλησης (π.χ. +€30), ενώ συγκρινόταν με τη σκέτη αξία μετάλλου. Τώρα αφαιρείται σωστά το κέρδος, οπότε το ποσοστό δείχνει μόνο την πραγματική μεταβολή της τιμής του χρυσού/ασημιού από τη στιγμή που τα προσθέσατε."],"date_en":"Jul 2026","items_en":["🐛 Fixed a wrong percentage on coins: coins you added before the \"Initial price\" line existed (on the first day coins were introduced) showed a fake ~3–7% drop right after being added — because their initial price had been stored WITH the selling markup (e.g. +€30), yet it was being compared against the plain metal value. The markup is now correctly stripped out, so the percentage reflects only the real gold/silver price movement since you added them."]},{"version":"v10.48","date_el":"Ιούλιος 2026","items_el":["🧱 Ακατέργαστο μέταλλο / scrap στο απόθεμα (νέο): κουμπί «🧱 Προσθήκη μετάλλου» στην καρτέλα Απόθεμα — για το χρυσάφι/ασήμι που κρατάτε στο χρηματοκιβώτιο για λιώσιμο (καθαρός χρυσός/ασήμι σε μπίλιες, 14/18/22Κ παλιά κοσμήματα πελατών, scrap ασήμι). Διαλέγετε Χρυσό/Ασήμι + καθαρότητα + βάρος. Η αξία υπολογίζεται ζωντανά από την τιμή του μετάλλου.","➕ Προσθέτετε στην ίδια καθαρότητα και το βάρος αθροίζεται: σήμερα 30g 14Κ, αύριο άλλα 30g → η κάρτα δείχνει 60g. Κάθε καθαρότητα (24Κ, 18Κ, 14Κ, καθαρό ασήμι κ.λπ.) έχει τη δική της κάρτα.","💶 Αγορά scrap κάτω από την αξία = κέρδος: αν αγοράσετε π.χ. 30g 14Κ (αξία ~€2030) για €1500, το κέρδος — αφού αφαιρεθεί η απώλεια καθαρισμού (προεπιλογή 3%, ρυθμίζεται στις Ρυθμίσεις) — προστίθεται αυτόματα στις σημερινές σας πωλήσεις ως «♻️ Κέρδος scrap».","📊 Το μέταλλο μετράει στα σύνολα (Αξία Λιανική + Καθαρός χρυσός/ασήμι) αλλά ΔΕΝ μετράει στα «Τεμάχια» (είναι απόθεμα μετάλλου, όχι κόσμημα). Κρύβεται από τη λίστα εκτός αν επιλέξετε τον τύπο «Μέταλλο» στο φίλτρο. Δεν εμφανίζεται ΠΟΤΕ στη δημόσια βιτρίνα. Η κάρτα δείχνει την αξία τώρα και την αξία κατά την προσθήκη με ποσοστό μεταβολής."],"date_en":"Jul 2026","items_en":["🧱 Raw metal / scrap stock (new): a \"🧱 Add Metal\" button on the Stock tab — for the gold/silver you keep in the vault to melt down (pure gold/silver balls, 14/18/22K old jewellery from customers, scrap silver). Pick Gold/Silver + purity + weight; the value is computed live from the metal price.","➕ Add the same purity and the weight adds up: today 30g 14K, tomorrow another 30g → the card shows 60g. Each purity (24K, 18K, 14K, pure silver, etc.) has its own card.","💶 Buying scrap below its value = profit: if you buy e.g. 30g 14K (worth ~€2030) for €1500, the gain — after the refining loss (default 3%, editable in Settings) — is automatically added to today's sales as \"♻️ Scrap gain\".","📊 Metal counts toward your totals (Total Retail + Pure gold/silver) but is NOT counted in \"Pieces\" (it's metal stock, not a jewel). It's hidden from the list unless you pick the \"Metal\" type in the filter, and NEVER shown in the public showroom. The card shows the value now and the value when added with a change %."]},{"version":"v10.47","date_el":"Ιούλιος 2026","items_el":["⚖️ Μεγαλύτερη προεπιλεγμένη ανοχή στην «Αναγνώριση από βάρος»: από ±0.2 σε ±0.5 γραμμάρια (με νέα επιλογή ±1.5) — ώστε τα φθαρμένα παλιά νομίσματα, που ζυγίζουν λιγότερο από το κανονικό, να εντοπίζονται πιο εύκολα."],"date_en":"Jul 2026","items_en":["⚖️ Bigger default tolerance in \"Identify by weight\": from ±0.2 to ±0.5 g (plus a new ±1.5 option) — so worn old coins, which weigh less than standard, are matched more easily."]},{"version":"v10.46","date_el":"Ιούλιος 2026","items_el":["🔎 Φίλτρο «Χωρίς τύπο»: αν κάποια είδη δεν έχουν καθορισμένο τύπο, εμφανίζεται στο φίλτρο «Τύπος» μια επιλογή «Χωρίς τύπο» για να τα βρείτε και να τους ορίσετε τύπο. (Γι' αυτό το σύνολο «Επιλογή όλων» μπορεί να μη συμφωνεί με τη γενική λίστα — τα άτυπα είδη δεν ανήκαν σε κανέναν τύπο.)"],"date_en":"Jul 2026","items_en":["🔎 \"No type\" filter: if some pieces have no type set, the Type filter now shows a \"No type\" option so you can find them and assign a type. (That's also why \"Select all\" could differ from the full list — untyped pieces belonged to no type.)"]},{"version":"v10.45","date_el":"Ιούλιος 2026","items_el":["🔢 Τα «Τεμάχια» μετρούν μόνο κοσμήματα: τα νομίσματα ΔΕΝ προσμετρώνται πλέον στο σύνολο τεμαχίων (το νούμερο αφορά τα κοσμήματα του καταστήματος). Η αξία τους παραμένει κανονικά στην «Αξία Λιανική» και «Αξία Μετάλλου». Αν θέλετε το γενικό σύνολο, επιλέξτε όλους τους τύπους (μαζί με «Νόμισμα») στο φίλτρο.","✅ «Επιλογή όλων» στα φίλτρα: στα αναπτυσσόμενα «Τύπος» και «Προμηθευτής» προστέθηκε επιλογή «Επιλογή όλων» για γρήγορη επιλογή/αποεπιλογή όλων με ένα πάτημα.","📂 Καθαρότερη προβολή ομάδας: στο «Δες κομμάτια», τα κουμπιά «Προσθήκη κι άλλων» / «Πώληση» / «Διαγραφή όλων» είναι πλέον στην κορυφή (δεν χρειάζεται να κατεβείτε π.χ. 107 κομμάτια για να προσθέσετε νέα), και η λίστα των μεμονωμένων κομματιών «μαζεύεται» σε πτυσσόμενο μενού."],"date_en":"Jul 2026","items_en":["🔢 \"Pieces\" now counts jewellery only: coins are no longer included in the total pieces count (that number is your shop's jewellery). Their value still counts normally in Total Retail and Metal Value. To see the grand total, pick all the types (including \"Coin\") in the filter.","✅ \"Select all\" in the filters: the Type and Vendor dropdowns got a \"Select all\" option to tick/untick everything in one tap.","📂 Cleaner group view: in \"View pieces\", the \"Add more\" / \"Sell\" / \"Delete all\" buttons are now at the top (no scrolling past e.g. 107 pieces to add new ones), and the individual-pieces list is collapsed into an expandable dropdown."]},{"version":"v10.44","date_el":"Ιούλιος 2026","items_el":["🐛 Διόρθωση «Προσθήκη κι άλλων» σε νομίσματα: όταν πατούσατε «＋ Προσθήκη κι άλλων» από την ομάδα ενός νομίσματος, το παράθυρο άνοιγε στο προεπιλεγμένο νόμισμα (π.χ. το Δολάριο) αντί για το ΙΔΙΟ νόμισμα της ομάδας — γι' αυτό μπορούσαν να προστεθούν λάθος νομίσματα. Τώρα προεπιλέγεται σωστά το ίδιο νόμισμα."],"date_en":"Jul 2026","items_en":["🐛 Fixed coin \"Add more\": tapping \"＋ Add more\" from a coin group opened the window on the default coin (e.g. the Dollar) instead of the SAME coin as the group — which is how a wrong batch could get added. It now correctly pre-selects the same coin."]},{"version":"v10.43","date_el":"Ιούλιος 2026","items_el":["🗑 Διαγραφή όλης της ομάδας με ένα πάτημα: στο «Δες κομμάτια» μιας ομάδας, το κουμπί «Κατάργηση ομαδοποίησης» έγινε «Διαγραφή όλων (N)» — σβήνει όλα τα κομμάτια της ομάδας μαζί, με μία μόνο επιβεβαίωση (χρήσιμο π.χ. αν προσθέσατε μια παρτίδα νομισμάτων κατά λάθος)."],"date_en":"Jul 2026","items_en":["🗑 Delete a whole group in one tap: in a group's \"View pieces\", the \"Ungroup\" button became \"Delete all (N)\" — it removes every piece of the group at once with a single confirmation (handy e.g. if you added a batch of coins by mistake)."]},{"version":"v10.42","date_el":"Ιούλιος 2026","items_el":["🙈 Τα νομίσματα κρύβονται από τη λίστα αποθέματος: για να μη «γεμίζει» η λίστα με νομίσματα, εμφανίζονται πλέον μόνο όταν επιλέξετε τον τύπο «Νόμισμα» στο φίλτρο (ή όταν κάνετε αναζήτηση, για να βρείτε ένα με το όνομα/κωδικό). Η αξία τους ΠΑΡΑΜΕΝΕΙ στα σύνολα (Αξία Λιανική & Αξία Μετάλλου δεν αλλάζουν)."],"date_en":"Jul 2026","items_en":["🙈 Coins hidden from the Stock list: to keep the list uncluttered, coins now show only when you pick the \"Coin\" type in the filter (or during a search, so you can still find one by name/code). Their value STAYS in the totals — Total Retail and Metal Value don't change."]},{"version":"v10.41","date_el":"Ιούλιος 2026","items_el":["🔗 Σύνδεσμος Numista πάνω στην κάρτα του νομίσματος: δίπλα στην κοινοποίηση, ένα κουμπί 🔗 ανοίγει το ακριβές νόμισμα στο Numista — δείχνετε στον
