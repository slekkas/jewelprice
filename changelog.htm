 πελάτη την τιμή και με ένα πάτημα το ίδιο το νόμισμα και την τρέχουσα αξία του.","📈 «Αρχική τιμή» στην κάρτα του νομίσματος (όπως στα κανονικά είδη): εμφανίζεται η αρχική τιμή με ημερομηνία και ποσοστό μεταβολής. Αν βάλατε τιμή αγοράς, χρησιμοποιείται αυτή· αλλιώς η αξία του μετάλλου τη στιγμή της προσθήκης."],"date_en":"Jul 2026","items_en":["🔗 Numista link on the coin card: next to Share, a 🔗 button opens the exact coin on Numista — show the customer the price and, in one tap, the actual coin and its current value.","📈 \"Initial price\" on the coin card (like regular items): shows the starting price with its date and the % change. If you set a purchase price it uses that; otherwise it uses the metal value at the time you added the coin."]},{"version":"v10.40","date_el":"Ιούλιος 2026","items_el":["🔗 Πιο ακριβής σύνδεσμος Numista: για τα νομίσματα επένδυσης (χρυσές/ασημένιες λίρες τύπου Eagle, Krugerrand, Maple Leaf, Μεξικού κ.λπ.) το 🔗 ανοίγει πλέον ΑΠΕΥΘΕΙΑΣ την ακριβή σελίδα του νομίσματος στο Numista — χωρίς κύλισμα, για να δείξετε αμέσως στον πελάτη το νόμισμα που αγοράζει. Για τα ιστορικά νομίσματα (με πολλές χρονολογίες/εκδόσεις) η αναζήτηση περιλαμβάνει τη χώρα και την ονομαστική αξία, ώστε να βρείτε εύκολα τη δική σας χρονολογία."],"date_en":"Jul 2026","items_en":["🔗 More precise Numista link: for bullion coins (American Eagle, Krugerrand, Maple Leaf, Mexican, etc.) the 🔗 now opens the coin's EXACT Numista page directly — no scrolling, so you can instantly show a customer the coin they're buying. For historical coins (with many years/varieties) it searches by country + face value so you can find your own year."]},{"version":"v10.39","date_el":"Ιούλιος 2026","items_el":["🪙 Νομίσματα στο απόθεμα (νέο) — χρυσά ΚΑΙ ασημένια: κουμπί «🪙 Προσθήκη νομίσματος» στην καρτέλα Απόθεμα (αντικατέστησε τη «Σάρωση QR» εκεί — η σάρωση δουλεύει ακόμη από τον Υπολογισμό). Διαλέγετε Χρυσό ή Ασήμι και μετά νόμισμα από έτοιμο κατάλογο: λίρες Αγγλίας, Ναπολέον, Αυστρίας, Αμερικής, Krugerrand, Maple Leaf, Μεξικού, ελληνικά, καναδικά/αμερικανικά ασημένια δολάρια κ.ά. — ή «Άλλο» για ό,τι λείπει. Ίδια νομίσματα ομαδοποιούνται σε μία κάρτα «N σε απόθεμα».","⚖️ Αναγνώριση από βάρος: μπαίνει άγνωστο νόμισμα στη ζυγαριά, βάζετε το βάρος και η εφαρμογή δείχνει τα πιθανά νομίσματα με αυτό το βάρος (±ανοχή). Κάθε πιθανό έχει σύνδεσμο 🔗 προς τη βάση νομισμάτων Numista για να το επιβεβαιώσετε από φωτογραφία πριν το αγοράσετε.","📈 Ζωντανή αξία: κάθε νόμισμα δείχνει την τρέχουσα αξία μετάλλου εκείνη τη στιγμή. Στα χρυσά προτείνεται τιμή πώλησης (αξία + κέρδος, προεπιλογή €30). Στα ασημένια το κέρδος είναι €0 — δείχνει μόνο την αξία αργύρου (ιδανικό για νομίσματα που κρατάτε/λιώνετε). Και τα δύο κέρδη ρυθμίζονται στις Ρυθμίσεις.","💶 Τιμή αγοράς (προαιρετικό): όταν αγοράζετε ένα νόμισμα, καταχωρείτε πόσο πληρώσατε — το κέρδος στην πώληση υπολογίζεται σωστά (τιμή πώλησης − τιμή αγοράς) και η κάρτα δείχνει «Αγοράστηκε: €Χ» ώστε να μην πουλήσετε κάτω από το κόστος.","🧮 Τα νομίσματα μετρούν στα σύνολα του αποθέματος (Αξία Λιανική + Καθαρός χρυσός/άργυρος) με το ακριβές περιεχόμενο μετάλλου. Στην πώληση χρυσού νομίσματος τα ΜΕΤΡΗΤΑ είναι προεπιλεγμένα. Τα νομίσματα ΔΕΝ εμφανίζονται ποτέ στη δημόσια βιτρίνα.","📊 Η ομαδοποιημένη κάρτα δείχνει και το ΣΥΝΟΛΟ (N× αξία · N× τιμή πώλησης) και ποσοστό υπεραξίας — με βάση την τιμή αγοράς αν υπάρχει, αλλιώς την αξία κατά την προσθήκη (όπως στα κανονικά είδη). Ο τύπος «Νόμισμα» εμφανίζεται και στο φίλτρο ανά τύπο.","➕ «Τα νομίσματά μου»: αν κάποιος φέρει νόμισμα εκτός λίστας, ζυγίζετε → «Νέο νόμισμα» (το βάρος μπαίνει αυτόματα), βάζετε ονομασία + καθαρότητα (από τον έλεγχο μετάλλου ή τον σύνδεσμο Numista) και με ένα τικ αποθηκεύεται. Από κει και πέρα αναγνωρίζεται από το βάρος, παίρνει ζωντανές τιμές και ομαδοποιείται όπως τα υπόλοιπα. Διαχείριση στις Ρυθμίσεις → «Τα νομίσματά μου»."],"date_en":"Jul 2026","items_en":["🪙 Coins in inventory (new) — gold AND silver: a \"🪙 Add Coin\" button on the Stock tab (it replaced \"Scan QR\" there — scanning still works from Calc). Pick Gold or Silver, then a coin from a built-in catalog: British sovereigns, Napoleons, Austrian, American, Krugerrand, Maple Leaf, Mexican, Greek, Canadian/US silver dollars and more — or \"Custom\" for anything not listed. Identical coins group into one \"N in stock\" card.","⚖️ Identify by weight: put an unknown coin on the scale, type the grams, and the app lists the possible coins at that weight (± tolerance). Each one has a 🔗 link to the Numista coin database so you can confirm it by photo before you buy.","📈 Live value: each coin shows its current metal value right now. Gold coins also suggest a selling price (value + profit, default €30). Silver coins use €0 profit — they just show the silver value (ideal for coins you hold/melt). Both profits are editable in Settings.","💶 Purchase price (optional): when you buy a coin, record what you paid — profit at the sale is then your price − what you paid, and the card shows \"Bought: €X\" so you never sell below cost.","🧮 Coins count toward the inventory totals (Total Retail + Pure gold/silver) using each coin's exact metal content. Selling a gold coin defaults to CASH. Coins are NEVER shown on the public showroom.","📊 The grouped card shows the TOTAL (N× value · N× selling price) plus a price-increase % — based on your purchase price if recorded, else the value when added (like regular items). The \"Coin\" type also appears in the type filter.","➕ \"My coins\": if someone brings a coin that isn't listed, weigh it → \"Add new coin\" (the weight is pre-filled), enter a name + fineness (from your metal tester or the Numista link) and tick save. From then on it's recognised by weight, live-valued and grouped like the rest. Manage them in Settings → \"My coins\"."]},{"version":"v10.38","date_el":"Ιούλιος 2026","items_el":["🎛️ Καθαρότερη μπάρα επιλογής: σε λειτουργία «Επιλογή», η μπάρα ενεργειών αναδιατάχθηκε — πάνω ο αριθμός επιλεγμένων με «Όλα» και «✕», και από κάτω τρία μεγάλα κουμπιά που πατιούνται εύκολα: Κοινοποίηση, Ομάδα, Πώληση.","💰 Διόρθωση «Κόστος» στα σύνολα επιλογής: το πεδίο εμφάνιζε «—» για είδη χωρίς αποθηκευμένο κόστος αγοράς (π.χ. είδη με χρέωση ανά γραμμάριο). Τώρα δείχνει το πραγματικό κόστος παραγωγής (μέταλλο + εργασία + πέτρες) όταν δεν υπάρχει καταχωρημένο κόστος αγοράς."],"date_en":"Jul 2026","items_en":["🎛️ Cleaner selection bar: in \"Select\" mode the action bar was rearranged — the selected count with \"All\" and \"✕\" on top, and three big, easy-to-tap buttons below: Share, Group, Sell.","💰 \"Cost\" total fix: the selection totals showed \"—\" for items with no stored purchase cost (e.g. per-gram items). It now shows the real production cost (metal + labour + stones) when no purchase cost is on file."]},{"version":"v10.37","date_el":"Ιούλιος 2026","items_el":["📄 Κατάλογος/Φύλλο Παραγγελίας: τα όμοια κομμάτια δεν εμφανίζονται πια πολλές φορές. Πλέον όσα μοιράζονται την ίδια ομάδα ΚΑΙ το ίδιο χρώμα συγκεντρώνονται σε ΜΙΑ καταχώριση με ένδειξη «N σε απόθεμα». Π.χ. ομάδα με 3 ίδια → 1 καταχώριση («3 σε απόθεμα»)· ομάδα με 1 μπλε, 1 κόκκινο, 3 πράσινα → 3 καταχωρίσεις (μπλε, κόκκινο, πράσινο «3 σε απόθεμα»). Εμφανίζεται και το χρώμα σε κάθε καταχώριση."],"date_en":"Jul 2026","items_en":["📄 Catalog / Order Sheet no longer repeats identical pieces: pieces that share the same group AND the same colour are now collapsed into ONE entry marked \"N in stock\". E.g. a group of 3 identical → 1 entry (\"3 in stock\"); a group of 1 blue, 1 red, 3 green → 3 entries (blue, red, green \"3 in stock\"). Each entry also shows its colour."]},{"version":"v10.36","date_el":"Ιούλιος 2026","items_el":["✅ Επιλογή ομάδας = όλα τα κομμάτια της: σε λειτουργία «Επιλογή», όταν τσεκάρετε μια ομαδοποιημένη κάρτα επιλέγονται πλέον ΟΛΑ τα διαθέσιμα κομμάτια της (όχι μόνο ένα). Έτσι, αν διαλέξετε ένα μονό είδος κι μια ομάδα και στείλετε Κατάλογο/Φύλλο Παραγγελίας, μπαίνουν όλα τα κομμάτια — και τα σύνολα (κόστος/λιανική) υπολογίζονται σωστά."],"date_en":"Jul 2026","items_en":["✅ Selecting a group selects all its pieces: in \"Select\" mode, ticking a grouped card now selects ALL of its in-stock pieces (not just one). So if you pick a single item and a group and send a Catalog / Order Sheet, every piece is included — and the totals (cost/retail) add up correctly."]},{"version":"v10.35","date_el":"Ιούλιος 2026","items_el":["🔗 Κοινοποίηση όλης της ομάδας με ένα πάτημα: στην ομαδοποιημένη κάρτα προστέθηκε εικονίδιο κοινοποίησης (πάνω δεξιά, δίπλα στον κωδικό) που στέλνει ΟΛΑ τα κομμάτια μαζί — Φύλλο Παραγγελίας, Κατάλογος (με ή χωρίς τιμές) και αποστολή σε συνεργάτη. Η εικόνα για social media δεν εμφανίζεται εδώ, αφού αφορά ένα κομμάτι τη φορά."],"date_en":"Jul 2026","items_en":["🔗 Share a whole group in one tap: the grouped card gets a share icon (top-right, next to the code) that sends ALL the pieces at once — Order Sheet, Catalog (with or without prices) and Send to a coworker. The social-media image isn't offered here since that's one item at a time."]},{"version":"v10.34","date_el":"Ιούλιος 2026","items_el":["💎 Σημαντική διόρθωση: όταν σαρώνετε ένα νέο είδος, οι πέτρες του προηγούμενου καθαρίζονται πρώτα. Πριν, αν σαρώνατε ένα είδος ΜΕ πέτρα (π.χ. ζιργκόν) και μετά ένα ΧΩΡΙΣ πέτρα, η πέτρα «κολλούσε» και μπερδευόταν στον κωδικό QR του δεύτερου είδους (π.χ. «…-tZIR»). Έτσι, στην πώληση, ο κωδικός δεν ταίριαζε με το είδος στο απόθεμα και το είδος ΔΕΝ σημειωνόταν ως πουλημένο. Τώρα κάθε νέα σάρωση ξεκινά καθαρή — οι πέτρες (και το κόστος πέτρας) μηδενίζονται και μπαίνουν μόνο αυτές του νέου είδους."],"date_en":"Jul 2026","items_en":["💎 Important fix: scanning a new item now clears the previous item's stones first. Before, if you scanned an item WITH a stone (e.g. zircon) and then one WITHOUT, the stone \"stuck\" and got mixed into the second item's QR code (e.g. \"…-tZIR\"). At sale time that code didn't match the item in stock, so the item was NOT marked sold. Now every new scan starts clean — the stones (and stone cost) reset and only the new item's stones are added."]},{"version":"v10.33","date_el":"Ιούλιος 2026","items_el":["🛡️ Η προειδοποίηση διπλότυπου QR πιάνει τώρα ΚΑΙ τα πωλημένα είδη: μέχρι τώρα, αν ο κωδικός QR ενός νέου είδους ταίριαζε με είδος που είχε ΠΩΛΗΘΕΙ, δεν εμφανιζόταν προειδοποίηση (ο έλεγχος κοιτούσε μόνο ό,τι ήταν σε απόθεμα). Επειδή η ετικέτα ενός πωλημένου κομματιού μπορεί να κυκλοφορεί ακόμα και θέλετε κάθε QR μοναδικό, η εφαρμογή προειδοποιεί πλέον για ΟΠΟΙΑΔΗΠΟΤΕ σύμπτωση κωδικού (με ένδειξη «[πωλημένο]» όπου χρειάζεται), ώστε να αλλάξετε ελαφρώς το βάρος."],"date_en":"Jul 2026","items_en":["🛡️ Duplicate-QR warning now catches SOLD items too: until now, if a new item's QR code matched an item that had been SOLD, no warning appeared (the check only looked at in-stock items). Since a sold piece's tag can still be around and you keep every QR unique, the app now warns for ANY code collision (marking it \"[sold]\" where relevant) so you can adjust the weight slightly."]},{"version":"v10.32","date_el":"Ιούλιος 2026","items_el":["🔧 Βελτιώσεις στα ομαδοποιημένα είδη: (1) Η ομαδοποιημένη κάρτα δείχνει τώρα δεξιά τα σήματα (φύλο, χειροποίητο, χρώμα χρυσού) όπως η κανονική κάρτα. (2) Στο «Δες κομμάτια», κάθε κομμάτι δείχνει και τη γραμμή «Αρχική τιμή (ημ/νία): €Χ (+Υ%)» ανάμεσα στα γραμμάρια και τα κουμπιά, όπως η κανονική κάρτα.","🛡️ Ενισχυμένη προειδοποίηση διπλότυπου QR: κατά την αποθήκευση νέου είδους, αν ο κωδικός QR υπάρχει ήδη σε άλλο είδος στο απόθεμα, η εφαρμογή σας προειδοποιεί πάντα (αλλάξτε ελαφρώς το βάρος) — πιάνει και περιπτώσεις που ο προηγούμενος έλεγχος μπορούσε να χάσει."],"date_en":"Jul 2026","items_en":["🔧 Grouped-item improvements: (1) The grouped card now shows the badges on the right (gender, handmade, gold colour) just like a normal card. (2) In \"View pieces\", each piece now shows the \"Initial price (date): €X (+Y%)\" line between the grams and the buttons, like a normal card.","🛡️ Stronger duplicate-QR warning: when saving a new item, if its QR code already exists on another in-stock item, the app now always warns you (adjust the weight slightly) — catching cases the earlier check could miss."]},{"version":"v10.31","date_el":"Ιούλιος 2026","items_el":["🔧 Πλήρεις ενέργειες για κάθε κομμάτι μιας ομάδας: ανοίγοντας «Δες κομμάτια» σε μια ομαδοποιημένη κάρτα, κάθε κομμάτι έχει τώρα ΟΛΕΣ τις ενέργειες όπως μια κανονική κάρτα — ➕ Calc, Κοινοποίηση, 🏷️ Εκτύπωση ετικέτας, 💰 Πώληση, ✏️ Επεξεργασία και 🗑 Διαγραφή. Έτσι δεν χάνετε καμία λειτουργία όταν τα είδη είναι ομαδοποιημένα (π.χ. να τυπώσετε ξανά μία ετικέτα ή να στείλετε ένα κομμάτι στον Υπολογισμό)."],"date_en":"Jul 2026","items_en":["🔧 Full actions for every piece of a group: opening \"View pieces\" on a grouped card, each piece now has ALL the actions of a normal card — ➕ Calc, Share, 🏷️ Print Tag, 💰 Sell, ✏️ Edit and 🗑 Delete. So you lose no functionality when items are grouped (e.g. reprint a single tag or send one piece to Calc)."]},{"version":"v10.30","date_el":"Ιούλιος 2026","items_el":["💰 Πώληση πολλών όμοιων μαζί (νέο): αν ένας πελάτης θέλει π.χ. 3 ίδια κομμάτια, ανοίξτε την ομαδοποιημένη κάρτα («Δες κομμάτια»), επιλέξτε ποσότητα στο «Πώληση πολλών» και πατήστε «Πώληση». Καταχωρούνται ως μία συναλλαγή (εμφανίζεται ως «🛍 N είδη» στις Πωλήσεις) και το απόθεμα μειώνεται αντίστοιχα. Για συγκεκριμένα κομμάτια (π.χ. ένα ροζ κι ένα μπλε) μπορείτε πάντα να πουλήσετε το καθένα ξεχωριστά από τη λίστα."],"date_en":"Jul 2026","items_en":["💰 Sell several identical at once (new): if a customer wants e.g. 3 of the same piece, open the grouped card (\"View pieces\"), pick a quantity under \"Sell several\" and press \"Sell\". They're recorded as one transaction (shown as \"🛍 N items\" in Sales) and stock drops accordingly. For specific pieces (e.g. one pink and one blue) you can still sell each one on its own from the list."]},{"version":"v10.29","date_el":"Ιούλιος 2026","items_el":["➕ Γρήγορη προσθήκη όμοιων ειδών (νέο): αντί να καταχωρείτε ένα-ένα π.χ. 12 σχεδόν ίδια κολιέ, καταχωρείτε το πρώτο κανονικά και μετά τα υπόλοιπα με «ζύγισμα → πάτημα». Ανοίξτε ένα είδος (Επεξεργασία) και πατήστε «🔗 Προσθήκη όμοιων ειδών» — ή, σε μια υπάρχουσα ομάδα, «＋ Προσθήκη κι άλλων». Βάζετε μόνο βάρος (και χρώμα αν διαφέρει), πατάτε «Εκτύπωση & Προσθήκη» και τυπώνεται η ετικέτα· επαναλαμβάνετε όσες φορές θέλετε. Όλα κρατούν τον ίδιο κωδικό αναφοράς, με μοναδικό QR ανά βάρος, και μπαίνουν στην ίδια κάρτα. (Ιδιοκτήτης/διαχειριστής.)"],"date_en":"Jul 2026","items_en":["➕ Fast \"Add similar items\" (new): instead of entering e.g. 12 near-identical necklaces one by one, enter the first one normally, then add the rest by \"weigh → tap\". Open an item (Edit) and press \"🔗 Add similar items\" — or, on an existing group, \"＋ Add more\". You only enter a weight (and a color if it differs), press \"Print & Add\" and the tag prints; repeat as many times as you like. They all keep the same reference code, with a unique QR per weight, and land on the same card. (Owner/manager.)"]},{"version":"v10.28","date_el":"Ιούλιος 2026","items_el":["🔗 Ομαδοποίηση όμοιων ειδών (νέο): πολλά σχεδόν ίδια κομμάτια (π.χ. οι ίδιοι σταυροί σε διαφορετικά χρώματα ή βάρη) μπορούν πλέον να εμφανίζονται σε ΜΙΑ κάρτα με μετρητή αποθέματος, αντί για πολλές ξεχωριστές καρτέλες. Στο «Απόθεμα» πατήστε «Επιλογή», τσεκάρετε τα όμοια είδη και πατήστε το 🔗 για να τα ενώσετε. Η κάρτα δείχνει «🔗 N σε απόθεμα», μία τιμή (ή εύρος αν διαφέρουν) και ανάλυση χρωμάτων. Με το «Δες κομμάτια» βλέπετε το καθένα ξεχωριστά (πώληση/επεξεργασία) και μπορείτε να καταργήσετε την ομαδοποίηση. Κάθε κομμάτι κρατά τον δικό του κωδικό/QR και την ακριβή του τιμή — τίποτα δεν συγχωνεύεται στα δεδομένα, μόνο η εμφάνιση. (Ιδιοκτήτης/διαχειριστής.)"],"date_en":"Jul 2026","items_en":["🔗 Group similar items (new): several near-identical pieces (e.g. the same crosses in different colors or weights) can now show as ONE card with a stock count, instead of many separate cards. In Stock, tap \"Select\", tick the similar items and press 🔗 to group them. The card shows \"🔗 N in stock\", one price (or a range if they differ) and a color breakdown. \"View pieces\" opens each one on its own (sell/edit) and lets you Ungroup. Every piece keeps its own code/QR and exact price — nothing is merged in the data, only the display. (Owner/manager.)"]},{"version":"v10.27","date_el":"Ιούλιος 2026","items_el":["🎨 Νέο πεδίο «Χρώμα» σε κάθε είδος: μπορείτε πλέον να ορίσετε το χρώμα ενός κοσμήματος (σμάλτο, πέτρα κ.λπ.) από μια έτοιμη λίστα — π.χ. Μπλε, Γαλάζιο, Μπορντό, Πράσινο — αντί να το γράφετε στην περιγραφή. Το χρώμα εμφανίζεται ως σήμα στην καρτέλα του είδους και μπορείτε να φιλτράρετε το απόθεμα ανά χρώμα. Αφήστε το κενό για απλά κομμάτια (εμφανίζονται με το μέταλλό τους, Χρυσό/Ασήμι). Διαθέσιμο στη δημιουργία ετικέτας, στη σάρωση και στην επεξεργασία είδους. (Πρώτο βήμα για το ομαδοποιημένο απόθεμα «όμοιων ειδών» που έρχεται.)"],"date_en":"Jul 2026","items_en":["🎨 New \"Color\" field on every item: you can now set a piece's color (enamel, stone, etc.) from a ready-made list — e.g. Blue, Light Blue, Bordeaux, Green — instead of typing it into the description. The color shows as a badge on the item card and you can filter your stock by color. Leave it blank for plain pieces (they show by their metal, Gold/Silver). Available when creating a label, scanning, and editing an item. (First step toward the \"similar items\" grouped stock that's coming.)"]},{"version":"v10.26","date_el":"Ιούλιος 2026","items_el":["⚧ Ένα είδος μπορεί τώρα να εμφανίζεται σε παραπάνω από μία κατηγορίες: π.χ. ένα παιδικό μενταγιόν που το αγοράζουν και γυναίκες. Επιλέγετε την κύρια κατηγορία όπως πάντα (π.χ. Παιδικό) και από κάτω, στο «Εμφανίζεται επίσης σε», τικάρετε και «Γυναικείο». Έτσι θα εμφανίζεται και στα δύο φίλτρα — και στην εφαρμογή και στην ιστοσελίδα (showroom). Διαθέσιμο στη δημιουργία ετικέτας, στη σάρωση και στην επεξεργασία είδους."],"date_en":"Jul 2026","items_en":["⚧ An item can now appear in more than one category: e.g. a children's pendant that grown women also buy. You pick the main category as usual (e.g. Children), then just below, under \"Also appears under\", tick \"Women\" too. It then shows up under both filters — in the app and on the showroom website. Available when creating a label, scanning, and editing an item."]},{"version":"v10.25","date_el":"Ιούλιος 2026","items_el":["🛒 Διόρθωση: το «✕» δίπλα σε κάθε είδος του καλαθιού αφαιρεί τώρα κανονικά το είδος (πριν δεν έκανε τίποτα).","🔢 Διόρθωση στη στρογγυλοποίηση με πολλά είδη: αφού πρόσθετες στο καλάθι ένα είδος με στρογγυλοποιημένη τιμή, στο επόμενο είδος το κουμπί εμφάνιζε «✕» αντί για «+», οπότε δεν μπορούσες να εφαρμόσεις τη νέα στρογγυλοποίηση. Τώρα το κουμπί επανέρχεται σωστά σε «+» για κάθε νέο είδος."],"date_en":"Jul 2026","items_en":["🛒 Fix: the \"✕\" next to each cart item now actually removes that item (before it did nothing).","🔢 Rounding fix with multiple items: after you added a rounded-price item to the cart, the next item's button showed \"✕\" instead of \"+\", so you couldn't apply a new rounding. The button now correctly resets to \"+\" for each new item."]},{"version":"v10.24","date_el":"Ιούλιος 2026","items_el":["⚧ Τα Unisex εμφανίζονται σε ανδρικά ΚΑΙ γυναικεία: όταν φιλτράρετε π.χ. «Ανδρικοί Σταυροί», εμφανίζονται τώρα και οι Unisex σταυροί — το ίδιο και στα γυναικεία. Δεν χρειάζεται πλέον να επιλέγετε και «Unisex» ξεχωριστά, ώστε να μη σας ξεφεύγει κανένα κομμάτι. Στην ιδιωτική ιστοσελίδα (showroom) το φίλτρο «Unisex» αφαιρέθηκε τελείως — τα κοινά κομμάτια εμφανίζονται αυτόματα και στις δύο κατηγορίες. Στην εφαρμογή το «Unisex» παραμένει ως επιλογή φίλτρου."],"date_en":"Jul 2026","items_en":["⚧ Unisex pieces now show under both Men and Women: when you filter for e.g. \"Men's Crosses\", unisex crosses now appear too — and likewise for Women. You no longer have to also tick \"Unisex\" separately, so nothing slips through. On the private showroom website the \"Unisex\" filter was removed entirely — shared pieces surface automatically under both categories. In the app, \"Unisex\" stays as a filter option."]},{"version":"v10.23","date_el":"Ιούλιος 2026","items_el":["⚡ Πιο γρήγορη καρτέλα «Απόθεμα»: το άνοιγμα της λίστας ειδών ήταν το μόνο που «κολλούσε» για μια στιγμή, και θα χειροτέρευε όσο μεγαλώνει το απόθεμα (προς 1000+ είδη). Τώρα η λίστα ανοίγει ακαριαία σαν τις υπόλοιπες καρτέλες: (1) εμφανίζεται αμέσως από τη μνήμη και ανανεώνεται αθόρυβα από το cloud στο παρασκήνιο, (2) η ταξινόμηση δεν ξαναϋπολογίζει πια τιμές χιλιάδες φορές, και (3) τα είδη φορτώνονται σε «σελίδες» καθώς κατεβαίνετε (αντί να χτίζονται και τα 1000 μαζί). Καμία αλλαγή στα δεδομένα ή στην εμφάνιση — μόνο ταχύτητα."],"date_en":"Jul 2026","items_en":["⚡ Faster \"Stock\" tab: opening the inventory list was the only tab that stuttered for a moment, and it would only get worse as the stock grows (toward 1000+ items). It now opens instantly like the other tabs: (1) it shows immediately from memory and refreshes quietly from the cloud in the background, (2) sorting no longer recalculates prices thousands of times, and (3) items load in \"pages\" as you scroll down (instead of building all 1000 cards at once). No change to your data or how it looks — just speed."]},{"version":"v10.22","date_el":"Ιούλιος 2026","items_el":["↩️ Το σάρωμα «πίσω» δεν κλείνει πια κατά λάθος την εφαρμογή: σε κινητά με χειρονομίες πλοήγησης (π.χ. Pixel), το σάρωμα από την άκρη της οθόνης προς τα μέσα έκλεινε αμέσως όλη την εφαρμογή — ακόμα κι ενώ καταχωρούσατε ένα είδος — και χανόταν η δουλειά σας. Τώρα το «πίσω» πρώτα κλείνει το ανοιχτό παράθυρο/φόρμα· αλλιώς σας πάει ένα βήμα πίσω (στην προηγούμενη καρτέλα)· και μόνο στην αρχική καρτέλα «Υπολογισμός» χρειάζεται δεύτερο σάρωμα για έξοδο, με το μήνυμα «Σύρετε ξανά για έξοδο». Ανοίγοντας ξανά την εφαρμογή, επιστρέφετε στην καρτέλα που είχατε ανοιχτή."],"date_en":"Jul 2026","items_en":["↩️ The back-swipe no longer closes the app by accident: on gesture-navigation phones (e.g. Pixel), swiping in from the screen edge used to close the whole app in one stroke — even while you were entering an item — and you lost your work. Now \"back\" first closes any open window/form; otherwise it takes you one step back (to the previous tab); and only on the Calc home tab does a second swipe exit, with a \"Swipe again to exit\" message. Reopening the app also returns you to the tab you had open."]},{"version":"v10.21","date_el":"Ιούλιος 2026","items_el":["✅ Αφαιρέθηκε η προσωρινή σήμανση «HD»: όλες οι 363 φωτογραφίες ανέβηκαν πλέον σε υψηλή ανάλυση, οπότε το πράσινο σήμα «HD» στις μικρογραφίες και το φίλτρο «HD Φωτό» (HD ✓ / Χωρίς HD) δεν χρειάζονται πια και αφαιρέθηκαν."],"date_en":"Jul 2026","items_en":["✅ Removed the temporary \"HD\" mark: all 363 photos are now uploaded in high resolution, so the green \"HD\" badge on thumbnails and the \"HD Photo\" filter (HD ✓ / Needs HD) are no longer needed and have been removed."]},{"version":"v10.20","date_el":"Ιούλιος 2026","items_el":["🏷️ Ο κωδικός αναφοράς «κλειδώνει» στην ετικέτα: μέχρι τώρα, αν άλλαζες τον τύπο ενός είδους (π.χ. από Κολιέ σε Σταυρό), ο κωδικός αναφοράς άλλαζε αυτόματα παντού (NK0342 → CR0342) — αλλά η τυπωμένη ετικέτα και η αναζήτηση στην ιστοσελίδα έδειχναν ακόμα το παλιό NK0342, οπότε ο πελάτης δεν έβρισκε το είδος. Πλέον, μόλις τυπωθεί μια ετικέτα, ο κωδικός της μένει σταθερός: αλλάζεις ελεύθερα τον τύπο και ο κωδικός παραμένει NK0342 σε εφαρμογή, αναζήτηση, σάρωση κειμένου και ιστοσελίδα. Καμία ανάγκη επανεκτύπωσης.","🖨️ Ερώτηση μόνο όταν τυπώνεις νέα ετικέτα: αν το είδος έχει αλλάξει τύπο και πατήσεις «Εκτύπωση Ετικέτας» (π.χ. φθαρμένη ετικέτα ή ανανέωση αποθέματος), η εφαρμογή σε ρωτάει: «Το είδος είναι τώρα Σταυρός αλλά ο κωδικός είναι NK0342 — να αλλάξει σε CR0342 και να εκτυπωθεί;». Επιλέγεις «Ενημέρωση & Εκτύπωση» ή «Διατήρηση NK0342». Το τετράγωνο QR δεν αλλάζει ποτέ — η σάρωση δουλεύει σε κάθε περίπτωση."],"date_en":"Jul 2026","items_en":["🏷️ The reference code now \"locks\" to the printed tag: until now, changing an item's type (e.g. Necklace → Cross) silently rewrote its reference code everywhere (NK0342 → CR0342) — but the printed tag and the website search still showed the old NK0342, so a customer couldn't find the item. Now, once a tag is printed, its code stays put: you can freely change the type and the code remains NK0342 in the app, in search, in text-scan and on the public website. No reprint needed.","🖨️ You're only asked when you print a new tag: if an item's type has changed and you press \"Print Tag\" (e.g. a damaged tag or a restock), the app asks: \"This item is now a Cross but its code is NK0342 — update it to CR0342 and print?\". You choose \"Update & Print\" or \"Keep NK0342\". The QR square itself never changes, so scanning works either way."]},{"version":"v10.19","date_el":"Ιούλιος 2026","items_el":["💎 Σημαντική διόρθωση τιμών πετρών: η εφαρμογή ΔΕΝ προσθέτει πια μόνη της τιμή σε πέτρα που αφήσατε χωρίς τιμή. Παλιότερα, ένα είδος με πέτρα (π.χ. μαργαριτάρι) που το είχατε αφήσει χωρίς τιμή, «δανειζόταν» αυτόματα μια τιμή από την προσωρινή μνήμη πετρών — αλλάζοντας κρυφά την τελική τιμή του κοσμήματος και φουσκώνοντας την «υπεραξία». Πλέον, κενή τιμή πέτρας μετράει ως 0€. Οι τιμές που καταχωρήσατε εσείς ΔΕΝ επηρεάστηκαν ποτέ (η παλιά συμπεριφορά άγγιζε μόνο κενές τιμές). Τις πέτρες τις τιμολογείτε χειροκίνητα ή με το κουμπί ✨ στην Επεξεργασία.","🔍 Νέο εργαλείο «Έλεγχος Τιμών Πετρών» (Ρυθμίσεις → προσωρινό): εντοπίζει τα είδη που επηρεάστηκαν από το παραπάνω σφάλμα, ώστε να τα ελέγξετε ένα-ένα. Με ένα πάτημα μηδενίζει την τιμή της πέτρας και διορθώνει την υπεραξία — πάντα με δική σας επιβεβαίωση. Θα αφαιρεθεί όταν ολοκληρωθεί το «σκούπισμα»."],"date_en":"Jul 2026","items_en":["💎 Important stone-pricing fix: the app no longer adds a price to a stone you left unpriced. Before, an item with a stone (e.g. a pearl) that you left with no price would silently \"borrow\" a price from the stone-price cache — quietly changing the piece's final price and inflating its \"gain %\". Now a blank stone price counts as €0. Prices you entered yourself were never affected (the old behavior only ever touched blank ones). You price stones manually or with the ✨ Estimate button in Edit.","🔍 New \"Stone Price Audit\" tool (Settings → temporary): finds the items affected by the bug above so you can review them one by one. One tap sets the stone price to €0 and fixes the gain — always with your confirmation. It will be removed once the cleanup is done."]},{"version":"v10.18","date_el":"Ιούλιος 2026","items_el":["📅 Η γραμμή «Αρχική τιμή» δείχνει τώρα και την ημερομηνία προσθήκης του είδους, π.χ. «Αρχική τιμή (προσθήκη 07/07/2026): €744.17 (+5.6%)». Έτσι, βλέποντας μια αύξηση, ξέρετε από ποια ημερομηνία να ελέγξετε πόσο έχει ανέβει ο χρυσός. (Ορατό στον ιδιοκτήτη/διαχειριστή.)"],"date_en":"Jul 2026","items_en":["📅 The \"Initial price\" line now also shows the date the item was added, e.g. \"Initial price (added 07/07/2026): €744.17 (+5.6%)\". So when you see a gain, you know which date to check the gold price against. (Owner/manager only.)"]},{"version":"v10.17","date_el":"Ιούλιος 2026","items_el":["⛓️ Ο ανεφοδιασμός αλυσίδων δεν «φουσκώνει» πια την υπεραξία: όταν προσθέτατε γραμμάρια σε ένα απόθεμα αλυσίδων, η νέα ποσότητα μετρούσε λανθασμένα ως αύξηση τιμής (π.χ. +32%). Πλέον η αξία του νέου εμπορεύματος προστίθεται στην αρχική τιμή, οπότε το ποσοστό υπεραξίας δείχνει μόνο την πραγματική μεταβολή της τιμής του χρυσού — όχι πόσο απόθεμα υπάρχει.","📈 Νέα ταξινόμηση & φίλτρο «Υπεραξία»: στην Ταξινόμηση μπορείτε να δείτε τα είδη με τη μεγαλύτερη ανατίμηση πρώτα (Υψηλή → Χαμηλή) και στα Φίλτρα να δείτε μόνο όσα ανέβηκαν πάνω από 3%, 5% ή 10% — για να εντοπίζετε γρήγορα μη ρεαλιστικές αυξήσεις. (Ορατό στον ιδιοκτήτη/διαχειριστή.)"],"date_en":"Jul 2026","items_en":["⛓️ Restocking chains no longer inflates the gain: when you added grams to a chain stock, the extra quantity was wrongly counted as a price rise (e.g. +32%). Now the value of the new stock is added to the initial price, so the gain % reflects only real gold-price movement — not how much stock is on hand.","📈 New \"Gain\" sort & filter: Sort can now show the items that rose the most first (High → Low), and Filters can show only items that went up over 3%, 5% or 10% — a quick way to catch unrealistic increases. (Owner/manager only.)"]},{"version":"v10.16","date_el":"Ιούλιος 2026","items_el":["🔧 Διόρθωση σήμανσης «HD»: όταν η φωτογραφία που ανεβάζατε ήταν ήδη μικρή (≤480px), το είδος έμενε κολλημένο στο «Χωρίς HD» ακόμα κι αν το ξανανεβάζατε. Τώρα κάθε φωτογραφία που ανεβάζετε σημαίνεται σωστά ως «HD» και φεύγει από τη λίστα."],"date_en":"Jul 2026","items_en":["🔧 \"HD\" mark fix: when the photo you uploaded was already small (≤480px), the item stayed stuck on \"Needs HD\" even after re-uploading. Now every photo you upload is correctly flagged as \"HD\" and leaves the list."]},{"version":"v10.15","date_el":"Ιούλιος 2026","items_el":["💎 Γενικός έλεγχος & θωράκιση του συστήματος πετρών: (1) Πέντε τύποι που δεν είχαν κωδικό — Μαργαριτάρι Akoya, Γλυκού Νερού, South Sea, Tahiti και Νεφρίτης (Jade) — διαβάζονταν λάθος στη σάρωση (ως διαμάντι) ή χάνονταν· τώρα έχουν σωστό κωδικό και σαρώνονται κανονικά. (2) Σαρώνοντας ετικέτα με πολλές πέτρες (π.χ. «4xRUB») ή melee απευθείας στο απόθεμα, διατηρείται πλέον η ποσότητα/η ένδειξη melee (πριν γινόταν πάντα «1»). (3) Κατά την αποθήκευση νέου είδους, η περιγραφή πετρών φτιάχνεται από αυτά που πληκτρολογήσατε, ώστε ένα διαμάντι χωρίς καράτια (που δεν μπαίνει στον κωδικό) να μη χάνεται και το σχήμα/η τιμή κάθε πέτρας να μένουν σωστά."],"date_en":"Jul 2026","items_en":["💎 Stone-system review & hardening: (1) Five types that had no code — Akoya, Freshwater, South Sea and Tahitian pearls, and Jade — used to mis-scan (read back as Diamond) or disappear; they now have proper codes and scan correctly. (2) Scanning a multi-stone tag (e.g. \"4xRUB\") or a melee tag straight into inventory now keeps the quantity / melee marking (it was always saved as \"1\" before). (3) When saving a new item, the stone description is built from what you actually entered, so a no-carat Diamond (which isn't written into the code) is no longer dropped and each stone's shape/price stays with the right stone."]},{"version":"v10.14","date_el":"Ιούλιος 2026","items_el":["📷 Αλλαγή μόνο φωτογραφίας δεν ζητά πια νέα ετικέτα: όταν επεξεργάζεστε ένα είδος και αλλάζετε μόνο τη φωτογραφία (π.χ. για την έκδοση υψηλής ανάλυσης), η εφαρμογή δεν σας ζητά πλέον να τυπώσετε νέα ετικέτα. Η ειδοποίηση επανεκτύπωσης εμφανίζεται μόνο αν πραγματικά αλλάξετε τις πέτρες. Έτσι η μαζική ενημέρωση φωτογραφιών γίνεται γρήγορα"],"date_en":"Jul 2026","items_en":["📷 Changing only the photo no longer asks for a new tag: when you edit an item and change just the photo (e.g. for the high-resolution version), the app no longer prompts you to print a new tag. The reprint prompt now appears only if you actually change the stones. This makes bulk photo updates quick"]},{"version":"v10.13","date_el":"Ιούλιος 2026","items_el":["🏷️ Σοβαρή διόρθωση κωδικών με πέτρες: όταν ένα κόσμημα είχε πρώτη πέτρα διαμάντι χωρίς καράτια (που δεν μπαίνει στον κωδικό) ακολουθούμενη από άλλες πέτρες, ο κωδικός τυπωνόταν λάθος — με «+» αντί για «-» πριν τις πέτρες (π.χ. «KAL18S1.3+4xRUB» αντί «KAL18S1.3-4xRUB»). Έτσι, σαρώνοντας την ετικέτα, εμφανιζόταν «Κωδικός δεν βρέθηκε». Πλέον οι νέοι κωδικοί παράγονται σωστά ΚΑΙ οι ήδη τυπωμένες λάθος ετικέτες σαρώνονται κανονικά. (Αν επεξεργαστείτε/επανεκτυπώσετε ένα τέτοιο είδος, ο κωδικός διορθώνεται αυτόματα.)"],"date_en":"Jul 2026","items_en":["🏷️ Important stone-code fix: when a piece had a first stone that was a Diamond with no carats (which isn't written into the code) followed by other stones, the code was generated wrong — with a \"+\" instead of the \"-\" that starts the stone section (e.g. \"KAL18S1.3+4xRUB\" instead of \"KAL18S1.3-4xRUB\"). Scanning that tag showed \"Code not found\". New codes are now generated correctly AND already-printed wrong tags scan fine again. (Editing/reprinting such an item auto-corrects its code.)"]},{"version":"v10.12","date_el":"Ιούλιος 2026","items_el":["💎 Διόρθωση melee σε επεξεργασία είδους: παλαιότερα είδη με πέτρες melee (κωδικός με «t», π.χ. tZIR) έχαναν τη σήμανση melee όταν τα ανοίγατε για επεξεργασία — έτσι, αλλάζοντας π.χ. τη φωτογραφία, η εφαρμογή σας ζητούσε άσκοπα νέα ετικέτα και ο κωδικός γινόταν απλός (ZIR). Τώρα η σήμανση melee διαβάζεται σωστά από τον τυπωμένο κωδικό, δεν χάνεται στην επεξεργασία και δεν ζητείται περιττή επανεκτύπωση"],"date_en":"Jul 2026","items_en":["💎 Fixed melee stones on item edit: older items with melee stones (code with a \"t\", e.g. tZIR) lost their melee marking when opened for editing — so just changing the photo made the app needlessly ask to print a new tag and the code dropped to plain (ZIR). The melee marking is now read correctly from the printed code, so it survives editing and no unnecessary reprint is prompted"]},{"version":"v10.11","date_el":"Ιούλιος 2026","items_el":["🖼️ Σήμανση «HD» (προσωρινό): στη λίστα Αποθέματος, τα είδη που έχουν ήδη φωτογραφία υψηλής ανάλυσης δείχνουν ένα πράσινο σήμα «HD» πάνω στη μικρογραφία τους — έτσι βλέπετε με μια ματιά ποια έχουν ανέβει και ποια όχι. Στα φίλτρα προστέθηκε επιλογή «HD Φωτό» με «HD ✓» (έχουν) και «Χωρίς HD» (θέλουν ακόμα ανέβασμα), για να βρίσκετε γρήγορα όσα απομένουν. Θα αφαιρεθεί όταν ολοκληρωθούν όλες οι φωτογραφίες"],"date_en":"Jul 2026","items_en":["🖼️ \"HD\" mark (temporary): in the Inventory list, items that already have a high-resolution photo show a small green \"HD\" badge on their thumbnail — so you can see at a glance which ones are done and which still need re-uploading. The filters gained an \"HD Photo\" option with \"HD ✓\" (has one) and \"Needs HD\" (still to upload), to quickly find the ones left. It'll be removed once all photos are done"]},{"version":"v10.10","date_el":"Ιούλιος 2026","items_el":["📷 Φωτογραφίες υψηλής ανάλυσης για το Showroom: κάθε φωτογραφία που ανεβάζετε αποθηκεύεται πλέον σε δύο εκδόσεις — μία μικρή για την εφαρμογή (μένει ελαφριά & γρήγορη, όπως πριν) και μία υψηλής ανάλυσης που χρησιμοποιείται μόνο στο δημόσιο Showroom, στη σελίδα του κάθε είδους και στις Προωθητικές Εικόνες (Instagram/Facebook). Έτσι το Showroom δείχνει καθαρές, ευκρινείς φωτογραφίες χωρίς να επιβαρύνεται η εφαρμογή. Ισχύει για νέα είδη· για παλιά, ανοίξτε το είδος και επιλέξτε ξανά την αρχική φωτογραφία (ή βγάλτε νέα) για να αποκτήσει και αυτό την έκδοση υψηλής ανάλυσης"],"date_en":"Jul 2026","items_en":["📷 High-resolution photos for the Showroom: every photo you upload is now saved in two versions — a small one for the app (stays light & fast, exactly as before) and a high-resolution one used only by the public Showroom, the single-item page, and Promo Images (Instagram/Facebook). So the Showroom shows crisp, sharp photos without slowing the app down. This applies to new items; for older ones, open the item and re-select the original photo (or take a new one) to give it the high-res version too"]},{"version":"v10.9","date_el":"Ιούλιος 2026","items_el":["🛡️ Αυτόματα αντίγραφα ασφαλείας: η εφαρμογή κρατά πλέον μόνη της ένα πλήρες αντίγραφο όλων των δεδομένων (είδη, πελάτες, πωλήσεις, ρυθμίσεις) μία φορά την ημέρα, κρατώντας τα τελευταία 30. Αποθηκεύονται ιδιωτικά στο cloud σας — δεν εμφανίζονται πουθενά δημόσια. Στις Ρυθμίσεις → Αντίγραφο Ασφαλείας υπάρχει «☁️ Αντίγραφο Τώρα» για άμεσο αντίγραφο και «↩️ Επαναφορά» για να επαναφέρετε τα δεδομένα σε οποιαδήποτε προηγούμενη ημέρα (κρατείται αυτόματα αντίγραφο των τωρινών δεδομένων πριν από κάθε επαναφορά)"],"date_en":"Jul 2026","items_en":["🛡️ Automatic backups: the app now keeps a full snapshot of all your data (inventory, clients, sales, settings) once a day on its own, keeping the last 30. They're stored privately in your cloud — never shown anywhere public. Under Settings → Data Backup there's a \"☁️ Back Up Now\" button for an instant snapshot and \"↩️ Restore\" to roll your data back to any earlier day (a snapshot of the current data is saved automatically before every restore)"]},{"version":"v10.8","date_el":"Ιούλιος 2026","items_el":["👥 Ταξινόμηση & φίλτρα στους Πελάτες: νέο μενού ταξινόμησης (Όνομα Α→Ω / Ω→Α, Πιο πρόσφατοι, Παλαιότεροι) και κουμπί «📅 Ημ/νία» για φιλτράρισμα ανά διάστημα ημερομηνιών προσθήκης. Με ένα άγγιγμα σε ένα κουμπί «Σεζόν» (π.χ. 2024) βλέπετε όσους πελάτες προστέθηκαν εκείνη τη σεζόν (Απρ–Νοε), ιδανικό για να θυμηθείτε ποιος είχε έρθει πριν από μία-δύο σεζόν. Κάθε πελάτης δείχνει πλέον και την ημερομηνία που προστέθηκε"],"date_en":"Jul 2026","items_en":["👥 Sort & filter in Clients: a new sort menu (Name A→Z / Z→A, Newest first, Oldest first) plus a \"📅 Date\" button to filter clients by when they were added. One tap on a \"Season\" chip (e.g. 2024) shows everyone added that season (Apr–Nov) — handy for remembering who visited a season or two ago. Each client now also shows its date added"]},{"version":"v10.7","date_el":"Ιούλιος 2026","items_el":["⚡ Σάρωση κειμένου πιο γρήγορη & χωρίς «κόλλημα»: μόλις διαβαστεί ένας έγκυρος κωδικός που υπάρχει στο απόθεμα, μπαίνει ΑΜΕΣΩΣ (δεν περιμένει πλέον δεύτερη ανάγνωση, που ενίοτε άφηνε τον κωδικό να «κρέμεται» αν απομακρύνατε την κάμερα). Ο κωδικός συμπληρώνεται και το είδος εμφανίζεται αμέσως για επιβεβαίωση"],"date_en":"Jul 2026","items_en":["⚡ Text scanning is faster and no longer gets stuck: as soon as a valid code that exists in inventory is read, it is accepted INSTANTLY (it no longer waits for a second read, which sometimes left the code just \"hanging\" if you moved the camera away). The code fills in and the item is shown right away for confirmation"]},{"version":"v10.6","date_el":"Ιούλιος 2026","items_el":["🔤 Σάρωση του τυπωμένου κωδικού (όχι μόνο του QR): στην κάμερα σάρωσης υπάρχει πλέον κουμπί «Σάρωση κειμένου». Αν το QR έχει ξεθωριάσει ή γδαρθεί από τον ήλιο, στρέψτε την κάμερα στον τυπωμένο κωδικό αναφοράς (π.χ. PE0142) και η εφαρμογή τον διαβάζει με OCR και ανοίγει κανονικά το είδος. Λειτουργεί και από φωτογραφία της ετικέτας. Δουλεύει τώρα και σε iPhone/Safari, όπου η σάρωση με κάμερα δεν ήταν διαθέσιμη. Την πρώτη φορά χρειάζεται σύνδεση στο διαδίκτυο (μετά αποθηκεύεται και δουλεύει χωρίς σύνδεση)"],"date_en":"Jul 2026","items_en":["🔤 Scan the printed code (not just the QR): the scanner camera now has a \"Scan code text\" button. If the QR is faded or scratched by the sun, point the camera at the printed reference code (e.g. PE0142) and the app reads it with OCR and opens the item as usual. Also works from a photo of the tag. This now works on iPhone/Safari too, where camera scanning wasn't available before. The first use needs an internet connection (after that it's saved and works offline)"]},{"version":"v10.5","date_el":"Ιούλιος 2026","items_el":["📄 Πιο ψηλά αναδυόμενα παράθυρα: τα «φύλλα» που ανοίγουν από κάτω (Λεπτομέρειες Πώλησης, Αγορές πελάτη, Ειδοποιήσεις, φίλτρα, μαζική προσθήκη) και από πάνω (νέος πελάτης/προμηθευτής/μέλος) εκτείνονται πλέον σχεδόν σε όλο το ύψος της οθόνης. Έτσι δεν μένει άδειος χώρος στην κορυφή και χρειάζεται πολύ λιγότερο κύλισμα για να φτάσετε στο κάτω μέρος"],"date_en":"Jul 2026","items_en":["📄 Taller pop-up windows: the \"sheets\" that slide up from the bottom (Sale Details, client purchases, Notifications, filters, bulk add) and drop down from the top (new client/vendor/member) now stretch to nearly the full height of the screen. No more empty space left at the top, and far less scrolling to reach the bottom of a long window"]},{"version":"v10.4","date_el":"Ιούλιος 2026","items_el":["👤 Αγορές πελάτη → πώληση: στην καρτέλα Πελάτες, οι αγορές ενός πελάτη ανοίγουν πλέον την ΠΩΛΗΣΗ (με έκπτωση, σύνολα, όλα τα τεμάχια) αντί να πηγαίνουν κατευθείαν στο απόθεμα. Οι πολλαπλές πωλήσεις (καλάθι) εμφανίζονται ως ΜΙΑ γραμμή με σήμα «🛍 N τεμ.», όπως και στη λίστα Πωλήσεων. Από μέσα στην πώληση, το κουμπί «Δες Αντικείμενο» σε πάει στο αντικείμενο στο απόθεμα","💵 Κουμπί μετρητών σε πώληση πολλαπλών τεμαχίων: στη συνολική προβολή μιας πώλησης καλαθιού υπάρχει πλέον διακόπτης «💵 ΜΕΤΡΗΤΑ» δίπλα στο σύνολο. Με ένα πάτημα ορίζει (ή αναιρεί) τα μετρητά για ΟΛΑ τα τεμάχια μαζί και ξαναϋπολογίζει το κέρδος κάθε τεμαχίου (χωρίς ΦΠΑ), χωρίς να χρειάζεται να επεξεργαστείτε τα τεμάχια ένα-ένα"],"date_en":"Jul 2026","items_en":["👤 Client purchases → sale: in the Clients tab, a client's purchases now open the SALE (with discount, totals, all items) instead of jumping straight to inventory. Multi-item (cart) sales show as ONE row with a \"🛍 N items\" badge, just like the Sales list. From inside the sale, the \"View Item\" button takes you to the piece in inventory","💵 Cash button on multi-item sales: the combined view of a cart sale now has a \"💵 CASH\" toggle next to the total. One tap sets (or clears) cash for ALL items at once and recomputes each item's profit (no VAT removed) — no need to edit items one by one"]},{"version":"v10.3","date_el":"Ιούλιος 2026","items_el":["📷 Καλύτερη σάρωση QR με webcam υπολογιστή: υψηλότερη ανάλυση κάμερας, αίτημα συνεχούς αυτόματης εστίασης όπου υποστηρίζεται, ζουμ στο κέντρο του καρέ για μικρούς κωδικούς και οδηγία «κρατήστε την ετικέτα ~15–20 εκ. από την κάμερα». Στο κινητό δεν αλλάζει τίποτα"],"date_en":"Jul 2026","items_en":["📷 Better QR scanning with a desktop webcam: higher camera resolution, a request for continuous autofocus where supported, a centre-of-frame zoom for small codes, and an on-screen hint to \"hold the tag ~15–20 cm from the camera\". Nothing changes on mobile"]},{"version":"v10.2","date_el":"Ιούλιος 2026","items_el":["📷 Σάρωση QR από υπολογιστή: το εικονίδιο σάρωσης QR στην καρτέλα Υπολογισμός εμφανίζεται πλέον και σε desktop Chrome (Windows/Linux), όπου λείπει ο ενσωματωμένος αναγνώστης του browser. Η κάμερα του laptop (ή μια φωτογραφία ετικέτας) διαβάζει τον κωδικό μέσω ενσωματωμένου αποκωδικοποιητή. Στο κινητό (Android/iPhone) δεν αλλάζει τίποτα"],"date_en":"Jul 2026","items_en":["📷 QR scanning on the desktop: the QR scan icon on the Calc tab now also appears in desktop Chrome (Windows/Linux), where the browser has no built-in QR reader. Your laptop camera (or a photo of a tag) reads the code via a bundled decoder. Nothing changes on mobile (Android/iPhone)"]},{"version":"v10.1","date_el":"Ιούλιος 2026","items_el":["💎 Ανανεωμένο λογότυπο: η πέτρα του σήματος είναι πλέον ένα μικρότερο, κομμένο διαμάντι τοποθετημένο μέσα στο σχέδιο (αντί για μαργαριτάρι στην άκρη) — ίδιο παντού: εφαρμογή, ιστοσελίδα και showroom"],"date_en":"Jul 2026","items_en":["💎 Refreshed logo: the mark's stone is now a smaller, cut diamond set inside the design (instead of a pearl at the edge) — consistent everywhere: app, website and showroom"]},{"version":"v10.0","date_el":"Ιούλιος 2026","items_el":["🛍 Οι πωλήσεις πολλαπλών αντικειμένων (πούλημα ολόκληρου καλαθιού μαζί) εμφανίζονται πλέον ως ΜΙΑ πώληση στη λίστα πωλήσεων — με σήμανση «🛍 X τεμ.» — αντί για ξεχωριστές εγγραφές. Ο αριθμός «πωλήσεων» μετράει τώρα κάθε τέτοιο πούλημα ως μία συναλλαγή","🛍 Πατώντας μια τέτοια πώληση βλέπετε το συνολικό ποσό, το κέρδος και τη λίστα των αντικειμένων· μπορείτε να ανοίξετε κάθε αντικείμενο ξεχωριστά (για επεξεργασία/διαγραφή) ή να διαγράψετε όλη την πώληση μαζί","🎁 Διόρθωση: το bonus του πωλητή υπολογίζεται πλέον στο σύνολο της πώλησης όσα αντικείμενα κι αν έχει (πριν μετρούσε μόνο το πρώτο αντικείμενο)","🔎 Το ίδιο ομαδοποιημένο στιλ ισχύει και στην αναζήτηση πωλήσεων"],"date_en":"Jul 2026","items_en":["🛍 Multi-item sales (selling a whole cart at once) now show as ONE sale in the sales list — tagged \"🛍 X items\" — instead of separate entries. The \"sales\" count now treats each such checkout as a single transaction","🛍 Tap one of these sales to see the combined total, profit and the list of items; open any item on its own (to edit/delete it) or delete the whole sale together","🎁 Fix: the salesperson bonus now applies to the entire sale no matter how many items (it previously only counted the first item)","🔎 Sales search groups multi-item sales the same way"]},{"version":"v9.99","date_el":"Ιούλιος 2026","items_el":["⛓️ Στις Λεπτομέρειες Πώλησης μιας χύδην αλυσίδας εμφανίζονται πλέον τα γραμμάρια που πουλήθηκαν (π.χ. 5,9g) αντί για το υπόλοιπο βάρος της παρτίδας"],"date_en":"Jul 2026","items_en":["⛓️ The Sale Details for a bulk chain now show the grams actually sold (e.g. 5.9g) instead of the batch's remaining weight"]},{"version":"v9.98","date_el":"Ιούλιος 2026","items_el":["⛓️ Σοβαρή διόρθωση στην πώληση χύδην αλυσίδας μέσω καλαθιού: πούλαγε όλη την παρτίδα και μηδένιζε τα γραμμάρια, ενώ έγραφε λάθος κέρδος. Τώρα αφαιρεί μόνο τα γραμμάρια που πουλήθηκαν και καταγράφει σωστά το κέρδος — όπως ακριβώς και όταν πουλάτε σκανάροντας το QR","⛓️ Το ίδιο διορθώθηκε και όταν προσθέτετε την αλυσίδα στο καλάθι και πουλάτε από την οθόνη υπολογισμού: πλέον αφαιρεί μόνο το βάρος που πωλήθηκε και αποθηκεύει κόστος/κέρδος"],"date_en":"Jul 2026","items_en":["⛓️ Serious fix for selling a bulk chain through the cart: it used to sell the whole batch and zero out your remaining grams, and it logged a wrong profit figure. Now it deducts only the grams actually sold and records the correct profit — exactly like selling by scanning the QR code","⛓️ Same fix when you add the chain to the cart and sell from the Calc price bar: it now deducts only the sold weight and stores cost/profit"]},{"version":"v9.97","date_el":"Ιούλιος 2026","items_el":["🛒 Διόρθωση: το κουμπί «Πώληση Όλων» μέσα στο καλάθι εμφανιζόταν στα αγγλικά («MARKALLSOLD») ενώ η εφαρμογή ήταν στα ελληνικά — τώρα δείχνει σωστά «Πώληση Όλων»"],"date_en":"Jul 2026","items_en":["🛒 Fix: the \"Sell All\" button inside the cart showed in English (\"MARKALLSOLD\") while the app was in Greek — it now displays the correct translated label"]},{"version":"v9.96","date_el":"Ιούλιος 2026","items_el":["⛓️ Πώληση αλυσίδας: το ποσοστό έκπτωσης εμφανίζεται ξανά στρογγυλεμένο (π.χ. -22,91%) αντί για έναν πολύ μεγάλο αριθμό με πολλά δεκαδικά"],"date_en":"Jul 2026","items_en":["⛓️ Chain sale: the discount percentage is shown rounded again (e.g. -22.91%) instead of a very long many-decimal number"]},{"version":"v9.95","date_el":"Ιούλιος 2026","items_el":["🟢 Επανήλθε η πράσινη ειδοποίηση «Νέα έκδοση»: όταν ανοίγετε την εφαρμογή μετά από ενημέρωση, βλέπετε ξανά τι άλλαξε μαζί με κουμπί Ανανέωσης — τραβά πλέον αυτόματα τις αλλαγές από το ημερολόγιο αλλαγών, οπότε δεν θα ξαναχαθεί"],"date_en":"Jul 2026","items_en":["🟢 The green \"new version\" notification is back: after an update, opening the app again shows what changed with a Refresh button — it now pulls the notes straight from the changelog, so it can't silently disappear again"]},{"version":"v9.94","date_el":"Ιούλιος 2026","items_el":["⛓️ Διόρθωση στρογγυλοποίησης στην πώληση αλυσίδας (Bulk chains): όταν βάζετε τελική τιμή π.χ. 800, η τελική τιμή είναι ακριβώς 800 — δεν γίνεται πια 800,02"],"date_en":"Jul 2026","items_en":["⛓️ Bulk chain sale rounding fix: entering a final price like 800 now gives you exactly 800 — no more 800.02"]},{"version":"v9.93","date_el":"Ιούλιος 2026","items_el":["🛒 Πιο σταθερή πώληση πολλών αντικειμένων: όταν πατάτε «Πωλήθηκε» ενώ έχετε 2+ αντικείμενα στο καλάθι, η εφαρμογή ρωτά αν θέλετε να καταχωρίσετε ΟΛΑ (με το σωστό σύνολο) ή μόνο το τρέχον — δεν καταγράφει πια σιωπηλά μόνο το ένα","🛒 Διόρθωση: ακυρωμένη πώληση καλαθιού δεν «κολλάει» πια στην επόμενη πώληση"],"date_en":"Jul 2026","items_en":["🛒 More consistent multi-item sales: pressing \"Sold\" while 2+ items are in the cart now asks whether to record ALL of them (with the correct total) or just the current item — it no longer silently records only one","🛒 Fix: a cancelled cart sale no longer leaks into the next sale"]},{"version":"v9.92","date_el":"Ιούλιος 2026","items_el":["💎 Το πεδίο ποσότητας πέτρας δείχνει αχνή παύλα «—» αντί για «1» — και μένει κενό στην επεξεργασία ειδών let lang = localStorage.getItem('jpro_lang') || 'el';
const T = {
  el: { title:'Ιστορικό Εκδόσεων', sub:'Όλες οι ενημερώσεις — από την αρχή', back:'← Επιστροφή στην εφαρμογή' },
  en: { title:'Changelog', sub:'Every update — since the beginning', back:'← Back to the app' }
};
function render(){
  document.documentElement.lang = lang;
  const t = T[lang];
  document.getElementById('pageTitle').textContent = t.title;
  document.getElementById('pageSub').textContent = t.sub + ' · ' + CHANGELOG.length + (lang==='el'?' εκδόσεις':' versions');
  document.getElementById('backLink').textContent = t.back;
  document.getElementById('btnEl').classList.toggle('active', lang==='el');
  document.getElementById('btnEn').classList.toggle('active', lang==='en');
  const list = document.getElementById('list');
  list.innerHTML = '';
  CHANGELOG.forEach(e => {
    const items = lang==='el' ? e.items_el : e.items_en;
    const date  = lang==='el' ? e.date_el  : e.date_en;
    const div = document.createElement('div');
    div.className = 'entry';
    const head = document.createElement('div');
    head.className = 'entry-head';
    const ver = document.createElement('span'); ver.className='entry-ver'; ver.textContent = e.version;
    const dt  = document.createElement('span'); dt.className='entry-date'; dt.textContent = date || '';
    head.appendChild(ver); head.appendChild(dt);
    const ul = document.createElement('ul'); ul.className='entry-items';
    (items||[]).forEach(it => { const li=document.createElement('li'); li.textContent = it; ul.appendChild(li); });
    div.appendChild(head); div.appendChild(ul);
    list.appendChild(div);
  });
}
function setLang(l){ lang=l; try{localStorage.setItem('jpro_lang',l);}catch(e){} render(); }
render();
</script>
