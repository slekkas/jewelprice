  en:{ title:"User Manual", sub:"Complete guide — JewelPrice Pro", back:"← Back to the app", expand:"Expand all", collapse:"Collapse all" }
};
function render(){
  document.documentElement.lang = lang;
  const t = T[lang];
  document.getElementById('pageTitle').textContent = t.title;
  document.getElementById('pageSub').textContent = t.sub;
  document.getElementById('backLink').textContent = t.back;
  document.getElementById('btnExpand').textContent = t.expand;
  document.getElementById('btnCollapse').textContent = t.collapse;
  document.getElementById('btnEl').classList.toggle('active', lang==='el');
  document.getElementById('btnEn').classList.toggle('active', lang==='en');
  const list = document.getElementById('list');
  list.innerHTML = '';
  MANUAL[lang].forEach((s, i) => {
    const sec = document.createElement('div');
    sec.className = 'sec' + (i===0 ? ' open' : '');
    const head = document.createElement('div');
    head.className = 'sec-head';
    head.onclick = () => sec.classList.toggle('open');
    const title = document.createElement('div');
    title.className = 'sec-title';
    title.textContent = s.icon + '  ' + s.title;
    const chev = document.createElement('span');
    chev.className = 'sec-chev'; chev.textContent = '▼';
    head.appendChild(title); head.appendChild(chev);
    const body = document.createElement('div');
    body.className = 'sec-body';
    const ul = document.createElement('ul');
    s.items.forEach(it => { const li = document.createElement('li'); li.innerHTML = it; ul.appendChild(li); });
    body.appendChild(ul);
    sec.appendChild(head); sec.appendChild(body);
    list.appendChild(sec);
  });
}
function setAll(open){ document.querySelectorAll('.sec').forEach(s => s.classList.toggle('open', open)); }
function setLang(l){ lang=l; try{localStorage.setItem('jpro_lang',l);}catch(e){} render(); }
render();
</script>
</body>
</html>
